<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조상희 실시간 주식투자 랭킹전</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* [기존 스타일 동일 유지] */
        body { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(135deg, #f4f7f6 0%, #e9eff1 100%); color: #4a5568; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; overflow-x: hidden; }
        .main-wrapper { display: flex; gap: 30px; max-width: 1100px; width: 100%; flex-wrap: wrap; background: #ffffff; padding: 30px; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(160, 174, 192, 0.15); margin-top: 10px; }
        .game-container, .ranking-container { background: #f7fafc; padding: 30px; border-radius: 16px; border: 1px solid #edf2f7; flex: 1.3; min-width: 350px; text-align: center; box-shadow: inset 0 2px 4px rgba(0,0,0,0.01); }
        .ranking-container { flex: 0.7; max-height: 760px; overflow-y: auto; background: #fdfdfd; border: 1px solid #e2e8f0; }
        .ranking-container::-webkit-scrollbar { width: 6px; }
        .ranking-container::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 10px; }
        h1 { font-size: 1.7rem; color: #2d3748; font-weight: 700; margin: 0 0 5px 0; letter-spacing: -0.5px; }
        .description { color: #718096; font-size: 0.88rem; margin-bottom: 20px; font-weight: 300; }
        .auth-area { display: flex; flex-direction: row; gap: 12px; align-items: center; margin-bottom: 20px; }
        .user-status-badge { background: #e2e8f0; color: #4a5568; padding: 8px 16px; border-radius: 8px; font-size: 0.95rem; font-weight: 500; display: flex; align-items: center; gap: 12px; }
        .user-status-badge span.name { color: #3182ce; font-weight: 700; }
        .live-users-panel { background: #f0fff4; border: 1px solid #c6f6d5; border-radius: 10px; padding: 10px 15px; margin-bottom: 15px; text-align: left; font-size: 0.88rem; color: #22543d; }
        .live-user-dot { display: inline-block; background: #38a169; color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.78rem; font-weight: 500; margin-right: 5px; margin-top: 5px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #ebf8ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; color: #2b6cb0; border-left: 4px solid #63b3ed; font-weight: 500; text-align: left; }
        .stats div { display: flex; justify-content: space-between; padding: 2px 5px; }
        .red-text { color: #e53e3e !important; }
        .blue-text { color: #3182ce !important; }
        .message { font-size: 1rem; font-weight: 500; margin: 15px 0; min-height: 35px; color: #4a5568; }
        input[type="number"], input[type="text"], input[type="password"] { padding: 10px 12px; font-size: 0.95rem; background: #ffffff; border: 1px solid #cbd5e0; border-radius: 8px; color: #2d3748; text-align: center; box-sizing: border-box; }
        .stock-market-board { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 5px 15px; margin-bottom: 15px; text-align: left; }
        .stock-row-wrapper { border-bottom: 1px solid #edf2f7; }
        .stock-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 12px; cursor: pointer; border-radius: 8px; transition: all 0.2s; }
        .stock-item:hover { background: #f7fafc; }
        .stock-row-wrapper.selected .stock-item { background: #eaf6ff; }
        .stock-info .name { font-weight: 500; color: #2d3748; font-size: 0.95rem; }
        .stock-info .cap { font-size: 0.75rem; color: #718096; margin-top: 3px; font-weight: 300; }
        .stock-info .cap.has-balance { color: #dd6b20; font-weight: 500; }
        .stock-chart-zone { width: 80px; height: 35px; margin: 0 15px; background: #fafafa; border: 1px solid #f0f0f0; border-radius: 4px; }
        .stock-price { font-weight: 700; text-align: right; min-width: 95px; color: #4a5568; font-size: 0.92rem; }
        .price-up { color: #e53e3e !important; } 
        .price-down { color: #3182ce !important; } 
        .stock-detail-chart-container { display: none; background: #fdfdfd; padding: 15px; border-top: 1px dashed #e2e8f0; text-align: center; }
        .stock-detail-chart-container.open { display: block; }
        .detail-canvas { width: 100%; height: 120px; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; }
        .order-panel { background: #ffffff; border: 1px solid #63b3ed; border-radius: 12px; padding: 15px; box-shadow: 0 4px 15px rgba(99,179,237,0.1); display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .order-actions { display: flex; gap: 10px; width: 100%; max-width: 320px; }
        .order-actions button { flex: 1; padding: 12px; font-size: 1rem; font-weight: 700; border-radius: 8px; cursor: pointer; border: none; }
        .btn-buy { background: #fed7d7; color: #c53030; }
        .btn-sell { background: #ebf8ff; color: #2b6cb0; }
        .ranking-item { display: flex; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #edf2f7; font-size: 0.95rem; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div style="width:100%; display:flex; justify-content:center; margin-bottom:15px;">
        <div class="auth-area" id="login-form-area">
            <input type="text" id="user-id-input" placeholder="닉네임" maxlength="12">
            <input type="password" id="user-pw-input" placeholder="비밀번호" maxlength="4">
            <button id="login-btn" style="padding: 10px 15px; cursor:pointer;">계정 접속</button>
        </div>
        <div id="logged-in-status-area" class="user-status-badge" style="display: none;">
            <span>🟢 <span id="current-user-display" class="name">-</span>님 투자 중</span>
            <button onclick="handleLogout()" style="cursor:pointer; border:none; background:none; color:#718096; text-decoration:underline;">로그아웃</button>
        </div>
    </div>

    <div class="game-container">
        <h1>📈 조상희 우량주 레이스</h1>
        <p class="description">시장은 쉬지 않습니다. 탭을 열어두면 시세가 계속 변동됩니다.</p>
        
        <div class="stats">
            <div>시장 상태: <span id="stock-status-text" style="color: #3182ce;">LIVE 거래 중</span></div>
            <div>보유 예수금: <span id="stock-cash">2,000,000</span> 원</div>
            <div>총 평가자산: <span id="stock-asset">2,000,000</span> 원</div>
            <div>평가 손익: <span id="stock-profit">0 원 (0.00%)</span></div>
        </div>

        <div class="stock-market-board" id="market-board"></div>

        <div class="message" id="stock-message">종목을 클릭해 10분 차트를 확인하세요.</div>

        <div class="order-panel" id="order-panel" style="visibility: hidden;">
            <div class="order-title">📌 <span id="selected-stock-name">-</span> 주문</div>
            <div class="order-inputs">
                <input type="number" id="global-quantity" min="1" value="1">
                <button onclick="fillCombinedMaxQuantity()" style="padding:8px; cursor:pointer;">최대</button>
            </div>
            <div class="order-actions">
                <button class="btn-buy" onclick="tradeStock('buy')">매수</button>
                <button class="btn-sell" onclick="tradeStock('sell')">매도</button>
            </div>
        </div>
    </div>

    <div class="ranking-container">
        <div class="live-users-panel">
            <strong>🟢 실시간 접속자</strong>
            <div id="live-users-list-zone" style="margin-top:5px;">로그인 시 활성화</div>
        </div>
        <h2>🏆 랭킹전</h2>
        <ul class="ranking-list" id="ranking-list"></ul>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCcFkzVkZ2ui3WSIkFbxDa3m5OvebXSfk4", authDomain: "chosanghee00001.firebaseapp.com", projectId: "chosanghee00001", storageBucket: "chosanghee00001.firebasestorage.app", messagingSenderId: "705786109560", appId: "1:705786109560:web:01b69c754e13df96e8978d" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let stockCash = 2000000; 
    let currentDocId = null; 
    let isUserLoggedIn = false;
    let selectedStockIndex = null;
    let lastTickTime = Date.now(); // 시세 보정용 시간 기록

    let stocks = [
        { name: "삼성전자", price: 68000, oldPrice: 68000, cap: "시총 405조", owned: 0, avgPrice: 0, history: [68000], detailHistory: [68000] },
        { name: "SK하이닉스", price: 172000, oldPrice: 172000, cap: "시총 125조", owned: 0, avgPrice: 0, history: [172000], detailHistory: [172000] },
        { name: "현대차", price: 245000, oldPrice: 245000, cap: "시총 51조", owned: 0, avgPrice: 0, history: [245000], detailHistory: [245000] },
        { name: "NAVER", price: 185000, oldPrice: 185000, cap: "시총 30조", owned: 0, avgPrice: 0, history: [185000], detailHistory: [185000] },
        { name: "에코프로비엠", price: 165000, oldPrice: 165000, cap: "시총 16조", owned: 0, avgPrice: 0, history: [165000], detailHistory: [165000] }
    ];

    // [시세 엔진] 백그라운드에서도 작동하도록 로직 강화
    function updatePrices() {
        const now = Date.now();
        const diff = now - lastTickTime;
        
        // 만약 탭을 오래 닫았다가 열었을 경우(5초 이상), 그 시간만큼 시세 강제 시뮬레이션
        const ticks = Math.floor(diff / 5000) || 1; 

        for(let i=0; i<ticks; i++) {
            stocks.forEach(stock => {
                stock.oldPrice = stock.price;
                let changePercent = (Math.random() * 30 - 14) / 100; // 변동성
                stock.price = Math.max(1000, Math.floor(stock.price * (1 + changePercent)));
                
                stock.history.push(stock.price);
                if (stock.history.length > 10) stock.history.shift();
                stock.detailHistory.push(stock.price);
                if (stock.detailHistory.length > 20) stock.detailHistory.shift();
            });
        }
        lastTickTime = now;
        renderStockMarket();
        if(isUserLoggedIn) syncAssetToBackend();
        loadRanking();
    }

    // 5초마다 무조건 실행
    setInterval(updatePrices, 5000);

    /* UI 렌더링 및 기능 로직 */
    function renderStockMarket() {
        const board = document.getElementById('market-board');
        if (board.children.length === 0) {
            stocks.forEach((s, i) => {
                const w = document.createElement('div');
                w.className = 'stock-row-wrapper';
                w.id = `stock-wrapper-${i}`;
                w.innerHTML = `
                    <div class="stock-item" onclick="selectStockItem(${i})">
                        <div class="stock-info"><div class="name">${s.name}</div><div class="cap" id="cap-${i}">정보 로딩 중</div></div>
                        <canvas id="mini-${i}" class="stock-chart-zone" width="80" height="35"></canvas>
                        <div class="stock-price" id="price-${i}">${s.price.toLocaleString()} 원</div>
                    </div>
                    <div class="stock-detail-chart-container" id="detail-${i}">
                        <canvas id="canvas-${i}" class="detail-canvas" width="400" height="120"></canvas>
                    </div>`;
                board.appendChild(w);
            });
        }

        stocks.forEach((s, i) => {
            const pEl = document.getElementById(`price-${i}`);
            const cEl = document.getElementById(`cap-${i}`);
            pEl.textContent = `${s.price.toLocaleString()} 원`;
            pEl.className = `stock-price ${s.price > s.oldPrice ? 'price-up' : 'price-down'}`;
            cEl.textContent = `평단: ${Math.floor(s.avgPrice).toLocaleString()} | 잔고: ${s.owned}주`;
            drawMiniChart(i);
            if(selectedStockIndex === i) drawDetailChart(i);
        });

        const totalValue = stocks.reduce((acc, cur) => acc + (cur.owned * cur.price), 0);
        const totalPurchase = stocks.reduce((acc, cur) => acc + (cur.owned * cur.avgPrice), 0);
        const asset = stockCash + totalValue;
        document.getElementById('stock-asset').textContent = asset.toLocaleString();
        document.getElementById('stock-cash').textContent = stockCash.toLocaleString();
        const profit = totalValue - totalPurchase;
        const rate = totalPurchase > 0 ? (profit / totalPurchase) * 100 : 0;
        const pEl = document.getElementById('stock-profit');
        pEl.textContent = `${profit >= 0 ? '+' : ''}${profit.toLocaleString()} 원 (${rate.toFixed(2)}%)`;
        pEl.className = profit >= 0 ? 'red-text' : 'blue-text';
    }

    window.selectStockItem = function(i) {
        if(selectedStockIndex === i) {
            document.getElementById(`stock-wrapper-${i}`).classList.remove('selected');
            document.getElementById(`detail-${i}`).classList.remove('open');
            selectedStockIndex = null;
            document.getElementById('order-panel').style.visibility = "hidden";
            return;
        }
        document.querySelectorAll('.stock-row-wrapper').forEach(el => el.classList.remove('selected'));
        document.querySelectorAll('.stock-detail-chart-container').forEach(el => el.classList.remove('open'));
        selectedStockIndex = i;
        document.getElementById(`stock-wrapper-${i}`).classList.add('selected');
        document.getElementById(`detail-${i}`).classList.add('open');
        document.getElementById('selected-stock-name').textContent = stocks[i].name;
        if(isUserLoggedIn) document.getElementById('order-panel').style.visibility = "visible";
        drawDetailChart(i);
    }

    function drawMiniChart(i) {
        const ctx = document.getElementById(`mini-${i}`).getContext('2d');
        const h = stocks[i].history;
        ctx.clearRect(0,0,80,35);
        ctx.strokeStyle = h[h.length-1] >= h[h.length-2] ? '#e53e3e' : '#3182ce';
        ctx.beginPath();
        h.forEach((p, idx) => {
            const x = idx * 8;
            const y = 35 - ((p - Math.min(...h)) / (Math.max(...h)-Math.min(...h) || 1)) * 25 - 5;
            idx === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        });
        ctx.stroke();
    }

    function drawDetailChart(i) {
        const ctx = document.getElementById(`canvas-${i}`).getContext('2d');
        const h = stocks[i].detailHistory;
        ctx.clearRect(0,0,400,120);
        ctx.strokeStyle = h[h.length-1] >= h[0] ? '#f56565' : '#4299e1';
        ctx.lineWidth = 2;
        ctx.beginPath();
        h.forEach((p, idx) => {
            const x = idx * 20;
            const y = 120 - ((p - Math.min(...h)) / (Math.max(...h)-Math.min(...h) || 1)) * 90 - 15;
            idx === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        });
        ctx.stroke();
    }

    /* 거래 및 계정 로직 (Firebase 연동) */
    document.getElementById('login-btn').onclick = async () => {
        const id = document.getElementById('user-id-input').value;
        const pw = document.getElementById('user-pw-input').value;
        if(!id || !pw) return;
        const q = query(collection(db, "stock_rankings"), where("userId", "==", id));
        const snap = await getDocs(q);
        if(!snap.empty) {
            const user = snap.docs[0];
            if(user.data().userPw !== pw) { alert("비밀번호 불일치"); return; }
            currentDocId = user.id;
            stockCash = user.data().cash || 2000000;
            if(user.data().ownedStocks) user.data().ownedStocks.forEach((cnt, idx) => stocks[idx].owned = cnt);
            if(user.data().avgPrices) user.data().avgPrices.forEach((prc, idx) => stocks[idx].avgPrice = prc);
        } else {
            const res = await addDoc(collection(db, "stock_rankings"), { userId: id, userPw: pw, score: 2000000, cash: 2000000, ownedStocks:[0,0,0,0,0], avgPrices:[0,0,0,0,0], lastActive: new Date() });
            currentDocId = res.id;
        }
        isUserLoggedIn = true;
        document.getElementById('login-form-area').style.display = "none";
        document.getElementById('logged-in-status-area').style.display = "flex";
        document.getElementById('current-user-display').textContent = id;
        renderStockMarket();
    };

    window.tradeStock = async (type) => {
        const s = stocks[selectedStockIndex];
        const qty = parseInt(document.getElementById('global-quantity').value);
        if(type === 'buy') {
            if(stockCash < s.price * qty) return alert("잔액 부족");
            stockCash -= s.price * qty;
            s.avgPrice = ((s.owned * s.avgPrice) + (s.price * qty)) / (s.owned + qty);
            s.owned += qty;
        } else {
            if(s.owned < qty) return alert("주식 부족");
            stockCash += s.price * qty;
            s.owned -= qty;
            if(s.owned === 0) s.avgPrice = 0;
        }
        renderStockMarket();
        syncAssetToBackend();
    };

    async function syncAssetToBackend() {
        if(!currentDocId) return;
        const total = stockCash + stocks.reduce((acc, cur) => acc + (cur.owned * cur.price), 0);
        await updateDoc(doc(db, "stock_rankings", currentDocId), { score: total, cash: stockCash, ownedStocks: stocks.map(s=>s.owned), avgPrices: stocks.map(s=>s.avgPrice), lastActive: new Date() });
    }

    async function loadRanking() {
        const q = query(collection(db, "stock_rankings"), orderBy("score", "desc"), limit(10));
        const snap = await getDocs(q);
        const list = document.getElementById('ranking-list');
        list.innerHTML = "";
        snap.forEach((d, i) => {
            const data = d.data();
            list.innerHTML += `<li class="ranking-item"><span>${i+1}위. ${data.userId}</span> <span>${Math.floor(data.score).toLocaleString()}원</span></li>`;
        });
    }

    renderStockMarket();
</script>
</body>
</html>
