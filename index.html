<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조상희 숫자게임랭킹전</title>
    <style>
        /* 글로벌 사이버 펑크 / 아케이드 테마 스타일 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* 메인 프레임: 네온 그라데이션 테두리 효과 */
        .main-wrapper {
            display: flex;
            gap: 30px;
            max-width: 1000px;
            width: 100%;
            flex-wrap: wrap;
            background: rgba(10, 15, 30, 0.85);
            padding: 30px;
            border-radius: 20px;
            border: 3px solid transparent;
            background-image: linear-gradient(rgba(10, 15, 30, 0.9), rgba(10, 15, 30, 0.9)), 
                              linear-gradient(135deg, #00f2fe 0%, #4facfe 40%, #ff0844 70%, #ffb199 100%);
            background-origin: border-box;
            background-clip: content-box, border-box;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.25), inset 0 0 20px rgba(255, 8, 68, 0.15);
        }

        /* 컨테이너 공통: 아케이드 스크린 느낌 */
        .game-container, .ranking-container {
            background: rgba(20, 26, 46, 0.7);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(0, 242, 254, 0.3);
            flex: 1;
            min-width: 320px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
        }

        .ranking-container {
            max-height: 520px;
            overflow-y: auto;
        }

        /* 스크롤바 커스텀 */
        .ranking-container::-webkit-scrollbar {
            width: 6px;
        }
        .ranking-container::-webkit-scrollbar-thumb {
            background: #00f2fe;
            border-radius: 10px;
        }

        h1 {
            font-size: 2rem;
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.6);
            margin-top: 0;
            margin-bottom: 5px;
        }
        
        h2 {
            font-size: 1.6rem;
            color: #ff0844;
            text-shadow: 0 0 10px rgba(255, 8, 68, 0.6);
            margin-top: 0;
            margin-bottom: 5px;
        }

        .description { 
            color: #8fa0dd; 
            font-size: 0.9rem; 
            margin-bottom: 25px; 
        }
        
        /* 입력 영역 디자인 */
        .auth-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
        }
        
        /* 게임 스탯 보드 */
        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            border-left: 4px solid #00f2fe;
        }
        .stats span { color: #00f2fe; font-weight: bold; text-shadow: 0 0 5px rgba(0, 242, 254, 0.4); }
        #current-streak { color: #ff0844; text-shadow: 0 0 5px rgba(255, 8, 68, 0.4); }

        /* 상태 알림 메시지 */
        .message { 
            font-size: 1.15rem; 
            font-weight: bold; 
            margin: 20px 0; 
            min-height: 35px; 
            color: #00f2fe;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.3);
        }
        
        /* 인풋 폼 스타일링 */
        input[type="number"], input[type="text"], input[type="password"] {
            padding: 12px;
            font-size: 1.1rem;
            background: rgba(10, 14, 28, 0.9);
            border: 2px solid rgba(0, 242, 254, 0.4);
            border-radius: 6px;
            color: #fff;
            text-align: center;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #ff0844;
            box-shadow: 0 0 10px rgba(255, 8, 68, 0.5);
        }
        input::placeholder {
            color: #53658a;
        }
        
        input[type="number"] { width: 100px; margin-right: 8px; }
        .auth-area input { width: 80%; max-width: 260px; }
        
        /* 미래지향적 버튼 스타일 */
        button {
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            color: #090a0f;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
            transition: all 0.2s ease;
        }
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.6);
        }
        button:active {
            transform: translateY(1px);
        }
        .restart-btn { 
            background: linear-gradient(135deg, #f5515f 0%, #9f031b 100%); 
            color: white;
            margin-top: 15px; 
            display: none; 
            box-shadow: 0 4px 15px rgba(245, 81, 95, 0.4);
        }
        .restart-btn:hover {
            box-shadow: 0 6px 20px rgba(245, 81, 95, 0.6);
        }
        
        /* 명예의 전당 리스트 스타일 */
        .ranking-list { text-align: left; margin-top: 10px; padding-left: 0; list-style: none; }
        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 1.05rem;
        }
        /* 상위 3등 하이라이트 효과 */
        .ranking-item:nth-child(1) { font-weight: bold; color: #ffd700; text-shadow: 0 0 8px rgba(255, 215, 0, 0.5); } 
        .ranking-item:nth-child(2) { font-weight: bold; color: #e0e0e0; text-shadow: 0 0 8px rgba(224, 224, 224, 0.5); } 
        .ranking-item:nth-child(3) { font-weight: bold; color: #cd7f32; text-shadow: 0 0 8px rgba(205, 127, 50, 0.5); } 
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- 왼쪽: 아케이드 게이밍 스크린 -->
    <div class="game-container">
        <h1>🔢 조상희숫자 랭킹전</h1>
        <p class="description">조상희의 아케이드 에디션 : 백엔드 실시간 연동</p>
        
        <div class="auth-area">
            <input type="text" id="user-id-input" placeholder="닉네임(아이디) 입력" maxlength="12">
            <input type="password" id="user-pw-input" placeholder="비밀번호 4자리 숫자" maxlength="4">
        </div>

        <div class="stats">
            <div>남은 기회: <span id="chances">5</span>회</div>
            <div>현재 연승: <span id="current-streak">0</span>승</div>
        </div>

        <div class="message" id="message">조상희의 숫자 매치에 도전하라! 계정 세팅 후 시작!</div>

        <div id="input-area">
            <input type="number" id="guess-input" min="1" max="100" placeholder="1-100">
            <button id="guess-btn">확인</button>
        </div>

        <button class="restart-btn" id="restart-btn">다시 시작하기</button>
    </div>

    <!-- 오른쪽: 네온 랭킹 보드 (TOP 20) -->
    <div class="ranking-container">
        <h2>🏆 조상희 명예의 전당 (TOP 20)</h2>
        <p class="description">실시간 조상희 게임 마스터 랭킹 리스트</p>
        <ul class="ranking-list" id="ranking-list">
            <li class="ranking-item">데이터 로딩 중...</li>
        </ul>
    </div>
</div>

<!-- Firebase 라이브러리 모드 -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Firebase 설정 정보
    const firebaseConfig = {
        apiKey: "AIzaSyCcFkzVkZ2ui3WSIkFbxDa3m5OvebXSfk4",
        authDomain: "chosanghee00001.firebaseapp.com",
        projectId: "chosanghee00001",
        storageBucket: "chosanghee00001.firebasestorage.app",
        messagingSenderId: "705786109560",
        appId: "1:705786109560:web:01b69c754e13df96e8978d",
        measurementId: "G-E566V33J74"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let targetNumber;
    let remainingChances;
    let currentStreak = 0;

    const messageEl = document.getElementById('message');
    const chancesEl = document.getElementById('chances');
    const currentStreakEl = document.getElementById('current-streak');
    const guessInput = document.getElementById('guess-input');
    const userIdInput = document.getElementById('user-id-input');
    const userPwInput = document.getElementById('user-pw-input');
    const guessBtn = document.getElementById('guess-btn');
    const restartBtn = document.getElementById('restart-btn');

    function initGame() {
        targetNumber = Math.floor(Math.random() * 100) + 1;
        remainingChances = 5; 
        chancesEl.textContent = remainingChances;
        currentStreakEl.textContent = currentStreak;
        messageEl.textContent = "조상희가 숨긴 1~100 사이의 숫자를 맞춰보세요.";
        messageEl.style.color = "#00f2fe";
        guessInput.value = "";
        guessInput.disabled = false;
        guessBtn.disabled = false;
        restartBtn.style.display = "none";
        loadRanking(); 
    }

    async function saveScoreToBackend(userId, userPw, score) {
        if (!userId || !userPw) return;
        
        try {
            const q = query(collection(db, "rankings"), where("userId", "==", userId));
            const querySnapshot = await getDocs(q);
            
            if (!querySnapshot.empty) {
                let existingDoc = querySnapshot.docs[0];
                let existingData = existingDoc.data();
                
                if (existingData.userPw !== userPw) {
                    alert("⚠️ 조상희 보안관제: 기존 닉네임과 비밀번호가 일치하지 않아 기록이 차단되었습니다!");
                    return;
                }
                
                if (parseInt(score) <= existingData.score) {
                    console.log("기존 최고 기록이 더 높거나 같음.");
                    return;
                }
            }

            await addDoc(collection(db, "rankings"), {
                userId: userId,
                userPw: userPw, 
                score: parseInt(score),
                timestamp: new Date()
            });
            
            alert(`🎉 조상희 랭킹전 통보: '${userId}'님의 새로운 랭커 기록(${score}연승)이 박제되었습니다.`);
            loadRanking(); 
        } catch (e) {
            console.error("점수 저장 실패: ", e);
        }
    }

    async function loadRanking() {
        const rankingListEl = document.getElementById('ranking-list');
        rankingListEl.innerHTML = "";

        try {
            const q = query(collection(db, "rankings"), orderBy("score", "desc"), limit(20));
            const querySnapshot = await getDocs(q);
            
            if(querySnapshot.empty) {
                rankingListEl.innerHTML = "<li class='ranking-item'>조상희 서버: 등록된 랭커가 없습니다. 첫 챔피언이 되십시오!</li>";
                return;
            }

            let rank = 1;
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const li = document.createElement('li');
                li.className = 'ranking-item';
                li.innerHTML = `<span>${rank}위. ${data.userId}</span> <span>${data.score} 연승</span>`;
                rankingListEl.appendChild(li);
                rank++;
            });
        } catch (e) {
            console.error("랭킹 로드 실패: ", e);
            rankingListEl.innerHTML = "<li class='ranking-item'>조상희 서버 연결 실패 (보안 규칙을 확인하세요)</li>";
        }
    }

    function checkGuess() {
        const userId = userIdInput.value.trim();
        const userPw = userPwInput.value.trim();
        const userGuess = parseInt(guessInput.value);

        if (!userId || !userPw) {
            alert("조상희 랭킹전에 참여하려면 닉네임과 비밀번호를 모두 채워야 합니다.");
            if(!userId) userIdInput.focus();
            else userPwInput.focus();
            return;
        }

        if (isNaN(userGuess) || userGuess < 1 || userGuess > 100) {
            messageEl.textContent = "조상희 시스템 경고: 범위 초과! (1~100 사이)";
            messageEl.style.color = "#ff0844";
            return;
        }

        userIdInput.disabled = true;
        userPwInput.disabled = true;
        
        remainingChances--;
        chancesEl.textContent = remainingChances;

        if (userGuess === targetNumber) {
            currentStreak++;
            messageEl.textContent = `🎉 CORRECT! 조상희의 정답은 [ ${targetNumber} ]`;
            messageEl.style.color = "#00f2fe";
            endGame(true);
        } else if (remainingChances === 0) {
            messageEl.textContent = `💥 GAME OVER! 조상희가 숨긴 수는 [ ${targetNumber} ] 이었습니다.`;
            messageEl.style.color = "#ff0844";
            endGame(false);
        } else {
            if (userGuess < targetNumber) {
                messageEl.textContent = "🔼 UP! 조상희 레이더: 더 높은 수입니다.";
                messageEl.style.color = "#00f2fe";
            } else {
                messageEl.textContent = "🔽 DOWN! 조상희 레이더: 더 낮은 수입니다.";
                messageEl.style.color = "#ffb199";
            }
        }
        guessInput.value = "";
        guessInput.focus();
    }

    function endGame(isWin) {
        guessInput.disabled = true;
        guessBtn.disabled = true;
        restartBtn.style.display = "inline-block";
        currentStreakEl.textContent = currentStreak;

        if (!isWin) {
            if (currentStreak > 0) {
                saveScoreToBackend(userIdInput.value.trim(), userPwInput.value.trim(), currentStreak);
            }
            currentStreak = 0; 
            userIdInput.disabled = false;
            userPwInput.disabled = false;
        } else {
            setTimeout(() => {
                alert(`조상희 연승 컴플리트! 이어서 ${currentStreak + 1}번째 판을 이어갑니다.`);
                initGame();
            }, 1000);
        }
    }

    guessBtn.addEventListener("click", checkGuess);
    restartBtn.addEventListener("click", initGame);
    guessInput.addEventListener("keyup", function(event) {
        if (event.key === "Enter") checkGuess();
    });

    initGame();
</script>

</body>
</html>
