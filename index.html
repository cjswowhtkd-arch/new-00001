<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ 차원의 균열</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05060e;--s1:#080a18;--s2:#0c0f22;--s3:#10142e;
  --b1:#1a1f3d;--b2:#252b50;--b3:#323868;
  --acc:#e8005a;--acc2:#7700ee;
  --gold:#f5a800;--gold2:#ff8800;
  --c1:#00d4ff;--c2:#cc00ff;--c3:#00ff88;
  --r:#ff3355;--g:#00e87a;--w:#e8eaf0;--m:#7a7ea8;--d:#3a3e68;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--w);min-height:100vh;overflow-x:hidden;user-select:none}
.kr{font-family:'Black Han Sans',sans-serif}

/* ── ANIMATED BG ── */
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 80% 50% at 20% 30%,rgba(119,0,238,.08) 0%,transparent 60%),
  radial-gradient(ellipse 60% 40% at 80% 70%,rgba(232,0,90,.06) 0%,transparent 60%);
  pointer-events:none;z-index:0}

/* ── LAYOUT ── */
.root{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:10px;display:flex;flex-direction:column;gap:10px}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 14px;background:rgba(8,10,24,.9);border:1px solid var(--b2);border-radius:14px;backdrop-filter:blur(12px)}
.logo{font-family:'Black Han Sans',sans-serif;font-size:1.1rem;background:linear-gradient(90deg,#e8005a,#7700ee,#f5a800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex:1;min-width:100px}
.pill{background:var(--s2);border:1px solid var(--b1);padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:700;white-space:nowrap}
.pill b{color:var(--gold)}
.life-pill{display:flex;align-items:center;gap:6px}
.life-track{width:70px;height:6px;background:var(--s1);border-radius:3px;overflow:hidden}
.life-bar{height:100%;border-radius:3px;transition:width .4s,background .4s;background:var(--g)}
.life-bar.warn{background:var(--gold);animation:pulse .5s infinite alternate}
.life-bar.crit{background:var(--r);animation:pulse .3s infinite alternate}
@keyframes pulse{from{filter:brightness(1)}to{filter:brightness(2)}}

/* ── MAIN GRID ── */
.mgrid{display:grid;grid-template-columns:240px 1fr 240px;gap:10px}
@media(max-width:960px){.mgrid{grid-template-columns:1fr}}

/* ── PANEL ── */
.panel{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:12px;position:relative;overflow:hidden}
.panel::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:14px 14px 0 0}
.p-mine::after{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.p-field::after{background:linear-gradient(90deg,var(--c1),var(--c2))}
.p-gacha::after{background:linear-gradient(90deg,var(--acc),var(--acc2))}
.ptitle{font-family:'Black Han Sans',sans-serif;font-size:.88rem;color:var(--m);margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* ── RHYTHM MINE ── */
.rhythm-wrap{position:relative;height:64px;background:#030408;border-radius:12px;overflow:hidden;margin:8px 0;border:2px solid var(--b2);cursor:pointer}
.rhythm-wrap:hover{border-color:var(--b3)}
/* 레인들 */
.r-lane{position:absolute;top:0;height:100%;width:20%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;pointer-events:none;z-index:1}
.r-lane.perfect{background:rgba(245,168,0,.18);border-left:2px solid rgba(245,168,0,.7);border-right:2px solid rgba(245,168,0,.7)}
.r-lane.good{background:rgba(0,212,255,.08);border-left:1px solid rgba(0,212,255,.3);border-right:1px solid rgba(0,212,255,.3)}
.r-lane.miss{background:rgba(255,51,85,.08);border-left:1px dashed rgba(255,51,85,.2);border-right:1px dashed rgba(255,51,85,.2)}
.r-lane-label{writing-mode:horizontal-tb;font-size:.58rem;color:rgba(255,255,255,.3);position:absolute;bottom:3px}
/* 커서 */
.r-cursor{position:absolute;top:0;width:6px;height:100%;z-index:4;pointer-events:none}
.r-cursor-body{width:100%;height:100%;background:#fff;border-radius:3px;box-shadow:0 0 12px #fff,0 0 30px rgba(255,255,255,.5)}
/* 판정 플래시 */
.r-flash{position:absolute;inset:0;opacity:0;z-index:5;pointer-events:none;transition:opacity .06s;border-radius:10px}
/* 판정 텍스트 */
.r-judge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Black Han Sans',sans-serif;font-size:1.4rem;z-index:6;pointer-events:none;opacity:0;transition:all .12s}

.combo-display{text-align:center;margin:4px 0}
.combo-num{font-family:'Black Han Sans',sans-serif;font-size:2.2rem;color:var(--gold);line-height:1;transition:transform .08s}
.combo-num.bounce{transform:scale(1.5) rotate(-4deg)}
.combo-sub{font-size:.68rem;color:var(--m);margin-top:2px}
.mine-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin:6px 0}
.ms-card{background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:5px 6px;text-align:center}
.ms-label{font-size:.6rem;color:var(--d)}
.ms-val{font-size:.82rem;font-weight:700;color:var(--gold)}

/* ── UPGRADES ── */
.upg-list{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.upg-row{background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:7px 10px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
.upg-row:hover:not(.mx){border-color:var(--gold);background:var(--s3)}
.upg-row.mx{opacity:.4;cursor:default}
.upg-icon{font-size:1rem;width:22px;text-align:center}
.upg-info{flex:1}
.upg-name{font-size:.72rem;color:var(--m)}
.upg-val{font-size:.8rem;font-weight:700;color:var(--w)}
.upg-right{text-align:right}
.upg-cost{font-size:.72rem;color:var(--gold);font-weight:700}
.upg-lv{font-size:.62rem;color:var(--d)}
.upg-bar{height:3px;border-radius:2px;background:var(--b1);margin-top:4px;overflow:hidden}
.upg-bar-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--gold));border-radius:2px;transition:width .3s}

/* ── BATTLEFIELD ── */
.bf-container{position:relative}
.bf-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.wave-status{font-size:.78rem;color:var(--m);display:flex;align-items:center;gap:8px}
.wave-status b{color:var(--r)}
/* 그리드 전장 */
.bf{position:relative;height:280px;background:linear-gradient(180deg,#030612 0%,#060b1e 40%,#080e22 70%,#0a1030 100%);border-radius:12px;border:1px solid var(--b2);overflow:hidden}
/* 격자 */
.bf-grid-lines{position:absolute;inset:0;pointer-events:none;z-index:1}
/* 아군 배치존 */
.hero-zone{position:absolute;left:0;top:0;width:42%;height:100%;background:rgba(0,212,255,.025);border-right:1px dashed rgba(0,212,255,.15);pointer-events:none;z-index:1}
/* 진입선 */
.entry-line{position:absolute;right:0;top:0;width:2px;height:100%;background:linear-gradient(180deg,transparent,rgba(255,51,85,.5),transparent);z-index:2}
/* 전장 배치 셀 */
.place-cells{position:absolute;left:0;top:0;width:42%;height:100%;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(4,1fr);gap:3px;padding:6px;z-index:5}
.pcell{border:1px dashed rgba(0,212,255,.15);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;font-size:.6rem;color:rgba(0,212,255,.2)}
.pcell:hover{background:rgba(0,212,255,.08);border-color:rgba(0,212,255,.5);color:rgba(0,212,255,.6)}
.pcell.occupied{cursor:default;border-color:transparent;background:transparent}
/* 배경 행성/별 */
.bf-planet{position:absolute;border-radius:50%;opacity:.12;pointer-events:none;z-index:0}
/* FX 캔버스 */
.fx-cvs{position:absolute;inset:0;pointer-events:none;z-index:20}
/* 오버레이 */
.bf-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:30;pointer-events:none;opacity:0;transition:opacity .3s;font-family:'Black Han Sans',sans-serif;font-size:2rem}

/* ── UNIT ── */
.unit{position:absolute;z-index:10;pointer-events:none;transition:left .07s linear,top .07s linear}
.unit-inner{width:40px;height:40px;border-radius:50%;border:2px solid;background-size:cover;background-position:center;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.4rem}
.unit.hero .unit-inner{box-shadow:0 0 12px rgba(0,212,255,.4)}
.unit.enemy .unit-inner{box-shadow:0 0 10px rgba(255,51,85,.5)}
.unit-bar-wrap{position:absolute;top:-13px;left:-5px;width:50px;display:flex;flex-direction:column;gap:2px}
.ubar{height:4px;border-radius:2px;overflow:hidden}
.ubar-hp{background:#1a0011}
.ubar-hp-fill{height:100%;border-radius:2px;transition:width .1s}
.ubar-sp{background:#1a0030}
.ubar-sp-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--acc2),var(--c2));transition:width .1s}
.unit-name-tag{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:.52rem;font-weight:700;padding:1px 4px;border-radius:3px;background:rgba(0,0,0,.8)}
/* 상태이상 */
.status-icon{position:absolute;top:-4px;right:-4px;font-size:.7rem;background:rgba(0,0,0,.8);border-radius:50%;width:14px;height:14px;display:flex;align-items:center;justify-content:center;line-height:1}

/* ── DAMAGE POPUP ── */
.dpop{position:absolute;font-family:'Black Han Sans',sans-serif;animation:dpopAnim .8s ease-out forwards;pointer-events:none;z-index:25;text-shadow:1px 1px 4px #000;line-height:1}
@keyframes dpopAnim{0%{opacity:1;transform:translateY(0) scale(1)}40%{opacity:1;transform:translateY(-18px) scale(1.2)}100%{opacity:0;transform:translateY(-40px) scale(.7)}}
.heal-pop{color:var(--g)}
.crit-pop{color:var(--gold);font-size:1rem}

/* ── SKILL BAR ── */
.skill-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;min-height:46px;align-items:flex-start}
.sk-btn{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:6px 10px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;min-width:72px;text-align:center;flex-shrink:0}
.sk-btn .sk-n{font-size:.65rem;font-weight:700;color:var(--w);display:block}
.sk-btn .sk-s{font-size:.6rem;display:block;margin-top:1px}
.sk-btn .sk-t{font-size:.58rem;color:var(--m);display:block;margin-top:1px}
.sk-btn .sk-bar{position:absolute;bottom:0;left:0;height:2px;transition:width .1s;border-radius:0 0 8px 8px}
.sk-btn.rdy{border-color:var(--c2);background:rgba(204,0,255,.12);cursor:pointer}
.sk-btn.rdy::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(204,0,255,.2),transparent 70%);pointer-events:none}
.sk-btn:not(.rdy){cursor:default}

/* ── BENCH ── */
.bench{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;min-height:64px}
.hero-card{position:relative;cursor:pointer;transition:transform .15s;flex-shrink:0}
.hero-card:hover{transform:translateY(-4px) scale(1.04)}
.hc-art{width:50px;height:60px;border-radius:10px;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:1.8rem;position:relative;overflow:hidden;flex-direction:column;gap:0}
.hc-art::before{content:'';position:absolute;inset:0;opacity:.15}
.hc-grade{position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:.52rem;font-weight:700;padding:2px 0;backdrop-filter:blur(4px)}
.hc-lv{position:absolute;top:2px;left:2px;background:rgba(0,0,0,.85);font-size:.58rem;font-weight:700;padding:1px 3px;border-radius:3px;color:var(--gold)}
.hc-cnt{position:absolute;top:2px;right:2px;background:var(--acc);border-radius:6px;font-size:.58rem;font-weight:700;padding:1px 3px}
.hc-nm{font-size:.58rem;text-align:center;color:var(--m);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:50px}

/* ── GACHA PANEL ── */
.gacha-screen{height:160px;background:#000;border-radius:12px;border:2px solid var(--b2);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;margin:8px 0;transition:all .4s}
.gacha-screen.R{border-color:var(--c1);box-shadow:0 0 20px rgba(0,212,255,.4),inset 0 0 20px rgba(0,212,255,.1)}
.gacha-screen.E{border-color:var(--c2);box-shadow:0 0 30px rgba(204,0,255,.5),inset 0 0 30px rgba(204,0,255,.15)}
.gacha-screen.L{border-color:var(--gold);box-shadow:0 0 50px rgba(245,168,0,.7),inset 0 0 50px rgba(245,168,0,.2);animation:lFlicker 1s infinite alternate}
@keyframes lFlicker{from{box-shadow:0 0 40px rgba(245,168,0,.5),inset 0 0 40px rgba(245,168,0,.15)}to{box-shadow:0 0 70px rgba(255,120,0,.8),inset 0 0 60px rgba(255,80,0,.25)}}
.gacha-hero-art{font-size:5rem;transition:all .4s;pointer-events:none}
@keyframes reveal{from{transform:scale(.2) rotate(-20deg);filter:brightness(10)}to{transform:scale(1) rotate(0);filter:brightness(1)}}
.gacha-hero-art.shown{animation:reveal .45s cubic-bezier(.175,.885,.32,1.275)}
.gacha-badge{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);padding:3px 14px;border-radius:20px;font-size:.72rem;font-weight:700;backdrop-filter:blur(8px);white-space:nowrap}
.pity-info{font-size:.7rem;color:var(--m);text-align:center;margin:2px 0 6px}
.pity-info b{color:var(--gold)}
.gacha-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px}
/* 합성 */
.synth-wrap{background:var(--s2);border:1px dashed var(--b2);border-radius:10px;padding:10px;margin-top:10px}
.synth-slots{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:6px}
.ss{width:40px;height:48px;border-radius:7px;border:1.5px dashed var(--b2);display:flex;align-items:center;justify-content:center;font-size:.9rem;color:var(--d);background:#030408;cursor:pointer;transition:all .18s;background-size:cover;background-position:center;position:relative;overflow:hidden;font-size:.6rem}
.ss:hover{border-color:var(--acc);background:rgba(232,0,90,.08)}
.ss.on{border-style:solid;border-color:var(--acc)}
.ss-arrow{color:var(--d);font-size:1.2rem;line-height:48px}
.ss-result{width:44px;height:52px;border-radius:8px;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:1rem;background:#030408;background-size:cover;background-position:center}

/* ── BUTTON ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 14px;border-radius:9px;border:none;cursor:pointer;font-weight:700;font-size:.82rem;transition:all .15s;width:100%;color:#fff;position:relative;overflow:hidden;font-family:'Noto Sans KR',sans-serif}
.btn::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,.1);opacity:0;transition:opacity .12s}
.btn:hover::before{opacity:1}.btn:active{transform:scale(.96)}
.btn:disabled{background:#111420!important;color:#3a3e68;cursor:not-allowed!important;transform:none!important}
.btn-acc{background:linear-gradient(135deg,var(--acc),var(--acc2))}
.btn-gold{background:linear-gradient(135deg,#a06000,var(--gold))}
.btn-red{background:linear-gradient(135deg,#880022,var(--r))}
.btn-cyan{background:linear-gradient(135deg,#005580,var(--c1))}
.btn-sm{padding:6px 10px;font-size:.72rem;width:auto}
.btn-xs{padding:3px 8px;font-size:.65rem;width:auto;border-radius:6px}

/* ── TOAST ── */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--s2);border:1px solid;padding:9px 20px;border-radius:12px;font-weight:700;font-size:.82rem;z-index:9000;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── GAMEOVER ── */
#go{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#go.on{display:flex}
#go h2{font-family:'Black Han Sans',sans-serif;font-size:3rem;color:var(--r);text-shadow:0 0 40px var(--r),0 0 80px rgba(255,0,50,.4)}
#go .stats{color:var(--m);font-size:.9rem;text-align:center;line-height:1.8}
/* 위험 테두리 */
#danger{position:fixed;inset:0;border:8px solid var(--r);pointer-events:none;z-index:8000;opacity:0;transition:opacity .3s;border-radius:0}
#danger.on{opacity:1;animation:dp .35s infinite alternate}
@keyframes dp{from{opacity:.4}to{opacity:1}}

/* 스크롤 */
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
</style>
</head>
<body>

<div id="danger"></div>
<div id="go">
  <h2>💀 GAME OVER</h2>
  <div class="stats" id="go-stats">스테이지: 1</div>
  <button class="btn btn-red" style="width:200px" onclick="location.reload()">🔄 처음부터</button>
</div>

<div class="root">
<!-- ─── HEADER ─── -->
<header class="hdr">
  <div class="logo kr">🌌 차원의 균열</div>
  <div class="pill">💰 <b id="h-gold">50</b>G</div>
  <div class="pill">⚔️ Wave <b id="h-wave">1</b></div>
  <div class="pill life-pill">
    ❤️
    <div class="life-track"><div class="life-bar" id="h-life" style="width:100%"></div></div>
    <b id="h-life-n">20</b>/20
  </div>
  <div class="pill">천장 <b id="h-pity" style="color:var(--gold)">0</b>/80
    <span id="h-pity-bar" style="display:inline-block;width:40px;height:4px;background:var(--b1);border-radius:2px;vertical-align:middle;margin-left:4px;overflow:hidden"><span id="h-pity-fill" style="display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--acc),var(--gold));border-radius:2px;transition:width .3s"></span></span>
  </div>
  <div class="pill">콤보 <b id="h-combo" style="color:var(--c1)">×1.0</b></div>
</header>

<!-- ─── MAIN ─── -->
<div class="mgrid">

<!-- ① 채굴 + 업그레이드 -->
<div class="panel p-mine">
  <div class="ptitle">⛏️ 에테르 채굴</div>
  <!-- 리듬 채굴 -->
  <div class="rhythm-wrap" id="rw" onclick="mine()">
    <!-- 레인 5개: MISS / GOOD / PERFECT / GOOD / MISS -->
    <div class="r-lane miss" style="left:0;top:0"><span class="r-lane-label">MISS</span></div>
    <div class="r-lane good" style="left:20%;top:0"><span class="r-lane-label">GOOD</span></div>
    <div class="r-lane perfect" style="left:40%;top:0"><span class="r-lane-label">PERFECT</span></div>
    <div class="r-lane good" style="left:60%;top:0"><span class="r-lane-label">GOOD</span></div>
    <div class="r-lane miss" style="left:80%;top:0"><span class="r-lane-label">MISS</span></div>
    <!-- 커서 -->
    <div class="r-cursor" id="rcur"><div class="r-cursor-body"></div></div>
    <!-- 플래시 -->
    <div class="r-flash" id="rflash"></div>
    <!-- 판정 -->
    <div class="r-judge" id="rjudge"></div>
  </div>
  <div class="combo-display">
    <div class="combo-num" id="cnum">0</div>
    <div class="combo-sub">COMBO · 보너스 <span id="cbonus" style="color:var(--gold)">×1.00</span></div>
  </div>
  <div class="mine-stats">
    <div class="ms-card"><div class="ms-label">기본</div><div class="ms-val" id="ms-base">2G</div></div>
    <div class="ms-card"><div class="ms-label">PERFECT</div><div class="ms-val" id="ms-perf">15G</div></div>
    <div class="ms-card"><div class="ms-label">속도</div><div class="ms-val" id="ms-spd">2.5</div></div>
  </div>
  <button class="btn btn-gold" style="margin-top:4px" onclick="mine()">⛏️ 채굴!</button>

  <!-- 업그레이드 -->
  <div class="ptitle" style="margin-top:14px;margin-bottom:6px">📈 강화</div>
  <div class="upg-list" id="upg-list"></div>
</div>

<!-- ② 전장 (중앙) -->
<div class="panel p-field">
  <div class="bf-header">

function uv(k){const u=UPGRADES.find(x=>x.k===k);return u.base+u.inc*upgLv[k]}
function uc(k){const u=UPGRADES.find(x=>x.k===k);return Math.round(u.cost*(1+0.85*upgLv[k]))}

// ════════════════════════════════════════════════
//  FX CANVAS
// ════════════════════════════════════════════════
const fc=document.getElementById('fx'),fx=fc.getContext('2d');
function resFC(){fc.width=fc.offsetWidth;fc.height=fc.offsetHeight}
resFC();window.addEventListener('resize',resFC);

function spawnP(x,y,col,n,sz=3){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=.8+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,l:1,col,sz:sz*(Math.random()*.5+.5)});
  }
}
function animFX(){
  fx.clearRect(0,0,fc.width,fc.height);
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=.16;p.l-=.025;
    fx.globalAlpha=p.l;fx.fillStyle=p.col;
    fx.beginPath();fx.arc(p.x,p.y,p.sz*Math.max(0,p.l),0,Math.PI*2);fx.fill();
    return p.l>0;
  });
  fx.globalAlpha=1;
  requestAnimationFrame(animFX);
}
animFX();

// ════════════════════════════════════════════════
//  RHYTHM MINE
// ════════════════════════════════════════════════
let rPos=0,rDir=1,rPhase=0;
const LANES=[{type:'miss',range:[0,20],color:'rgba(255,51,85,.5)'},
             {type:'good',range:[20,40],color:'rgba(0,212,255,.6)'},
             {type:'perfect',range:[40,60],color:'rgba(245,168,0,.9)'},
             {type:'good',range:[60,80],color:'rgba(0,212,255,.6)'},
             {type:'miss',range:[80,100],color:'rgba(255,51,85,.5)'}];

function getLane(p){return LANES.find(l=>p>=l.range[0]&&p<l.range[1])||LANES[0]}

setInterval(()=>{
  const spd=uv('mSpd');
  rPos+=spd*rDir;
  if(rPos>=100||rPos<=0){rDir*=-1;rPos=Math.max(0,Math.min(100,rPos))}
  document.getElementById('rcur').style.left=rPos+'%';
},22);

function mine(){
  if(gameOver)return;
  const lane=getLane(rPos);
  const flash=document.getElementById('rflash');
  const judge=document.getElementById('rjudge');
  flash.style.background=lane.color;
  flash.style.opacity='.35';
  setTimeout(()=>flash.style.opacity='0',90);

  let earned=0,label='',col='';
  if(lane.type==='perfect'){
    combo++;
    const mult=1+combo*.10;
    earned=Math.round(uv('mPerf')*mult);
    label='PERFECT!';col='#f5a800';
    spawnP(rPos*2.56,32,col,25,4);
  } else if(lane.type==='good'){
    combo=Math.max(0,combo-0);
    earned=Math.round((uv('mBase')+uv('mPerf'))/2);
    label='GOOD';col='#00d4ff';
    spawnP(rPos*2.56,32,col,10,3);
  } else {
    combo=Math.max(0,combo-3);
    earned=Math.round(uv('mBase'));
    label='MISS';col='#ff3355';
  }
  gold+=Math.max(1,earned);

  judge.textContent=label;judge.style.color=col;
  judge.style.opacity='1';judge.style.fontSize=lane.type==='perfect'?'1.5rem':'1.1rem';
  setTimeout(()=>judge.style.opacity='0',400);

  if(comboTimer)clearTimeout(comboTimer);
  comboTimer=setTimeout(()=>{combo=0;refreshCombo()},2500);
  refreshCombo();
  updateUI();
}

function refreshCombo(){
  const n=document.getElementById('cnum');
  n.textContent=combo;
  n.classList.add('bounce');setTimeout(()=>n.classList.remove('bounce'),100);
  const mult=(1+combo*.10).toFixed(2);
  document.getElementById('cbonus').textContent='×'+mult;
  document.getElementById('h-combo').textContent='×'+mult;
}

// ════════════════════════════════════════════════
//  UPGRADES
// ════════════════════════════════════════════════
function buildUpgList(){
  const el=document.getElementById('upg-list');el.innerHTML='';
  UPGRADES.forEach(u=>{
    const lv=upgLv[u.k],maxed=lv>=u.max,cost=uc(u.k);
    const pct=lv/u.max*100;
    const row=document.createElement('div');
    row.className='upg-row'+(maxed?' mx':'');
    row.innerHTML=`<div class="upg-icon">${u.icon}</div>
      <div class="upg-info">
        <div class="upg-name">${u.name}</div>
        <div class="upg-val">${u.fmt(uv(u.k))}</div>
        <div class="upg-bar"><div class="upg-bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="upg-right">
        <div class="upg-cost">${maxed?'MAX':cost+'G'}</div>
        <div class="upg-lv">Lv${lv}/${u.max}</div>
      </div>`;
    if(!maxed)row.onclick=()=>{
      if(gold<cost){toast('골드 부족!','#ff3355');return}
      gold-=cost;upgLv[u.k]++;
      toast(`✅ ${u.name} → Lv${upgLv[u.k]}`,'#00d4ff');
      buildUpgList();updateUI();
    };
    el.appendChild(row);
  });
}

// ════════════════════════════════════════════════
//  GACHA
// ════════════════════════════════════════════════
let pulling=false;
function pull(n){
  if(pulling)return;
  const cost=n===1?30:270;
  if(gold<cost){toast('골드 부족! 채굴하세요','#ff3355');return}
  gold-=cost;pulling=true;
  document.getElementById('g1').disabled=true;
  document.getElementById('g10').disabled=true;
  document.getElementById('gbadge').style.display='none';
  document.getElementById('gscr').className='gacha-screen';
  const art=document.getElementById('gart');
  art.textContent='🌀';art.className='gacha-hero-art';
  art.style.animation='none';
  updateUI();

  const results=[];
  for(let i=0;i<n;i++){
    pity++;
    let h;
    if(pity>=80){h=HEROES[6+Math.floor(Math.random()*2)];pity=0}
    else{
      const r=Math.random()*100;
      if(r<6)h=HEROES[6+Math.floor(Math.random()*2)];
      else if(r<24)h=HEROES[4+Math.floor(Math.random()*2)];
      else if(r<60)h=HEROES[2+Math.floor(Math.random()*2)];
      else h=HEROES[Math.floor(Math.random()*2)];
    }
    results.push(h);
    addToArmy(h);
  }
  const best=results.reduce((a,b)=>GR[b.grade].rank>GR[a.grade].rank?b:a,results[0]);

  setTimeout(()=>{
    showGachaResult(best);
    pulling=false;
    document.getElementById('g1').disabled=false;
    document.getElementById('g10').disabled=false;
    updateUI();renderBench();renderCardList();buildSkillBar();
  },400);
}

function showGachaResult(h){
  const gr=GR[h.grade];
  const scr=document.getElementById('gscr');
  scr.className='gacha-screen '+h.grade;
  scr.style.background=gr.bg;
  const art=document.getElementById('gart');
  art.textContent=h.emoji;
  art.style.fontSize='5rem';
  art.style.animation='';
  art.className='gacha-hero-art shown';
  const b=document.getElementById('gbadge');
  b.textContent=`[${gr.label}] ${h.name} · ${h.sk.name}`;
  b.style.display='block';
  b.style.color=gr.col;b.style.borderColor=gr.col;
  b.style.background='rgba(0,0,0,.7)';b.style.border=`1px solid ${gr.col}`;
  if(h.grade==='L'){spawnP(120,80,gr.col,120,5);spawnP(100,60,'#fff',40,2)}
  else if(h.grade==='E'){spawnP(120,80,gr.col,60,4)}
  else if(h.grade==='R'){spawnP(120,80,gr.col,25,3)}
}

function addToArmy(h){
  const ex=army.find(x=>x.heroId===h.id);
  if(ex)ex.count=(ex.count||1)+1;
  else army.push({heroId:h.id,uid:'a'+Date.now()+Math.random().toString(36).slice(2),count:1,lv:1});
}

// ════════════════════════════════════════════════
function pickS(slot){
  const av=army.filter(x=>(x.count||1)>=1);
  if(!av.length){toast('영웅 없음','#ff3355');return}
  const ci=(synthPick[slot]===null)?0:(av.findIndex(x=>x.uid===synthPick[slot])+1)%av.length;
  synthPick[slot]=av[ci].uid;
  updateSynthUI();
}
function updateSynthUI(){
  for(let i=0;i<3;i++){
    const sl=document.getElementById('ss'+i);
    const uid=synthPick[i];
    if(uid){
      const e=army.find(x=>x.uid===uid);
      if(e){const h=HEROES[e.heroId];sl.textContent=h.emoji;sl.style.borderColor=h.col;sl.classList.add('on');}
    }else{sl.textContent=i+1;sl.style.borderColor='var(--b2)';sl.classList.remove('on')}
  }
  const res=document.getElementById('ss-res');
  const ids=synthPick.filter(x=>x!==null);
  if(ids.length===3){
    const es=ids.map(id=>army.find(x=>x.uid===id));
    if(es.every(Boolean)&&es.every(e=>e.heroId===es[0].heroId)){
      const h=HEROES[es[0].heroId];const evo=GR[h.grade].evo;
      if(evo){const nh=HEROES.find(x=>x.grade===evo)||h;res.textContent=nh.emoji;res.style.borderColor=GR[evo].col;}
      else{res.textContent='MAX';res.style.borderColor='var(--gold)'}
    }else{res.textContent='?';res.style.borderColor='var(--gold)'}
  }else{res.textContent='?';res.style.borderColor='var(--gold)'}
}
function synth(){
  const ids=synthPick.filter(x=>x!==null);
  if(ids.length<3){toast('슬롯 3개를 채우세요','#ff3355');return}
  const es=ids.map(id=>army.find(x=>x.uid===id));
  if(!es.every(Boolean)||!es.every(e=>e.heroId===es[0].heroId)){toast('동일 영웅 3장 필요!','#ff3355');return}
  const h=HEROES[es[0].heroId];const evo=GR[h.grade].evo;
  if(!evo){toast('이미 최고 등급입니다','#f5a800');return}
  es.forEach(e=>e.count--);army=army.filter(x=>x.count>0);
  const nh=HEROES.find(x=>x.grade===evo);
  if(nh)addToArmy(nh);
  synthPick=[null,null,null];updateSynthUI();
  toast(`🔥 ${h.name} → [${GR[evo].label}] ${nh?.name}!`,GR[evo].col);
  spawnP(120,80,GR[evo].col,80,5);
  updateUI();renderBench();renderCardList();buildSkillBar();
}

function buildPlaceCells(){
  const pc=document.getElementById('place-cells');pc.innerHTML='';
  for(let i=0;i<12;i++){
    const c=document.createElement('div');
    c.className='pcell';c.id='pc_'+i;
    c.textContent='+';
    c.onclick=()=>onCellClick(i);
    pc.appendChild(c);
  }
}
function onCellClick(idx){
  if(gameOver)return;
  if(placedHeroes[idx]){
    // 이미 배치된 경우 제거
    const uid=placedHeroes[idx];
    au=au.filter(u=>{if(u.uid===uid){document.getElementById(u.id)?.remove();return false}return true});
    delete placedHeroes[idx];
    document.getElementById('pc_'+idx).textContent='+';
    document.getElementById('pc_'+idx).classList.remove('occupied');
    buildSkillBar();return;
  }
  // 가진 영웅 중 선택 (최근 선택 영웅)
  if(!selectedHeroUid){toast('벤치에서 영웅을 먼저 선택!','#5a5e7a');return}
  const entry=army.find(x=>x.uid===selectedHeroUid);
  if(!entry){toast('영웅을 찾을 수 없음','#ff3355');return}
  deployToCell(entry,idx);
}
let selectedHeroUid=null;
function selectHero(uid){
  selectedHeroUid=uid;
  // 벤치 하이라이트
  document.querySelectorAll('.hero-card').forEach(c=>{
    c.style.outline=c.dataset.uid===uid?`2px solid var(--c1)`:''
  });
}

function deployToCell(entry,idx){
  if(Object.values(placedHeroes).filter(x=>x===entry.uid).length>0){
    toast('같은 영웅 중복 배치 불가','#ff3355');return;
  }
  const h=HEROES[entry.heroId];
  // 셀 위치 계산
  const pc=document.getElementById('pc_'+idx);
  const bfR=document.getElementById('bf').getBoundingClientRect();
  const pcR=pc.getBoundingClientRect();
  const cx=pcR.left-bfR.left+pcR.width/2-22;
  const cy=pcR.top-bfR.top+pcR.height/2-22;

  const uid='d'+Date.now()+Math.random().toString(36).slice(2);
  const u={
    id:uid,uid:entry.uid,heroId:h.id,name:h.name,emoji:h.emoji,
    pwr:h.pwrBase,hp:Math.round(h.hpBase*uv('uHp')),
    curHp:Math.round(h.hpBase*uv('uHp')),
    x:cx,y:cy,side:'hero',lastAtk:0,
    col:h.col,grade:h.grade,poisoned:false,def:0,
    slow:0,debuff:0,cellIdx:idx
  };
  au.push(u);
  placedHeroes[idx]=entry.uid;

  const el=document.createElement('div');el.className='unit hero';el.id=uid;
  el.style.cssText=`left:${u.x}px;top:${u.y}px`;
  el.innerHTML=`<div class="unit-inner" style="border-color:${h.col};background:${GR[h.grade].bg}">
    ${h.emoji}
    <div class="unit-bar-wrap">
      <div class="ubar ubar-hp"><div class="ubar-hp-fill" id="uhp_${uid}" style="width:100%;background:${h.col}"></div></div>
      <div class="ubar ubar-sp"><div class="ubar-sp-fill" id="usp_${uid}" style="width:0%"></div></div>
    </div>
  </div>
  <div class="unit-name-tag" style="color:${h.col}">${h.name}</div>`;
  document.getElementById('bf').appendChild(el);

  pc.classList.add('occupied');pc.textContent='';
  buildSkillBar();
  spawnP(cx+20,cy+20,h.col,15,3);
  toast(`⚔️ ${h.name} 배치 (셀 ${idx+1})`,h.col);
}

// ════════════════════════════════════════════════
const WAVE_SCRIPTS=[
  // wave 1
  [{e:0,n:3},{e:1,n:1}],
  // wave 2
  [{e:0,n:3},{e:2,n:2},{e:1,n:1}],
  // wave 3
  [{e:2,n:3},{e:3,n:2},{e:0,n:2}],
  // wave 4
  [{e:3,n:3},{e:4,n:2},{e:1,n:1}],
  // wave 5 (보스)
  [{e:7,n:1},{e:0,n:3},{e:2,n:2}],
  // wave 6
  [{e:4,n:3},{e:5,n:2},{e:3,n:2}],
  // wave 7
  [{e:5,n:4},{e:6,n:1},{e:3,n:2}],
  // wave 8 (보스2)
  [{e:8,n:1},{e:4,n:3},{e:5,n:2}],
  // wave 9+
  [{e:5,n:5},{e:6,n:2},{e:3,n:3}],
];

function startWave(){
  if(waveActive){toast('이미 진행 중!','#5a5e7a');return}
  if(gameOver)return;
  waveActive=true;waveNum++;
  document.getElementById('wave-btn').disabled=true;
  document.getElementById('wturn').textContent=waveNum;

  const scriptIdx=Math.min(waveNum-1,WAVE_SCRIPTS.length-1);
  const script=WAVE_SCRIPTS[scriptIdx];
  // 스케일
  const scale=1+waveNum*.18;
  const spdScale=1+waveNum*.08;

  let delay=0;
  let totalCount=0;
  const groups=[];
  script.forEach(g=>{
    const ep=ENEMIES_POOL[g.e];
    const cnt=g.n+Math.floor((waveNum-1)*.3);
    totalCount+=cnt;
    for(let i=0;i<cnt;i++){
      groups.push({ep,delay,scale,spdScale});
      delay+=Math.max(300,700-waveNum*25);
    }
  });

  toast(`👾 웨이브 ${waveNum}! 적 ${totalCount}마리 출현!`,'#ff3355');

  groups.forEach(({ep,delay,scale,spdScale})=>{
    setTimeout(()=>{
      if(gameOver)return;
      spawnEnemy(ep,scale,spdScale);
    },delay);
  });
}

function spawnEnemy(ep,scale,spdScale){
  const hp=Math.round(ep.hp*scale*(80+Math.random()*40));
  const pwr=Math.round(ep.pwr*scale*(8+waveNum*5));
  const spd=(ep.spd||1.4)*spdScale*uv('uSpd')*.5;
  const uid='e'+Date.now()+Math.random().toString(36).slice(2);
  const bf=document.getElementById('bf');
  const bfH=bf.offsetHeight;
  const u={
    id:uid,heroId:-1,name:ep.name,emoji:ep.emoji,
    pwr,hp,curHp:hp,
    x:bf.offsetWidth-10,y:20+Math.random()*(bfH-60),
    side:'enemy',lastAtk:0,
    col:ep.col,poisoned:false,def:ep.def||0,
    slow:0,debuff:0,spd,isBoss:ep.isBoss||false,
    skData:ep.sk,lastSk:0,alpha:1
  };
  au.push(u);
  const el=document.createElement('div');el.className='unit enemy';el.id=uid;
  el.style.cssText=`left:${u.x}px;top:${u.y}px`;
  const sz=ep.isBoss?52:42;
  el.innerHTML=`<div class="unit-inner" style="border-color:${ep.col};background:${ep.isBoss?'#110022':'#1a0014'};width:${sz}px;height:${sz}px;font-size:${ep.isBoss?'1.8':'1.3'}rem">
    ${ep.emoji}
    <div class="unit-bar-wrap" style="width:${sz+10}px;left:${-5}px">
      <div class="ubar ubar-hp"><div class="ubar-hp-fill" id="uhp_${uid}" style="width:100%;background:${ep.col}"></div></div>
    </div>
    ${ep.isBoss?`<div class="unit-name-tag" style="color:${ep.col};font-size:.55rem">${ep.name}</div>`:''}
  </div>`;
  bf.appendChild(el);
}

// ════════════════════════════════════════════════
//  BATTLE LOOP
// ════════════════════════════════════════════════
setInterval(()=>{
  if(gameOver)return;
  const now=Date.now();
  const heroes=au.filter(u=>u.side==='hero');
  const enemies=au.filter(u=>u.side==='enemy');
  document.getElementById('ecnt').textContent=enemies.length;

  au.forEach(u=>{
    const el=document.getElementById(u.id);if(!el)return;
    const foes=u.side==='hero'?enemies:heroes;

    if(u.side==='hero'){
      // 영웅: 제자리에서 가장 가까운 적 공격
      if(enemies.length){
        let near=enemies[0],minD=9999;
        enemies.forEach(t=>{const d=Math.hypot(t.x-u.x,t.y-u.y);if(d<minD){minD=d;near=t}});
        const range=uv('uSpd')*80+70; // 사거리는 속도 업에 연동
        if(minD<=range&&now-u.lastAtk>820){
          u.lastAtk=now;
          let dmg=Math.round(u.pwr*uv('uAtk'));
          if(u.debuff)dmg=Math.round(dmg*.7);
          const crit=(u.grade==='E'||u.grade==='L')&&Math.random()>.55;
          if(crit)dmg=Math.round(dmg*2.2);
          const blocked=Math.min(dmg-1,near.def||0);
          const actual=Math.max(1,dmg-blocked);
          near.curHp-=actual;
          showDmg(near.x+18,near.y,crit?actual+'!!':String(actual),crit?'#f5a800':u.col);
          const hp=document.getElementById('uhp_'+near.id);
          if(hp)hp.style.width=Math.max(0,near.curHp/near.hp*100)+'%';
          spawnP(near.x+20,near.y+20,u.col,crit?12:4,crit?4:2);
        }
      }
      // 스킬 쿨다운 바 업데이트
      const h=HEROES[u.heroId];
      if(h&&h.sk){
        const pct=Math.min(100,(now-(skCD[u.id]||0))/h.sk.cd*100);
        const sp=document.getElementById('usp_'+u.id);
        if(sp)sp.style.width=pct+'%';
      }
    } else {
      // 적: 왼쪽으로 이동, 히어로 만나면 공격
      const realSpd=(u.spd||1.4)*(1-(u.slow||0));
      if(heroes.length){
        let near=heroes[0],minD=9999;
        heroes.forEach(t=>{const d=Math.hypot(t.x-u.x,t.y-u.y);if(d<minD){minD=d;near=t}});
        if(minD<=44){
          if(now-u.lastAtk>900){
            u.lastAtk=now;
            let dmg=u.pwr;if(u.debuff)dmg=Math.round(dmg*.7);
            const actual=Math.max(1,dmg-(near.def||0));
            near.curHp-=actual;
            showDmg(near.x+18,near.y,String(actual),'#ff3355');
            const hp=document.getElementById('uhp_'+near.id);
            if(hp)hp.style.width=Math.max(0,near.curHp/near.hp*100)+'%';
          }
        } else {
          // 가장 가까운 영웅 방향으로 이동
          const dx=near.x-u.x,dy=near.y-u.y,dist=Math.hypot(dx,dy);
          u.x+=dx/dist*realSpd;u.y+=dy/dist*realSpd*.5;
        }
      } else {
        u.x-=realSpd;u.y+=Math.sin(now*.003+u.x*.02)*.4;
      }
      u.x=Math.max(-10,Math.min(550,u.x));
      u.y=Math.max(5,Math.min(235,u.y));
      // 보스 스킬
      if(u.skData&&now-u.lastSk>u.skData.cd){
        u.lastSk=now;
        u.skData.run(u,au);
        showSkFX(u.x+20,u.y+20,u.col);
      }
      // 독
      if(u.poisoned&&now-u.lastPoison>1000){u.lastPoison=now;const pd=u.poisonDmg||6;u.curHp-=pd;showDmg(u.x+14,u.y,'☠'+pd,'#44ff44');const hp=document.getElementById('uhp_'+u.id);if(hp)hp.style.width=Math.max(0,u.curHp/u.hp*100)+'%'}
    }
    // 히어로 독
    if(u.side==='hero'&&u.poisoned&&now-u.lastPoison>1000){
      u.lastPoison=now;const pd=u.poisonDmg||4;u.curHp-=pd;
      showDmg(u.x+14,u.y,'☠'+pd,'#44ff44');
      const hp=document.getElementById('uhp_'+u.id);if(hp)hp.style.width=Math.max(0,u.curHp/u.hp*100)+'%';
    }
    // slow 감소
    if(u.slow>0)u.slow=Math.max(0,u.slow-.001);
    if(u.debuff>0)u.debuff=Math.max(0,u.debuff-.001);

    el.style.left=u.x+'px';el.style.top=u.y+'px';
    if(u.alpha!==undefined&&u.alpha<1)el.style.opacity=u.alpha;else el.style.opacity='1';
  });

  // 사망 / 통과
  const dead=[];
  au=au.filter(u=>{
    if(u.curHp<=0){
      dead.push(u);
      if(u.side==='enemy'){
        const g=u.isBoss?40+waveNum*8:5+waveNum*2;
        gold+=g;
        spawnP(u.x+20,u.y+20,u.col,u.isBoss?60:14,u.isBoss?5:2.5);
        updateUI();
      } else {
        // 영웅 사망 → 셀 비우기
        if(u.cellIdx!==undefined){
          delete placedHeroes[u.cellIdx];
          const pc=document.getElementById('pc_'+u.cellIdx);
          if(pc){pc.classList.remove('occupied');pc.textContent='+'}
        }
        buildSkillBar();
        spawnP(u.x+20,u.y+20,'#00d4ff',20,3);
      }
      document.getElementById(u.id)?.remove();return false;
    }
    if(u.side==='enemy'&&u.x<-8){
      dead.push(u);
      const dmg=u.isBoss?4:1;
      lives=Math.max(0,lives-dmg);
      updateLifeUI();
      toast(`💥 적 돌파! -${dmg} 라이프`,'#ff3355');
      spawnP(10,u.y+20,'#ff3355',30,4);
      document.getElementById(u.id)?.remove();
      if(lives<=0)doGameOver();
      return false;
    }
    return true;
  });

  // 웨이브 클리어 체크
  if(waveActive&&!au.some(u=>u.side==='enemy')){
    waveActive=false;
    document.getElementById('wave-btn').disabled=false;
    const bonus=50+waveNum*20;gold+=bonus;
    updateUI();
    const ov=document.getElementById('bfov');
    ov.textContent=`웨이브 ${waveNum} 클리어! +${bonus}G 🎉`;
    ov.style.color='#00d4ff';ov.style.opacity='1';
    setTimeout(()=>ov.style.opacity='0',2000);
    spawnP(250,130,'#00d4ff',80,5);
    spawnP(220,110,'#f5a800',50,4);
    toast(`🎉 웨이브 ${waveNum} 클리어! +${bonus}G`,'#00d4ff');
    // 히어로 슬로우/독 해제
    au.filter(u=>u.side==='hero').forEach(u=>{u.slow=0;u.debuff=0;u.poisoned=false});
  }

  refreshSkillBar();
},90);

function showSkFX(x,y,col){
  const bf=document.getElementById('bf');
  const f=document.createElement('div');
  f.style.cssText=`position:absolute;left:${x-20}px;top:${y-20}px;width:40px;height:40px;border-radius:50%;background:${col};z-index:20;pointer-events:none;animation:sfx .4s ease-out forwards`;
  const style=document.createElement('style');
  if(!document.getElementById('sfx-style')){
    style.id='sfx-style';style.textContent='@keyframes sfx{0%{transform:scale(.1);opacity:.9}100%{transform:scale(4);opacity:0}}';
    document.head.appendChild(style);
  }
  bf.appendChild(f);setTimeout(()=>f.remove(),400);
  spawnP(x,y,col,25,4);
}

function singleHit(u,mult,col,auRef){
  const es=auRef.filter(t=>t.side==='enemy');if(!es.length)return;
  const t=es.reduce((a,b)=>b.curHp<a.curHp?b:a,es[0]);
  const d=Math.round(u.pwr*mult*uv('uAtk'));
  t.curHp-=d;showDmg(t.x+14,t.y,d,col);
  const hp=document.getElementById('uhp_'+t.id);if(hp)hp.style.width=Math.max(0,t.curHp/t.hp*100)+'%';
  spawnP(t.x+20,t.y+20,col,16,4);
}
function aoeHit(u,mult,col,auRef){
  const es=auRef.filter(t=>t.side==='enemy');
  if(!es.length)return;
  es.forEach(t=>{
    const d=Math.round(u.pwr*mult*uv('uAtk'));
    t.curHp-=d;showDmg(t.x+14,t.y,d+'!',col);
    const hp=document.getElementById('uhp_'+t.id);if(hp)hp.style.width=Math.max(0,t.curHp/t.hp*100)+'%';
  });
  spawnP(260,130,col,80,6);
}
function aoeHitEnemy(u,mult,col,auRef){
  const hs=auRef.filter(t=>t.side==='hero');
  hs.forEach(t=>{
    const d=Math.max(1,Math.round(u.pwr*mult-(t.def||0)));
    t.curHp-=d;showDmg(t.x+14,t.y,d,col);
    const hp=document.getElementById('uhp_'+t.id);if(hp)hp.style.width=Math.max(0,t.curHp/t.hp*100)+'%';
  });
  spawnP(150,130,col,40,5);
}
function slowAll(u,auRef){auRef.filter(t=>t.side==='enemy').forEach(t=>t.slow=.4);toast('❄️ 전체 적 빙결!','#88ddff')}
function slowHeroes(auRef){auRef.filter(t=>t.side==='hero').forEach(t=>t.slow=.3);toast('🧊 영웅 빙결!','#00aaff')}
function poisonAll(u,auRef){auRef.filter(t=>t.side==='enemy').forEach(t=>{t.poisoned=true;t.poisonDmg=Math.round(u.pwr*.06*uv('uAtk'))});toast('☠️ 전체 중독!','#44ff44')}
function debuffAll(auRef){auRef.filter(t=>t.side==='enemy').forEach(t=>t.debuff=.3);toast('💀 전체 약화!','#cc00ff')}
function healAllHeroes(u,auRef){auRef.filter(t=>t.side==='hero').forEach(t=>{const h=Math.round(t.hp*.3);t.curHp=Math.min(t.hp,t.curHp+h);showDmg(t.x+14,t.y,'💚+'+h,'#00ff88');const hp=document.getElementById('uhp_'+t.id);if(hp)hp.style.width=Math.max(0,t.curHp/t.hp*100)+'%'})}

function buildSkillBar(){
  const bar=document.getElementById('skill-bar');bar.innerHTML='';
  const hs=au.filter(u=>u.side==='hero');
  if(!hs.length){bar.innerHTML='<div style="font-size:.68rem;color:var(--d)">영웅 배치 후 스킬 활성화</div>';return}
  hs.forEach(u=>{
    const h=HEROES[u.heroId];if(!h?.sk)return;
    const now=Date.now(),e=now-(skCD[u.id]||0);
    const rdy=e>=h.sk.cd,pct=Math.min(100,e/h.sk.cd*100);
    const btn=document.createElement('div');
    btn.className='sk-btn'+(rdy?' rdy':'');btn.id='skb_'+u.id;
    btn.innerHTML=`<span class="sk-n">${h.emoji} ${h.name.slice(0,4)}</span>
      <span class="sk-s" style="color:${h.sk.col}">${h.sk.name}</span>
      <span class="sk-t">${rdy?'✨ 준비!':Math.ceil((h.sk.cd-e)/1000)+'초'}</span>
      <div class="sk-bar" style="width:${pct}%;background:${h.sk.col}"></div>`;
    if(rdy)btn.onclick=()=>doSkill(u);
    bar.appendChild(btn);
  });
}
function refreshSkillBar(){
  const hs=au.filter(u=>u.side==='hero');
  hs.forEach(u=>{
    const btn=document.getElementById('skb_'+u.id);if(!btn)return;
    const h=HEROES[u.heroId];if(!h?.sk)return;
    const now=Date.now(),e=now-(skCD[u.id]||0);
    const rdy=e>=h.sk.cd,pct=Math.min(100,e/h.sk.cd*100);
    btn.className='sk-btn'+(rdy?' rdy':'');
    const t=btn.querySelector('.sk-t');if(t)t.textContent=rdy?'✨ 준비!':Math.ceil((h.sk.cd-e)/1000)+'초';
    const b=btn.querySelector('.sk-bar');if(b)b.style.width=pct+'%';
    if(rdy)btn.onclick=()=>doSkill(u);else btn.onclick=null;
  });
}
function doSkill(u){
  const h=HEROES[u.heroId];if(!h?.sk)return;
  const now=Date.now();
  if(now-(skCD[u.id]||0)<h.sk.cd){toast('쿨타임!','#5a5e7a');return}
  skCD[u.id]=now;
  h.sk.run(u,au);
  showSkFX(u.x+20,u.y+20,h.sk.col);
  toast(`💥 ${h.name} · ${h.sk.name}!`,h.sk.col);
}

// ════════════════════════════════════════════════
//  DAMAGE POPUP
// ════════════════════════════════════════════════
function showDmg(x,y,txt,col,big=false){
  const bf=document.getElementById('bf');
  const d=document.createElement('div');
  d.className='dpop';
  d.style.cssText=`left:${x}px;top:${y}px;color:${col};font-size:${big?.95:.78}rem`;
  d.textContent=txt;bf.appendChild(d);
  setTimeout(()=>d.remove(),800);
}

// ════════════════════════════════════════════════
//  UI / LIFE / GAMEOVER
// ════════════════════════════════════════════════
function updateUI(){
  document.getElementById('h-gold').textContent=gold;
  document.getElementById('h-wave').textContent=waveNum;
  document.getElementById('h-pity').textContent=pity;
  document.getElementById('h-pity-fill').style.width=(pity/80*100)+'%';
  document.getElementById('pleft').textContent=80-pity;
  document.getElementById('ms-base').textContent=Math.round(uv('mBase'))+'G';
  document.getElementById('ms-perf').textContent=Math.round(uv('mPerf'))+'G';
  document.getElementById('ms-spd').textContent=uv('mSpd').toFixed(1);
}
function updateLifeUI(){
  const pct=lives/20*100;
  const f=document.getElementById('h-life');
  f.style.width=pct+'%';
  f.className='life-bar'+(lives<=10?' warn':'')+(lives<=5?' crit':'');
  document.getElementById('h-life-n').textContent=lives;
  const d=document.getElementById('danger');
  if(lives<=5)d.classList.add('on');else d.classList.remove('on');
}
function doGameOver(){
  gameOver=true;
  document.getElementById('go-stats').innerHTML=`최고 웨이브: ${waveNum}<br>총 배치 영웅: ${Object.keys(placedHeroes).length}`;
  document.getElementById('go').classList.add('on');
}

// ════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════
let tq=[],tb=false;
function toast(msg,col='#fff'){tq.push({msg,col});if(!tb)nextT()}
function nextT(){if(!tq.length){tb=false;return}tb=true;const{msg,col}=tq.shift();const t=document.getElementById('toast');t.textContent=msg;t.style.color=col;t.style.borderColor=col;t.classList.add('on');setTimeout(()=>{t.classList.remove('on');setTimeout(nextT,180)},1400)}

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
buildPlaceCells();
buildUpgList();
renderBench();
renderCardList();
buildSkillBar();
updateUI();
updateLifeUI();

setTimeout(()=>toast('💡 영웅을 선택 후 격자 셀을 클릭해 배치하세요!','#00d4ff'),800);
setTimeout(()=>toast('⛏️ PERFECT 존에서 채굴하면 콤보 보너스!','#f5a800'),2500);
</script>
