<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTT Next - 기대작 모아보기</title>
    <style>
        /* [CSS 영역] 웹페이지의 디자인을 담당합니다. */
        body {
            background-color: #141414; /* 넷플릭스 스타일의 어두운 배경 */
            color: #ffffff;
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #E50914; /* 넷플릭스 시그니처 레드 */
            margin-bottom: 40px;
        }

        /* 작품 카드들이 배열되는 구역 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 개별 작품 카드 스타일 */
        .card {
            background-color: #1f1f1f;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease;
            position: relative;
        }

        /* 마우스를 올렸을 때 카드가 살짝 커지는 효과 */
        .card:hover {
            transform: scale(1.05);
        }

        /* 카드 내부의 미디어(이미지/영상) 구역 */
        .media-container {
            width: 100%;
            height: 200px;
            position: relative;
            background-color: #000;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 기본적으로 영상은 숨겨둡니다 */
        .card-video {
            width: 100%;
            height: 100%;
            display: none;
            border: none;
        }

        /* 카드 텍스트 정보 구역 */
        .card-info {
            padding: 15px;
        }

        .ott-badge {
            display: inline-block;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .netflix { background-color: #E50914; }
        .tving { background-color: #FF153C; }

        .card-title {
            margin: 0 0 5px 0;
            font-size: 18px;
        }

        .release-date {
            color: #aaa;
            font-size: 14px;
            margin: 0;
        }

        /* 팝업창(모달) 스타일 */
        .modal {
            display: none; /* 평소에는 숨김 */
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8); /* 배경을 어둡게 */
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #262626;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
        }

        .close-btn:hover { color: #fff; }

        /* 팝업창 내부 버튼 스타일 */
        .btn-group {
            margin-top: 25px;
            display: flex;
            gap: 10px;
        }

        .link-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            background-color: #444;
            transition: background 0.2s;
        }

        .link-btn:hover {
            background-color: #555;
        }

        .link-btn.cast { background-color: #0078FF; } /* 출연진 버튼 색상 */
        .link-btn.blog { background-color: #03C75A; } /* 네이버 블로그 초록색 */
    </style>
</head>
<body>

    <h1>🎬 OTT Next 개봉 및 방영 대기작</h1>

    <div class="grid-container">
        
        <div class="card" onclick="openModal('오징어 게임 시즌2', '이정재, 이병헌, 위하준, 공유 등', 'https://search.naver.com/search.naver?query=오징어게임+시즌2+출연진', 'https://search.naver.com/search.naver?query=오징어게임+시즌2+리뷰')">
            <div class="media-container" onmouseenter="playVideo(this, 'https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1')" onmouseleave="stopVideo(this)">
                <img class="card-img" src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=400" alt="포스터">
                <iframe class="card-video" src="" allow="autoplay"></iframe>
            </div>
            <div class="card-info">
                <span class="ott-badge netflix">Netflix</span>
                <h3 class="card-title">오징어 게임 시즌2</h3>
                <p class="release-date">방영 예정일: 2026년 하반기</p>
            </div>
        </div>

        <div class="card" onclick="openModal('비밀의 숲 외전', '이준혁, 박성근 등', 'https://search.naver.com/search.naver?query=좋거나+나쁜+동재+출연진', 'https://search.naver.com/search.naver?query=좋거나+나쁜+동재+리뷰')">
            <div class="media-container" onmouseenter="playVideo(this, 'https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1')" onmouseleave="stopVideo(this)">
                <img class="card-img" src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=400" alt="포스터">
                <iframe class="card-video" src="" allow="autoplay"></iframe>
            </div>
            <div class="card-info">
                <span class="ott-badge tving">TVING</span>
                <h3 class="card-title">좋거나 나쁜 동재</h3>
                <p class="release-date">방영 예정일: 2026년 상반기</p>
            </div>
        </div>

    </div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="margin-top:0; color:#E50914;">작품 제목</h2>
            <p><strong>주요 출연진:</strong> <span id="modalCast">배우 이름들</span></p>
            <p style="color:#aaa; font-size:14px;">아래 버튼을 누르면 상세 정보 및 블로그 리뷰로 이동합니다.</p>
            
            <div class="btn-group">
                <a id="castLink" href="#" target="_blank" class="link-btn cast">👥 출연진 확인</a>
                <a id="blogLink" href="#" target="_blank" class="link-btn blog">📝 블로그 리뷰</a>
            </div>
        </div>
    </div>

    <script>
        /* [JavaScript 영역] 웹페이지의 기능을 담당합니다. */

        // 1. 마우스 올렸을 때 영상 재생 기능
        function playVideo(container, videoUrl) {
            const img = container.querySelector('.card-img');
            const video = container.querySelector('.card-video');
            
            img.style.display = 'none'; // 이미지 숨기기
            video.style.display = 'block'; // 영상 보이기
            video.src = videoUrl; // 영상 주소 넣어서 자동 재생 시작
        }

        // 2. 마우스 나갔을 때 영상 멈춤 기능
        function stopVideo(container) {
            const img = container.querySelector('.card-img');
            const video = container.querySelector('.card-video');
            
            img.style.display = 'block'; // 이미지 다시 보이기
            video.style.display = 'none'; // 영상 숨기기
            video.src = ''; // 영상 주소를 비워서 소리나 재생을 완전히 멈춤
        }

        // 3. 팝업창 열기 기능 (클릭 시 작동)
        function openModal(title, cast, castUrl, blogUrl) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalCast').innerText = cast;
            document.getElementById('castLink').href = castUrl;
            document.getElementById('blogLink').href = blogUrl;
            
            document.getElementById('infoModal').style.display = 'flex'; // 팝업창 띄우기
        }

        // 4. 팝업창 닫기 기능
        function closeModal() {
            document.getElementById('infoModal').style.display = 'none'; // 팝업창 숨기기
        }

        // 팝업창 바깥 어두운 부분을 눌러도 닫히게 설정
        window.onclick = function(event) {
            const modal = document.getElementById('infoModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
