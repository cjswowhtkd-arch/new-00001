<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퍼즐 가챠 디펜스 (30 Stages)</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
        }
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-bottom: 10px; color: #ffcc00; }
        .currency-panel {
            font-size: 1.2rem;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #444;
        }
        .game-container {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }
        .section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            border: 2px solid #444;
        }
        /* 1. 퍼즐 섹션 */
        #puzzle-section { width: 340px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            background: #111;
            padding: 10px;
            border-radius: 8px;
        }
        .tile {
            width: 55px;
            height: 55px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            user-select: none;
            transition: transform 0.1s;
        }
        .tile:active { transform: scale(0.9); }
        .tile.selected { border: 3px solid white; box-sizing: border-box; }

        /* 2. 가챠 섹션 */
        #gacha-section { width: 300px; text-align: center; }
        .btn {
            background: #ff5722;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
        }
        .btn:hover { background: #f44336; }
        .gacha-result {
            min-height: 100px;
            background: #111;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .inventory {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            max-height: 150px;
            overflow-y: auto;
            background: #111;
            padding: 8px;
            border-radius: 8px;
        }
        .inv-item {
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* 등급별 색상 정의 */
        .COMMON { background: #888; color: #fff; }
        .RARE { background: #2196F3; color: #fff; }
        .EPIC { background: #9C27B0; color: #fff; }
        .LEGENDARY { background: #FF9800; color: #fff; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* 3. 디펜스 섹션 */
        #defense-section { width: 450px; }
        .defense-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .battle-field {
            height: 180px;
            background: #15202b;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            border: 1px solid #333;
        }
        .line {
            position: absolute;
            top: 50%;
            width: 100%;
            height: 2px;
            background: dashed #444;
        }
        .unit {
            position: absolute;
            bottom: 20px;
            font-size: 2rem;
            transition: all 0.3s ease;
        }
        .my-unit { left: 20px; }
        .enemy-unit { right: 20px; }
        .hp-bar {
            position: absolute;
            top: -15px;
            left: 0;
            width: 100%;
            height: 5px;
            background: red;
        }
        .hp-inner { height: 100%; background: lime; width: 100%; }
        .defense-status {
            margin-top: 10px;
            background: #111;
            padding: 10px;
            border-radius: 8px;
            min-height: 60px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <h1>🔮 퍼즐 가챠 디펜스 RPG</h1>
    <div class="currency-panel">💰 소지 골드: <span id="gold-display">100</span>G</div>

    <div class="game-container">
        
        <div id="puzzle-section" class="section">
            <h3>🧩 골드 광산 퍼즐</h3>
            <p style="font-size:0.85rem; color:#aaa;">같은 아이콘을 연속으로 3개 맞추면 골드 획득! (클릭하여 서로 교환)</p>
            <div id="puzzle-grid" class="grid"></div>
        </div>

        <div id="gacha-section" class="section">
            <h3>✨ 캐릭터 갓챠</h3>
            <button class="btn" onclick="drawGacha()">1회 뽑기 (30 Gold)</button>
            <div id="gacha-result" class="gacha-result">무엇이 나올까?</div>
            <h4>내 캐릭터 부대</h4>
            <div id="inventory" class="inventory"></div>
        </div>

        <div id="defense-section" class="section">
            <div class="defense-header">
                <h3>⚔️ 디펜스 모드 (<span id="stage-display">1</span> / 30 탄)</h3>
                <button class="btn" id="start-battle-btn" onclick="startBattle()" style="width:auto; margin:0; padding:5px 15px;">전투 시작</button>
            </div>
            <div class="battle-field" id="battle-field">
                <div class="line"></div>
                </div>
            <div id="defense-status" class="defense-status">전투 준비 완료. 부대원 중 가장 강한 캐릭터가 자동으로 출전합니다!</div>
        </div>

    </div>

    <script>
        // === 게임 데이터 및 상태 ===
        let gold = 100;
        let currentStage = 1;
        let myInventory = [];
        let selectedTile = null;

        // 가챠 캐릭터 테이블 (등급별 확률 및 디펜스 스펙)
        const GACHA_POOL = [
            { name: "슬라임", grade: "COMMON", emoji: "💧", power: 10, hp: 50 },
            { name: "고블린", grade: "COMMON", emoji: "👺", power: 12, hp: 45 },
            { name: "아처", grade: "RARE", emoji: "🏹", power: 25, hp: 70 },
            { name: "나이트", grade: "RARE", emoji: "⚔️", power: 20, hp: 100 },
            { name: "마법사", grade: "EPIC", emoji: "🧙", power: 45, hp: 120 },
            { name: "드래곤", grade: "LEGENDARY", emoji: "🐉", power: 100, hp: 300 }
        ];

        // 퍼즐 아이콘 리스트
        const PUZZLE_ICONS = ["💎", "🪙", "👑", "🔥", "🍀"];
        const GRID_SIZE = 5;
        let puzzleGrid = [];

        // === 초기화 실행 ===
        window.onload = function() {
            initPuzzle();
            updateUI();
        };

        function updateUI() {
            document.getElementById('gold-display').innerText = gold;
            document.getElementById('stage-display').innerText = currentStage;
            
            // 인벤토리 갱신
            const invDiv = document.getElementById('inventory');
            invDiv.innerHTML = '';
            myInventory.forEach(item => {
                const span = document.createElement('span');
                span.className = `inv-item ${item.grade}`;
                span.innerText = `${item.emoji} ${item.name}(전투력:${item.power})`;
                invDiv.appendChild(span);
            });
        }

        // === 1. 퍼즐 시스템 구현 ===
        function initPuzzle() {
            const gridEl = document.getElementById('puzzle-grid');
            gridEl.innerHTML = '';
            puzzleGrid = [];

            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                let randomIcon = PUZZLE_ICONS[Math.floor(Math.random() * PUZZLE_ICONS.length)];
                puzzleGrid.push(randomIcon);

                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerText = randomIcon;
                tile.dataset.index = i;
                tile.onclick = handleTileClick;
                gridEl.appendChild(tile);
            }
        }

        function handleTileClick(e) {
            const clickedIndex = parseInt(e.target.dataset.index);

            if (selectedTile === null) {
                selectedTile = clickedIndex;
                e.target.classList.add('selected');
            } else {
                // 이웃한 타일인지 검사 (상하좌우)
                const diff = Math.abs(selectedTile - clickedIndex);
                const isNeighbor = (diff === 1 && Math.floor(selectedTile/GRID_SIZE) === Math.floor(clickedIndex/GRID_SIZE)) || diff === GRID_SIZE;

                if (isNeighbor) {
                    // 스왑(교환)
                    let temp = puzzleGrid[selectedTile];
                    puzzleGrid[selectedTile] = puzzleGrid[clickedIndex];
                    puzzleGrid[clickedIndex] = temp;

                    // 매치 체크
                    checkMatches();
                }

                // 선택 해제
                document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
                selectedTile = null;
                renderPuzzle();
            }
        }

        function renderPuzzle() {
            const tiles = document.querySelectorAll('.tile');
            puzzleGrid.forEach((icon, idx) => {
                tiles[idx].innerText = icon;
            });
        }

        function checkMatches() {
            let matched = false;
            // 가로 매치 체크
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE - 2; c++) {
                    let idx1 = r * GRID_SIZE + c;
                    let idx2 = idx1 + 1;
                    let idx3 = idx1 + 2;
                    if (puzzleGrid[idx1] && puzzleGrid[idx1] === puzzleGrid[idx2] && puzzleGrid[idx1] === puzzleGrid[idx3]) {
                        givePuzzleReward();
                        puzzleGrid[idx1] = puzzleGrid[idx2] = puzzleGrid[idx3] = ""; 
                        matched = true;
                    }
                }
            }
            // 세로 매치 체크
            for (let c = 0; c < GRID_SIZE; c++) {
                for (let r = 0; r < GRID_SIZE - 2; r++) {
                    let idx1 = r * GRID_SIZE + c;
                    let idx2 = idx1 + GRID_SIZE;
                    let idx3 = idx1 + (GRID_SIZE * 2);
                    if (puzzleGrid[idx1] && puzzleGrid[idx1] === puzzleGrid[idx2] && puzzleGrid[idx1] === puzzleGrid[idx3]) {
                        givePuzzleReward();
                        puzzleGrid[idx1] = puzzleGrid[idx2] = puzzleGrid[idx3] = "";
                        matched = true;
                    }
                }
            }

            // 빈칸 채우기
            if (matched) {
                setTimeout(() => {
                    for (let i = 0; i < puzzleGrid.length; i++) {
                        if (puzzleGrid[i] === "") {
                            puzzleGrid[i] = PUZZLE_ICONS[Math.floor(Math.random() * PUZZLE_ICONS.length)];
                        }
                    }
                    renderPuzzle();
                    updateUI();
                }, 300);
            }
        }

        function givePuzzleReward() {
            gold += 15; // 매치당 보상 골드
        }


        // === 2. 가챠 시스템 구현 ===
        function drawGacha() {
            if (gold < 30) {
                alert("골드가 부족합니다! 퍼즐을 맞춰 골드를 벌어보세요.");
                return;
            }

            gold -= 30;
            const rand = Math.random() * 100;
            let picked;

            // 확률 분배: Legendary(3%), Epic(12%), Rare(35%), Common(50%)
            if (rand < 3) picked = GACHA_POOL.find(p => p.grade === "LEGENDARY");
            else if (rand < 15) picked = GACHA_POOL.find(p => p.grade === "EPIC");
            else if (rand < 50) picked = GACHA_POOL.find(p => p.grade === "RARE" && Math.random() > 0.5 || p.name === "아처");
            else picked = GACHA_POOL[Math.floor(Math.random() * 2)]; // Common 중 랜덤

            // 깊은 복사로 인벤토리에 추가 (스펙 변동 대비)
            const newChar = { ...picked, currentHp: picked.hp };
            myInventory.push(newChar);

            // 결과 연출
            const resultDiv = document.getElementById('gacha-result');
            resultDiv.className = `gacha-result ${newChar.grade}`;
            resultDiv.innerText = `${newChar.emoji} [${newChar.grade}] ${newChar.name} 획득!`;

            updateUI();
        }


        // === 3. 디펜스 레이드 시스템 (30개 스테이지) ===
        function startBattle() {
            if (myInventory.length === 0) {
                alert("전투에 보낼 캐릭터가 없습니다! 가챠를 돌려주세요.");
                return;
            }
            if (currentStage > 30) {
                alert("🎉 축하합니다! 모든 스테이지(30탄)를 클리어하셨습니다! 🎉");
                return;
            }

            document.getElementById('start-battle-btn').disabled = true;

            // 내 인벤토리에서 가장 강한 녀석 자동 출전
            myInventory.sort((a, b) => b.power - a.power);
            let myHero = { ...myInventory[0] }; 

            // 스테이지에 비례하여 강해지는 적(몬스터) 생성
            let enemy = {
                name: `스테이지 ${currentStage} 보스`,
                emoji: "👾",
                hp: 40 + (currentStage * 25),
                maxHp: 40 + (currentStage * 25),
                power: 8 + (currentStage * 4)
            };

            const field = document.getElementById('battle-field');
            field.innerHTML = '<div class="line"></div>';

            // 캐릭터 화면 배치
            const heroEl = document.createElement('div');
            heroEl.className = 'unit my-unit';
            heroEl.innerHTML = `${myHero.emoji}<div class="hp-bar"><div class="hp-inner" id="hero-hp"></div></div>`;
            
            const enemyEl = document.createElement('div');
            enemyEl.className = 'unit enemy-unit';
            enemyEl.innerHTML = `${enemy.emoji}<div class="hp-bar"><div class="hp-inner" id="enemy-hp"></div></div>`;

            field.appendChild(heroEl);
            field.appendChild(enemyEl);

            const statusEl = document.getElementById('defense-status');
            statusEl.innerText = `⚔️ ${myHero.name} VS ${enemy.name} 전투가 시작되었습니다!`;

            // 턴제 전투 루프 시뮬레이션
            let battleInterval = setInterval(() => {
                // 1. 내 영웅의 공격
                enemy.hp -= myHero.power;
                let enemyHpPercent = Math.max(0, (enemy.hp / enemy.maxHp) * 100);
                document.getElementById('enemy-hp').style.width = enemyHpPercent + '%';
                statusEl.innerText = `💥 [아군] ${myHero.name}의 공격! ${enemy.name}에게 ${myHero.power} 데미지!`;

                if (enemy.hp <= 0) {
                    clearInterval(battleInterval);
                    statusEl.innerText = `🎉 승리! 스테이지 ${currentStage}층을 수호했습니다! 클리어 보상 100G 획득!`;
                    gold += 100;
                    currentStage++;
                    endBattle();
                    return;
                }

                // 2. 적의 반격 (딜레이 연출을 위해 조금 뒤 처리 가능하나 단순화)
                setTimeout(() => {
                    if(enemy.hp > 0) {
                        myHero.currentHp -= enemy.power;
                        let heroHpPercent = Math.max(0, (myHero.currentHp / myHero.hp) * 100);
                        let hpBar = document.getElementById('hero-hp');
                        if(hpBar) hpBar.style.width = heroHpPercent + '%';
                        statusEl.innerText = `💀 [적군] ${enemy.name}의 반격! ${myHero.name}가 ${enemy.power} 데미지를 입었습니다.`;

                        if (myHero.currentHp <= 0) {
                            clearInterval(battleInterval);
                            statusEl.innerText = `😭 패배... 캐릭터의 힘이 부족합니다. 퍼즐을 풀고 더 강력한 가챠 영웅을 뽑으세요!`;
                            endBattle();
                        }
                    }
                }, 200);

            }, 600);
        }

        function endBattle() {
            document.getElementById('start-battle-btn').disabled = false;
            updateUI();
        }
    </script>
</body>
</html>
