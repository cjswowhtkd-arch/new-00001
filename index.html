<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 파워 가챠 디펜스 온라인 ⚡</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root { 
            --bg: #0b0d16; 
            --card: #161a2e; 
            --accent: #ff007f; 
            --text: #ffffff;
            --common: #8e92a8;
            --rare: #00bcff;
            --epic: #b100ff;
            --legendary: #ffaa00;
        }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; user-select: none; }
        
        /* 로그인 모달 */
        #auth-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 6, 15, 0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; cubic-bezier(0.4, 0, 0.2, 1); }
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; width: 340px; text-align: center; border: 2px solid var(--accent); box-shadow: 0 0 25px rgba(255, 0, 127, 0.3); }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #3b4266; box-sizing: border-box; background: #0b0d16; color: white; }
        
        /* 상단 헤더 폰트 및 바 */
        header { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; padding: 15px 25px; background: #111424; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid #252b47; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .logo-text { font-weight: bold; background: linear-gradient(45deg, #ff007f, #ffaa00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.3rem; }

        .main-container { display: flex; gap: 20px; max-width: 1200px; width: 100%; flex-wrap: wrap; justify-content: center; }
        .box { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid #232946; flex: 1; min-width: 340px; box-sizing: border-box; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }

        /* 타이밍 클릭커 업그레이드 */
        .clicker-area { height: 140px; background: #070912; border-radius: 12px; position: relative; margin: 15px 0; overflow: hidden; border: 1px solid #1f243d; }
        .gauge-bar { position: absolute; bottom: 25px; left: 5%; width: 90%; height: 16px; background: #1f243d; border-radius: 10px; overflow: hidden; }
        .target-zone { position: absolute; left: 65%; width: 15%; height: 100%; background: linear-gradient(90deg, #ff007f, #ff55a3); box-shadow: 0 0 15px #ff007f; }
        .pointer { position: absolute; left: 0; width: 6px; height: 140%; background: #ffffff; top: -20%; box-shadow: 0 0 8px #fff; }
        
        /* 버튼 공통 */
        .btn { background: linear-gradient(135deg, #ff007f, #7f00ff); color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.6); transition: all 0.2s; }
        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,0,127,0.4); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { background: #2a2d3d !important; color: #5a5e75; cursor: not-allowed; transform: none; box-shadow: none; }

        /* 가챠 화면 대개조 */
        .gacha-scr { height: 220px; background: #000; margin: 10px 0; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; border: 2px solid #232946; }
        .char-img { height: 100%; width: 100%; object-fit: cover; display: none; animation: cardOpen 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes cardOpen { from { transform: scale(0.5) rotateY(90deg); filter: brightness(3); } to { transform: scale(1) rotateY(0); filter: brightness(1); } }
        
        /* 등급 광채 이펙트 */
        .COMMON-glow { border-color: var(--common); box-shadow: inset 0 0 20px rgba(142,146,168,0.3); }
        .RARE-glow { border-color: var(--rare); box-shadow: inset 0 0 30px rgba(0,188,255,0.4); }
        .EPIC-glow { border-color: var(--epic); box-shadow: inset 0 0 40px rgba(177,0,255,0.5); }
        .LEGENDARY-glow { border-color: var(--legendary); box-shadow: inset 0 0 50px rgba(255,170,0,0.6); animation: goldFlicker 1s infinite alternate; }
        @keyframes goldFlicker { from { box-shadow: inset 0 0 30px rgba(255,170,0,0.5); } to { box-shadow: inset 0 0 60px rgba(255,68,0,0.8); } }

        /* 디펜스 전장 */
        .def-field { height: 260px; background: linear-gradient(180deg, #090b14 0%, #121626 100%); border-radius: 12px; position: relative; overflow: hidden; border: 1px solid #232946; }
        .bench { display: flex; gap: 8px; background: #070912; padding: 12px; border-radius: 12px; margin-top: 8px; min-height: 55px; overflow-x: auto; border: 1px solid #1f243d; }
        .bench-item { width: 50px; height: 50px; border-radius: 8px; cursor: pointer; background-size: cover; background-position: center; border: 2px solid #333; flex-shrink: 0; transition: transform 0.15s; }
        .bench-item:hover { transform: scale(1.1) translateY(-3px); }
        
        /* 전장 유닛 스타일 */
        .battle-unit { position: absolute; width: 44px; height: 44px; background-size: cover; background-position: center; border-radius: 50%; border: 2px solid white; transition: left 0.1s linear, top 0.1s linear; }
        .hp-bar { position: absolute; top: -10px; left: -3px; width: 50px; height: 5px; background: #441111; border-radius: 3px; overflow: hidden; }
        .hp-inner { height: 100%; background: #00ffcc; width: 100%; transition: width 0.1s; }
        
        /* 데미지 텍스트 팝업 이펙트 */
        .dmg-text { position: absolute; color: #ff3333; font-weight: bold; font-size: 0.95rem; font-family: 'Impact'; animation: floatDmg 0.6s ease-out forwards; z-index: 10; text-shadow: 1px 1px 2px #000; pointer-events: none;}
        @keyframes floatDmg { from { transform: translateY(0) scale(1); opacity: 1; } to { transform: translateY(-30px) scale(1.2); opacity: 0; } }

        /* 채팅룸 */
        .chat-area { width: 100%; max-width: 1200px; margin-top: 15px; }
        #chat-logs { height: 120px; overflow-y: auto; background: #070912; padding: 12px; font-size: 0.9rem; border-radius: 10px; border: 1px solid #1f243d; }
        .chat-line { margin-bottom: 6px; line-content:分开; }
    </style>
</head>
<body>

    <!-- 1. 계정 인가 로그인 모달 -->
    <div id="auth-modal">
        <div class="auth-box">
            <h2 style="margin-top:0; color:#ff007f;">💎 ONLINE LOGIN 💎</h2>
            <p style="color:#8e92a8; font-size:0.85rem; margin-top:-10px;">나만의 영웅 부대 데이터를 안전하게 저장하세요</p>
            <input type="email" id="email" class="auth-input" placeholder="이메일 아이디 (ex: test@test.com)">
            <input type="password" id="password" class="auth-input" placeholder="비밀번호 (6자리 이상)">
            <button class="btn" onclick="handleAuth('login')">로그인하기</button>
            <button class="btn" style="background: #252b47; margin-top:10px;" onclick="handleAuth('signup')">실시간 신규 회원가입</button>
            <p id="auth-error" style="color: #ff3366; font-size: 0.85rem; margin-top: 12px; font-weight:bold;"></p>
        </div>
    </div>

    <header>
        <div class="logo-text">🔮 전설의 가챠 디펜스 대작전</div>
        <div>👤 <span id="display-name" style="color:#00bcff; font-weight:bold;">유저</span> | 💰 <span id="gold-display" style="color:#ffaa00; font-weight:bold;">0</span> Gold</div>
        <button onclick="logout()" style="background:none; color:#5a5e75; border:none; cursor:pointer; font-weight:bold;">[로그아웃]</button>
    </header>

    <div class="main-container">
        <!-- 자원 수급: 타이밍 클릭커 -->
        <div class="box">
            <h3>⛏️ 에테르 에너지 광산</h3>
            <p style="font-size:0.85rem; color:#8e92a8;">무빙 라이트가 <span style="color:#ff007f; font-weight:bold;">핑크색 크리티컬 존</span>에 적중할 때 클릭!</p>
            <div class="clicker-area">
                <div style="text-align:center; padding-top:15px; font-size:3.5rem; filter: drop-shadow(0 0 10px rgba(0,188,255,0.5));" id="miner-emoji">🔮</div>
                <div class="gauge-bar">
                    <div class="target-zone"></div>
                    <div class="pointer" id="pointer"></div>
                </div>
            </div>
            <button class="btn" onclick="hitMining()">⛏️ 크리티컬 채굴!!</button>
        </div>

        <!-- 고급 연출형 가챠 -->
        <div class="box">
            <h3>✨ 최고존엄 차원 소환 (30G)</h3>
            <div class="gacha-scr" id="gacha-scr">
                <div id="gacha-loading" style="display:none; color:var(--legendary); font-weight:bold;">시공간 폭발 중...</div>
                <span id="gacha-msg" style="font-weight:bold; font-size:1.1rem; text-shadow: 2px 2px 4px #000; z-index:5;">대기 중...</span>
                <img src="" id="gacha-img" class="char-img">
            </div>
            <button class="btn" id="gacha-btn" onclick="drawGacha()">🧬 1회 차원 소환</button>
        </div>

        <!-- 실시간 디펜스 전장 -->
        <div class="box" style="min-width: 460px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
                <h3>⚔️ 전장 수호 (Stage <span id="stage-display" style="color:red;">1</span>)</h3>
                <button class="btn" style="width:auto; padding:8px 20px; background:linear-gradient(135deg, #ff3333, #ff7700);" onclick="spawnWave()">몬스터 습격 시작</button>
            </div>
            <div class="def-field" id="def-field"></div>
            <div class="bench" id="hero-bench"></div>
        </div>
    </div>

    <!-- 월드 채팅방 -->
    <div class="box chat-area">
        <h4 style="margin-top:0; color:#00bcff;">💬 서버 연동 통합 광장 대화방</h4>
        <div id="chat-logs"></div>
        <input type="text" id="chat-input" style="width:100%; background:#070912; color:white; border:1px solid #232946; padding:12px; margin-top:8px; border-radius:8px; box-sizing: border-box;" placeholder="메시지를 입력하고 Enter를 치세요..." onkeydown="if(event.key==='Enter') sendChat()">
    </div>

    <script>
        // === 💥 사용자 요청 파이어베이스 설정값 완벽 주입 완료 💥 ===
        const firebaseConfig = {
            apiKey: "AIzaSyCcFkzVkZ2ui3WSIkFbxDa3m5OvebXSfk4",
            authDomain: "chosanghee00001.firebaseapp.com",
            databaseURL: "https://chosanghee00001-default-rtdb.firebaseio.com",
            projectId: "chosanghee00001",
            storageBucket: "chosanghee00001.firebasestorage.app",
            messagingSenderId: "705786109560",
            appId: "1:705786109560:web:01b69c754e13df96e8978d",
            measurementId: "G-E566V33J74"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // 내부 스태이터스
        let gold = 30; // 가챠 1판 무료 제공
        let stage = 1;
        let myArmy = [];
        let activeUnits = [];
        let userId = null;

        // 채굴 라이트 추적용 변수
        let pointerPos = 0;
        let pointerDir = 1;

        // 초호화 일러스트 수집형 캐릭터 데이터셋
        const HEROES = [
            { name: "메카 발키리", grade: "COMMON", img: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=250", pwr: 16, hp: 120, col: "#8e92a8" },
            { name: "네온 아처", grade: "RARE", img: "https://images.unsplash.com/photo-1578632767115-351597cf2477?w=250", pwr: 32, hp: 150, col: "#00bcff" },
            { name: "사이코 위치", grade: "EPIC", img: "https://images.unsplash.com/photo-1534447677768-be436bb09401?w=250", pwr: 75, hp: 220, col: "#b100ff" },
            { name: "드래곤 엠페러", grade: "LEGENDARY", img: "https://images.unsplash.com/photo-1563089145-599997674d42?w=250", pwr: 190, hp: 700, col: "#ffaa00" }
        ];

        // === 1. 아이디/패스워드 로그인 코어 통제 ===
        function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('auth-error');
            errorEl.innerText = "";

            if(!email || !password) { errorEl.innerText = "이메일과 비밀번호를 채워주세요."; return; }

            if(type === 'login') {
                auth.signInWithEmailAndPassword(email, password).catch(e => errorEl.innerText = "로그인 실패: " + e.message);
            } else {
                auth.createUserWithEmailAndPassword(email, password).catch(e => errorEl.innerText = "가입 실패: " + e.message);
            }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                userId = user.uid;
                document.getElementById('auth-modal').style.display = 'none';
                document.getElementById('display-name').innerText = user.email.split('@')[0];
                loadData();
                listenChat();
            } else {
                document.getElementById('auth-modal').style.display = 'flex';
            }
        });

        function logout() { auth.signOut().then(() => location.reload()); }

        // === 2. 라이트 타이밍 무빙 클릭커 ===
        setInterval(() => {
            pointerPos += (2.5 * pointerDir); // 속도감 상승
            if(pointerPos >= 100 || pointerPos <= 0) pointerDir *= -1;
            document.getElementById('pointer').style.left = pointerPos + "%";
        }, 25);

        function hitMining() {
            // 크리티컬 핑크존 영역 판정 계산
            if(pointerPos >= 65 && pointerPos <= 80) {
                gold += 15;
                showDamagePopup(220, 40, "+15G Jackpot!", "#ffaa00");
                document.getElementById('miner-emoji').innerText = "💥";
                setTimeout(() => document.getElementById('miner-emoji').innerText = "🔮", 150);
            } else {
                gold += 2;
                showDamagePopup(220, 40, "+2G", "#8e92a8");
                document.getElementById('miner-emoji').innerText = "💨";
                setTimeout(() => document.getElementById('miner-emoji').innerText = "🔮", 150);
            }
            saveData();
            updateUI();
        }

        // === 3. 고화질 하이앤드 갓챠 시뮬레이션 ===
        function drawGacha() {
            if(gold < 30) return alert("소지 골드가 모자랍니다! 에테르 광산에서 채굴해오세요.");
            gold -= 30;
            updateUI();

            document.getElementById('gacha-btn').disabled = true;
            document.getElementById('gacha-img').style.display = 'none';
            document.getElementById('gacha-msg').innerText = "";
            document.getElementById('gacha-loading').style.display = 'block';

            setTimeout(() => {
                document.getElementById('gacha-loading').style.display = 'none';
                const rand = Math.random() * 100;
                
                // 전설 확률 6% / 에픽 18% / 레어 36% / 커먼 나머지
                let hero = rand < 6 ? HEROES[3] : rand < 24 ? HEROES[2] : rand < 60 ? HEROES[1] : HEROES[0];
                const newUnit = { ...hero, id: 'u_' + Date.now(), curHp: hero.hp };
                myArmy.push(newUnit);
                
                const scr = document.getElementById('gacha-scr');
                scr.className = `gacha-scr ${hero.grade}-glow`;

                const imgEl = document.getElementById('gacha-img');
                imgEl.src = hero.img;
                imgEl.style.display = 'block';
                
                document.getElementById('gacha-msg').innerText = `[${hero.grade}] ${hero.name}`;
                document.getElementById('gacha-btn').disabled = false;
                
                renderBench();
                saveData();
            }, 600); // 쾌감 유발 진동 딜레이 효과
        }

        function renderBench() {
            const bench = document.getElementById('hero-bench');
            bench.innerHTML = '';
            myArmy.forEach(h => {
                const div = document.createElement('div');
                div.className = 'bench-item';
                div.style.borderColor = h.col;
                div.style.backgroundImage = `url(${h.img})`;
                div.onclick = () => deploy(h);
                bench.appendChild(div);
            });
        }

        // === 4. 실시간 라인 자동전투 디펜스 시스템 ===
        function deploy(h) {
            const unit = { ...h, x: 20, y: Math.random()*180+30, side: 'hero', lastAtk: 0 };
            activeUnits.push(unit);
            
            const el = document.createElement('div');
            el.className = 'battle-unit';
            el.id = unit.id;
            el.style.borderColor = unit.col;
            el.style.backgroundImage = `url(${unit.img})`;
            el.innerHTML = `<div class="hp-bar"><div class="hp-inner" id="hp-${unit.id}"></div></div>`;
            document.getElementById('def-field').appendChild(el);
        }

        function spawnWave() {
            for(let i=0; i < 2 + stage; i++) {
                setTimeout(() => {
                    const monster = { 
                        id: 'm_' + Date.now() + '_' + i, 
                        pwr: 6 + stage * 3, 
                        hp: 45 + stage * 25, 
                        curHp: 45 + stage * 25, 
                        x: 420, 
                        y: Math.random()*180+30, 
                        side: 'enemy', 
                        lastAtk: 0, 
                        img: 'https://images.unsplash.com/photo-1552820728-8b83bb6b773f?w=150' 
                    };
                    activeUnits.push(monster);
                    
                    const el = document.createElement('div');
                    el.className = 'battle-unit';
                    el.id = monster.id;
                    el.style.borderColor = '#ff3333';
                    el.style.filter = 'hue-rotate(300deg) brightness(1.2)'; // 적군 몬스터 분위기 강제 필터
                    el.style.backgroundImage = `url(${monster.img})`;
                    el.innerHTML = `<div class="hp-bar"><div class="hp-inner" id="hp-${monster.id}"></div></div>`;
                    document.getElementById('def-field').appendChild(el);
                }, i * 600);
            }
        }

        // 100ms 단위 실시간 타격/이동 인공지능 루프 연산
        setInterval(() => {
            activeUnits.forEach(u => {
                const el = document.getElementById(u.id);
                if(!el) return;
                
                const targets = activeUnits.filter(t => t.side !== u.side);
                if(targets.length > 0) {
                    let closest = targets[0];
                    let minDist = 9999;
                    
                    targets.forEach(t => {
                        let d = Math.hypot(t.x - u.x, t.y - u.y);
                        if(d < minDist) { minDist = d; closest = t; }
                    });

                    if(minDist > 35) {
                        // 타겟을 향해 각도 조절하여 접근
                        u.x += (u.side === 'hero' ? 2.5 : -1.8);
                        if(u.y < closest.y) u.y += 0.5; else u.y -= 0.5;
                    } else if(Date.now() - u.lastAtk > 900) {
                        // 쾅! 전투 타격 발생 및 플로팅 스크린 대미지 연출
                        u.lastAtk = Date.now();
                        let dmg = u.pwr;
                        let isCrit = false;
                        
                        // 고등급 보너스 특수기 치명타 터질 기믹 유발
                        if((u.grade === "EPIC" || u.grade === "LEGENDARY") && Math.random() > 0.5) {
                            dmg = Math.floor(dmg * 2.2);
                            isCrit = true;
                        }

                        closest.curHp -= dmg;
                        showDamagePopup(closest.x, closest.y, dmg + (isCrit ? " CRIT!🔥" : ""), isCrit ? varProp('--legendary') : u.col);
                        
                        const hpIn = document.getElementById(`hp-${closest.id}`);
                        if(hpIn) hpIn.style.width = Math.max(0, (closest.curHp / closest.hp * 100)) + "%";
                    }
                } else {
                    u.x += (u.side === 'hero' ? 1 : -1.2);
                }
                el.style.left = u.x + "px";
                el.style.top = u.y + "px";
            });

            // 클리어 및 격파 시체 처리 프로세스
            activeUnits = activeUnits.filter(u => {
                if(u.curHp <= 0 || u.x < -10 || u.x > 460) {
                    if(u.side === 'enemy' && u.curHp <= 0) { 
                        gold += 6; 
                        updateUI(); 
                    }
                    document.getElementById(u.id)?.remove();
                    return false;
                }
                return true;
            });
            
            // 모든 적 부대를 섬멸하면 스테이지 증가식 레벨디자인 트리거
            if(activeUnits.length > 0 && !activeUnits.some(u => u.side === 'enemy')) {
                stage++;
                gold += 40;
                showDamagePopup(220, 100, "STAGE CLEAR! +40G", "#00bcff");
                updateUI();
                saveData();
            }
        }, 100);

        function showDamagePopup(x, y, text, color) {
            const field = document.getElementById('def-field');
            const pop = document.createElement('div');
            pop.className = 'dmg-text';
            pop.style.left = x + 'px';
            pop.style.top = (y - 15) + 'px';
            pop.style.color = color;
            pop.innerText = text;
            field.appendChild(pop);
            setTimeout(() => pop.remove(), 600);
        }

        function varProp(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

        // === 5. 파이어베이스 데이터 입출력 실시간 연동부 ===
        function saveData() { if(userId) db.ref('users/'+userId).set({ gold, stage, myArmy }); }
        function loadData() {
            db.ref('users/'+userId).once('value', s => {
                const d = s.val();
                if(d) { gold = d.gold||0; stage = d.stage||1; myArmy = d.myArmy||[]; updateUI(); renderBench(); }
            });
        }
        function updateUI() { 
            document.getElementById('gold-display').innerText = gold;
            document.getElementById('stage-display').innerText = stage;
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            if(!input.value.trim()) return;
            db.ref('world_chat').push({ name: document.getElementById('display-name').innerText, msg: input.value });
            input.value = '';
        }
        function listenChat() {
            db.ref('world_chat').limitToLast(20).on('child_added', s => {
                const d = s.val();
                const log = document.getElementById('chat-logs');
                log.innerHTML += `<div class="chat-line"><span style="color:#00bcff; font-weight:bold;">[${d.name}]</span>: ${d.msg}</div>`;
                log.scrollTop = log.scrollHeight;
            });
        }
    </script>
</body>
</html>
