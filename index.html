<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조상희 실시간 주식투자 랭킹전</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(135deg, #f4f7f6 0%, #e9eff1 100%); color: #4a5568; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; overflow-x: hidden; }
        .main-wrapper { display: flex; gap: 20px; max-width: 1200px; width: 100%; flex-wrap: wrap; background: #ffffff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(160, 174, 192, 0.15); }
        .game-container { flex: 1.2; min-width: 350px; background: #f7fafc; padding: 25px; border-radius: 16px; text-align: center; }
        .ranking-container { flex: 0.8; min-width: 320px; background: #ffffff; padding: 25px; border-radius: 16px; border: 1px solid #e2e8f0; }
        
        h1, h2 { color: #2d3748; margin-bottom: 10px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #ebf8ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: left; font-size: 0.9rem; }
        
        .stock-market-board { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; margin-bottom: 20px; }
        .stock-row-wrapper { border-bottom: 1px solid #edf2f7; }
        .stock-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; cursor: pointer; transition: 0.2s; }
        .stock-item:hover { background: #f7fafc; }
        .stock-price { font-weight: 700; min-width: 90px; text-align: right; }
        .price-up { color: #e53e3e; } .price-down { color: #3182ce; }

        .stock-detail-chart-container { display: none; padding: 15px; background: #fdfdfd; border-top: 1px dashed #e2e8f0; }
        .stock-detail-chart-container.open { display: block; }
        .detail-canvas { width: 100%; height: 100px; }

        .ranking-list { list-style: none; padding: 0; }
        .ranking-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #edf2f7; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .ranking-item:hover { background: #edf2f7; transform: scale(1.02); }
        .ranking-item.selected { background: #e2e8f0; border-left: 4px solid #3182ce; }

        .peer-portfolio-card { margin-top: 20px; padding: 15px; background: #2d3748; color: white; border-radius: 12px; display: none; animation: fadeIn 0.3s; }
        .peer-portfolio-card h3 { font-size: 1rem; margin-top: 0; color: #63b3ed; }
        .peer-stock-list { font-size: 0.85rem; text-align: left; line-height: 1.6; }
        .peer-stock-row { display: flex; justify-content: space-between; border-bottom: 1px solid #4a5568; padding: 4px 0; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .order-panel { background: #ffffff; border: 2px solid #63b3ed; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; }
        .btn-buy { background: #fed7d7; color: #c53030; padding: 10px; }
        .btn-sell { background: #ebf8ff; color: #2b6cb0; padding: 10px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div style="width:100%; display:flex; justify-content:center; margin-bottom:15px;">
        <div class="auth-area" id="login-form-area">
            <input type="text" id="user-id-input" placeholder="닉네임" maxlength="12">
            <input type="password" id="user-pw-input" placeholder="비밀번호" maxlength="4">
            <button id="login-btn" style="padding: 10px 15px; cursor:pointer;">계정 접속</button>
        </div>
        <div id="logged-in-status-area" class="user-status-badge" style="display: none;">
            <span>🟢 <span id="current-user-display" class="name">-</span>님 투자 중</span>
            <button onclick="handleLogout()" style="cursor:pointer; border:none; background:none; color:#718096; text-decoration:underline;">로그아웃</button>
        </div>
    </div>

    <div class="game-container">
        <h1>📈 조상희 실시간 주식</h1>
        <div class="stats">
            <div>예수금: <span id="stock-cash">2,000,000</span>원</div>
            <div>총자산: <span id="stock-asset">2,000,000</span>원</div>
            <div colspan="2" style="grid-column: span 2;">수익률: <span id="stock-profit">0%</span></div>
        </div>

        <div class="stock-market-board" id="market-board"></div>

        <div class="order-panel" id="order-panel" style="visibility: hidden;">
            <div id="selected-stock-name" style="font-weight: bold;">종목을 선택하세요</div>
            <input type="number" id="global-quantity" value="1" style="width: 60px; text-align: center;">
            <div style="display: flex; gap: 5px;">
                <button class="btn-buy" style="flex:1" onclick="tradeStock('buy')">매수</button>
                <button class="btn-sell" style="flex:1" onclick="tradeStock('sell')">매도</button>
            </div>
        </div>
    </div>

    <div class="ranking-container">
        <h2>🏆 실시간 랭킹</h2>
        <p style="font-size: 0.75rem; color: #a0aec0;">* 유저를 클릭하면 보유 주식을 엿볼 수 있습니다.</p>
        <ul class="ranking-list" id="ranking-list"></ul>

        <div class="peer-portfolio-card" id="peer-card">
            <h3>🔍 <span id="peer-name">상대방</span>님의 포트폴리오</h3>
            <div class="peer-stock-list" id="peer-stock-list"></div>
            <button onclick="closePeerCard()" style="margin-top:10px; background:#4a5568; color:white; font-size:0.7rem; padding:4px 8px;">닫기</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCcFkzVkZ2ui3WSIkFbxDa3m5OvebXSfk4", authDomain: "chosanghee00001.firebaseapp.com", projectId: "chosanghee00001", storageBucket: "chosanghee00001.firebasestorage.app", messagingSenderId: "705786109560", appId: "1:705786109560:web:01b69c754e13df96e8978d" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let stockCash = 2000000;
    let selectedStockIndex = null;
    let myLoggedId = "";
    let isUserLoggedIn = false;
    let currentDocId = null;

    let stocks = [
        { name: "삼성전자", price: 68000, oldPrice: 68000, owned: 0, avgPrice: 0, history: [], detailHistory: [] },
        { name: "SK하이닉스", price: 172000, oldPrice: 172000, owned: 0, avgPrice: 0, history: [], detailHistory: [] },
        { name: "현대차", price: 245000, oldPrice: 245000, owned: 0, avgPrice: 0, history: [], detailHistory: [] },
        { name: "NAVER", price: 185000, oldPrice: 185000, owned: 0, avgPrice: 0, history: [], detailHistory: [] },
        { name: "에코프로비엠", price: 165000, oldPrice: 165000, cap: "시총 16조", owned: 0, avgPrice: 0, history: [], detailHistory: [] }
    ];

    function updatePrices() {
        stocks.forEach(s => {
            s.oldPrice = s.price;
            s.price = Math.max(1000, Math.floor(s.price * (1 + (Math.random() * 0.2 - 0.09))));
            s.detailHistory.push(s.price);
            if(s.detailHistory.length > 20) s.detailHistory.shift();
        });
        renderStockMarket();
        loadRanking();
    }
    setInterval(updatePrices, 5000);

    function renderStockMarket() {
        const board = document.getElementById('market-board');
        if (board.children.length === 0) {
            stocks.forEach((s, i) => {
                board.innerHTML += `
                    <div class="stock-row-wrapper" id="stock-wrapper-${i}">
                        <div class="stock-item" onclick="selectStockItem(${i})">
                            <div style="text-align:left"><b>${s.name}</b><br><small id="own-${i}">0주 보유</small></div>
                            <div class="stock-price" id="price-${i}">${s.price.toLocaleString()}원</div>
                        </div>
                        <div class="stock-detail-chart-container" id="detail-${i}"><canvas id="canvas-${i}" class="detail-canvas"></canvas></div>
                    </div>`;
            });
        }
        stocks.forEach((s, i) => {
            document.getElementById(`price-${i}`).textContent = s.price.toLocaleString() + "원";
            document.getElementById(`price-${i}`).className = `stock-price ${s.price > s.oldPrice ? 'price-up' : 'price-down'}`;
            // NaN 방어: 수치 데이터가 깨져있으면 0으로 강제 보정
            const displayOwned = isNaN(s.owned) ? 0 : s.owned;
            const displayAvg = isNaN(s.avgPrice) ? 0 : s.avgPrice;
            document.getElementById(`own-${i}`).textContent = `${displayOwned}주 보유 (평단: ${Math.floor(displayAvg).toLocaleString()}원)`;
        });

        // 내 총 자산 연산 NaN 방어 보정
        let totalStockValue = stocks.reduce((acc, cur) => acc + ((Number(cur.owned) || 0) * cur.price), 0);
        let totalPurchase = stocks.reduce((acc, cur) => acc + ((Number(cur.owned) || 0) * (Number(cur.avgPrice) || 0)), 0);
        let asset = (Number(stockCash) || 0) + totalStockValue;

        document.getElementById('stock-asset').textContent = isNaN(asset) ? "2,000,000" : asset.toLocaleString();
        document.getElementById('stock-cash').textContent = isNaN(stockCash) ? "2,000,000" : stockCash.toLocaleString();
        
        let profit = totalStockValue - totalPurchase;
        let rate = totalPurchase > 0 ? (profit / totalPurchase) * 100 : 0;
        const pEl = document.getElementById('stock-profit');
        pEl.textContent = `${profit >= 0 ? '+' : ''}${isNaN(profit) ? 0 : profit.toLocaleString()} 원 (${isNaN(rate) ? '0.00' : rate.toFixed(2)}%)`;
        pEl.className = profit >= 0 ? 'red-text' : 'blue-text';
    }

    window.selectStockItem = (i) => {
        const container = document.getElementById(`detail-${i}`);
        const isOpen = container.classList.contains('open');
        document.querySelectorAll('.stock-detail-chart-container').forEach(el => el.classList.remove('open'));
        document.querySelectorAll('.stock-row-wrapper').forEach(el => el.classList.remove('selected'));
        
        if(!isOpen) {
            container.classList.add('open');
            document.getElementById(`stock-wrapper-${i}`).classList.add('selected');
            selectedStockIndex = i;
            document.getElementById('order-panel').style.visibility = "visible";
            document.getElementById('selected-stock-name').textContent = stocks[i].name;
            drawChart(i);
        } else {
            document.getElementById('order-panel').style.visibility = "hidden";
            selectedStockIndex = null;
        }
    }

    function drawChart(i) {
        const canvas = document.getElementById(`canvas-${i}`);
        const ctx = canvas.getContext('2d');
        const h = stocks[i].detailHistory;
        ctx.clearRect(0,0,canvas.width, canvas.height);
        if(h.length < 2) return;
        ctx.beginPath();
        ctx.strokeStyle = '#3182ce';
        h.forEach((p, idx) => {
            const x = (idx / 20) * canvas.width;
            const y = canvas.height - ((p - Math.min(...h)) / (Math.max(...h)-Math.min(...h)+1)) * canvas.height;
            idx === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        });
        ctx.stroke();
    }

    // 상대방 포트폴리오 보기 및 랭킹 NaN 철저 보정
    async function showUserPortfolio(userId) {
        const q = query(collection(db, "stock_rankings"), where("userId", "==", userId));
        const snap = await getDocs(q);
        if(!snap.empty) {
            const data = snap.docs[0].data();
            const peerCard = document.getElementById('peer-card');
            const peerName = document.getElementById('peer-name');
            const peerList = document.getElementById('peer-stock-list');
            
            peerName.textContent = userId;
            peerCard.style.display = "block";
            
            let html = "";
            let hasStock = false;
            
            if(data.ownedStocks && Array.isArray(data.ownedStocks)) {
                data.ownedStocks.forEach((count, idx) => {
                    const cleanCount = Number(count) || 0; // 데이터 검증 오버헤드 보정
                    if(cleanCount > 0 && stocks[idx]) {
                        hasStock = true;
                        const currentPrice = stocks[idx].price;
                        const evalAmount = currentPrice * cleanCount;
                        html += `
                            <div class="peer-stock-row">
                                <span>${stocks[idx].name} (${cleanCount}주)</span>
                                <span>평가: ${isNaN(evalAmount) ? 0 : evalAmount.toLocaleString()}원</span>
                            </div>`;
                    }
                });
            }
            peerList.innerHTML = hasStock ? html : "<div style='text-align:center; padding:10px;'>보유 중인 주식이 없습니다.</div>";
        }
    }

    window.closePeerCard = () => { document.getElementById('peer-card').style.display = "none"; }

    async function loadRanking() {
        const q = query(collection(db, "stock_rankings"), orderBy("score", "desc"), limit(10));
        const snap = await getDocs(q);
        const list = document.getElementById('ranking-list');
        list.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            // 파이어베이스 내부 점수가 가끔 NaN으로 깨져 올라간 구데이터 방어
            const cleanScore = Number(data.score);
            if (isNaN(cleanScore)) return; 

            const li = document.createElement('li');
            li.className = 'ranking-item';
            li.innerHTML = `<span>${data.userId}</span> <b>${Math.floor(cleanScore).toLocaleString()}원</b>`;
            li.onclick = () => showUserPortfolio(data.userId);
            list.appendChild(li);
        });
    }

    window.tradeStock = async (type) => {
        if(selectedStockIndex === null) return;
        const s = stocks[selectedStockIndex];
        const qty = parseInt(document.getElementById('global-quantity').value);
        if(isNaN(qty) || qty <= 0) return;

        if(type === 'buy') {
            if(stockCash < s.price * qty) return alert("잔고 부족");
            stockCash -= s.price * qty;
            s.avgPrice = (((s.owned || 0) * (s.avgPrice || 0)) + (s.price * qty)) / ((s.owned || 0) + qty);
            s.owned = (s.owned || 0) + qty;
        } else {
            if((s.owned || 0) < qty) return alert("주식 부족");
            stockCash += s.price * qty;
            s.owned = (s.owned || 0) - qty;
            if(s.owned === 0) s.avgPrice = 0;
        }
        renderStockMarket();
        if(isUserLoggedIn) await syncAssetToBackend();
    }

    window.handleLogout = function() {
        isUserLoggedIn = false;
        myLoggedId = "";
        currentDocId = null;
        stockCash = 2000000;
        stocks.forEach(s => { s.owned = 0; s.avgPrice = 0; });
        document.getElementById('login-form-area').style.display = "flex";
        document.getElementById('logged-in-status-area').style.display = "none";
        document.getElementById('order-panel').style.visibility = "hidden";
        renderStockMarket();
    }

    document.getElementById('login-btn').onclick = async () => {
        const id = document.getElementById('user-id-input').value.trim();
        const pw = document.getElementById('user-pw-input').value.trim();
        if(!id || !pw) return;

        const q = query(collection(db, "stock_rankings"), where("userId", "==", id));
        const snap = await getDocs(q);
        if(!snap.empty) {
            const user = snap.docs[0];
            if(user.data().userPw !== pw) { alert("비밀번호 불일치"); return; }
            currentDocId = user.id;
            stockCash = Number(user.data().cash) || 2000000;
            
            // 기존 유저 구버전 종목 갯수 오버플로우 검증 복구
            if(user.data().ownedStocks && Array.isArray(user.data().ownedStocks)) {
                user.data().ownedStocks.forEach((cnt, idx) => { if(stocks[idx]) stocks[idx].owned = Number(cnt) || 0; });
            }
            if(user.data().avgPrices && Array.isArray(user.data().avgPrices)) {
                user.data().avgPrices.forEach((prc, idx) => { if(stocks[idx]) stocks[idx].avgPrice = Number(prc) || 0; });
            }
        } else {
            const res = await addDoc(collection(db, "stock_rankings"), { userId: id, userPw: pw, score: 2000000, cash: 2000000, ownedStocks:[0,0,0,0,0], avgPrices:[0,0,0,0,0], lastActive: new Date() });
            currentDocId = res.id;
            stockCash = 2000000;
            stocks.forEach(s => { s.owned = 0; s.avgPrice = 0; });
        }
        isUserLoggedIn = true;
        myLoggedId = id;
        document.getElementById('login-form-area').style.display = "none";
        document.getElementById('logged-in-status-area').style.display = "flex";
        document.getElementById('current-user-display').textContent = id;
        renderStockMarket();
    };

    async function syncAssetToBackend() {
        if(!currentDocId) return;
        let totalStockValue = stocks.reduce((acc, cur) => acc + ((Number(cur.owned) || 0) * cur.price), 0);
        const total = (Number(stockCash) || 0) + totalStockValue;
        
        await updateDoc(doc(db, "stock_rankings", currentDocId), { 
            score: isNaN(total) ? 2000000 : total, 
            cash: isNaN(stockCash) ? 2000000 : stockCash, 
            ownedStocks: stocks.map(s=> isNaN(s.owned) ? 0 : s.owned), 
            avgPrices: stocks.map(s=> isNaN(s.avgPrice) ? 0 : s.avgPrice), 
            lastActive: new Date() 
        });
    }

    renderStockMarket();
    loadRanking();
</script>
</body>
</html>
