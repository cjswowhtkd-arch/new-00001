<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ 전설의 가챠 디펜스</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');
:root{
  --bg:#07080f;--card:#0e1020;--card2:#131628;
  --acc:#e8005a;--acc2:#7700ee;--gold:#f5a800;
  --c:#8e92a8;--r:#00ccff;--e:#cc00ff;--l:#ffaa00;
  --green:#00e87a;--red:#ff3355;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:#fff;min-height:100vh;overflow-x:hidden}
h1,h2,h3,.logo{font-family:'Black Han Sans',sans-serif}

/* 파티클 캔버스 전체 오버레이 */
#particle-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}

/* 로그인 */
#auth-modal{position:fixed;inset:0;background:rgba(5,6,15,.97);display:flex;justify-content:center;align-items:center;z-index:1000}
.auth-box{background:var(--card);padding:32px;border-radius:20px;width:360px;text-align:center;border:1px solid rgba(232,0,90,.4);box-shadow:0 0 40px rgba(232,0,90,.2)}
.auth-input{width:100%;padding:12px 14px;margin:8px 0;border-radius:10px;border:1px solid #2a2d45;background:#07080f;color:#fff;font-size:.95rem;outline:none;transition:border .2s}
.auth-input:focus{border-color:var(--acc)}

/* 헤더 */
header{background:#0a0c18;border-bottom:1px solid #1a1e35;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.logo{font-size:1.2rem;background:linear-gradient(90deg,var(--acc),var(--l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex:1}
.stat-pill{background:#131628;border:1px solid #252945;padding:6px 14px;border-radius:20px;font-size:.85rem;font-weight:700}
.stat-pill span{color:var(--gold)}
.pity-bar{height:6px;background:#1a1e35;border-radius:3px;overflow:hidden;width:80px}
.pity-inner{height:100%;background:linear-gradient(90deg,var(--acc),var(--l));border-radius:3px;transition:width .3s}

/* 메인 그리드 */
.main{display:grid;grid-template-columns:1fr 1fr 1.4fr;gap:16px;padding:16px;max-width:1300px;margin:0 auto}
@media(max-width:900px){.main{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid #1a1e35;border-radius:16px;padding:18px;position:relative;overflow:hidden}
.panel-title{font-family:'Black Han Sans',sans-serif;font-size:1rem;color:#c0c4e0;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* 버튼 공통 */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:.95rem;transition:all .18s;width:100%;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.08);opacity:0;transition:opacity .15s}
.btn:hover::after{opacity:1}
.btn:active{transform:scale(.97)}
.btn:disabled{background:#1e2135!important;color:#444;cursor:not-allowed;transform:none}
.btn-sm{padding:7px 14px;font-size:.82rem;width:auto}
.btn-gold{background:linear-gradient(135deg,#e09000,var(--gold))}
.btn-green{background:linear-gradient(135deg,#008844,var(--green))}
.btn-red{background:linear-gradient(135deg,#880022,var(--red))}

/* ─── 채굴 패널 ─── */
.mine-track{height:24px;background:#080a14;border-radius:12px;position:relative;overflow:hidden;margin:14px 0;border:1px solid #1a1e35}
.mine-zone{position:absolute;top:0;height:100%;border-radius:8px;background:rgba(232,0,90,.7);transition:left .1s,width .1s}
.mine-ptr{position:absolute;top:-2px;width:8px;height:28px;background:#fff;border-radius:4px;box-shadow:0 0 10px #fff;transition:left .025s linear}
.combo-display{font-family:'Black Han Sans',sans-serif;font-size:2.5rem;text-align:center;color:var(--gold);line-height:1;min-height:50px;transition:transform .1s}
.combo-display.hit{transform:scale(1.3)}
.upgrade-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.upg-card{background:#080a14;border:1px solid #1a1e35;border-radius:10px;padding:10px 12px;cursor:pointer;transition:border-color .2s}
.upg-card:hover{border-color:var(--gold)}
.upg-name{font-size:.8rem;color:#8e92a8}
.upg-val{font-size:.95rem;font-weight:700;color:var(--gold)}
.upg-cost{font-size:.78rem;color:#5a5e7a;margin-top:2px}

/* ─── 가챠 패널 ─── */
.gacha-screen{height:240px;background:#000;border-radius:12px;border:2px solid #1a1e35;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column;margin:10px 0;transition:border-color .3s,box-shadow .3s}
.gacha-screen.LEGENDARY{border-color:var(--l);box-shadow:0 0 40px rgba(245,168,0,.5),inset 0 0 40px rgba(245,168,0,.15);animation:flickerGold 1s infinite alternate}
.gacha-screen.EPIC{border-color:var(--e);box-shadow:0 0 30px rgba(204,0,255,.4),inset 0 0 30px rgba(204,0,255,.1)}
.gacha-screen.RARE{border-color:var(--r);box-shadow:0 0 20px rgba(0,204,255,.3),inset 0 0 20px rgba(0,204,255,.1)}
.gacha-screen.COMMON{border-color:var(--c)}
@keyframes flickerGold{from{box-shadow:0 0 30px rgba(245,168,0,.4),inset 0 0 30px rgba(245,168,0,.1)}to{box-shadow:0 0 60px rgba(255,80,0,.7),inset 0 0 50px rgba(255,80,0,.2)}}
.gacha-img{width:100%;height:100%;object-fit:cover;display:none;animation:cardFlip .5s cubic-bezier(.175,.885,.32,1.275)}
@keyframes cardFlip{from{transform:scale(.3) rotateY(90deg);filter:brightness(4)}to{transform:scale(1) rotateY(0);filter:brightness(1)}}
.grade-badge{position:absolute;top:10px;right:10px;padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:700;z-index:5}
.pity-info{font-size:.78rem;color:#5a5e7a;text-align:center;margin:6px 0}
.pity-info b{color:var(--l)}
.multi-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}

/* 합성 */
.synthesis-area{background:#080a14;border:1px dashed #252945;border-radius:12px;padding:14px;margin-top:10px}
.synth-slots{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.synth-slot{width:52px;height:52px;border-radius:8px;border:2px dashed #252945;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#3a3e5a;background:#07080f;cursor:pointer;transition:all .2s;background-size:cover;background-position:center}
.synth-slot.filled{border-style:solid;border-color:var(--acc)}
.synth-arrow{color:#3a3e5a;font-size:1.2rem;line-height:52px}

/* ─── 디펜스 패널 ─── */
.def-field{height:280px;background:linear-gradient(180deg,#050714 0%,#0c0f20 60%,#0a1528 100%);border-radius:12px;position:relative;overflow:hidden;border:1px solid #1a1e35}
.ground-line{position:absolute;bottom:0;width:100%;height:3px;background:rgba(0,204,255,.2)}
.bench-row{display:flex;gap:8px;margin-top:10px;overflow-x:auto;padding:4px 0 8px}
.hero-card{position:relative;width:56px;flex-shrink:0;cursor:pointer;transition:transform .15s}
.hero-card:hover{transform:translateY(-4px)}
.hero-thumb{width:56px;height:56px;border-radius:10px;border:2px solid #333;background-size:cover;background-position:center}
.hero-name{font-size:.62rem;text-align:center;color:#8e92a8;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:56px}
.hero-lv{position:absolute;top:2px;left:2px;background:rgba(0,0,0,.8);font-size:.65rem;font-weight:700;padding:1px 5px;border-radius:4px;color:var(--gold)}
.hero-cnt{position:absolute;top:2px;right:2px;background:var(--acc);border-radius:10px;font-size:.65rem;font-weight:700;padding:1px 5px;color:#fff}

/* 전장 유닛 */
.unit{position:absolute;width:46px;height:46px;border-radius:50%;background-size:cover;background-position:center;border:2px solid #fff;transition:left .08s linear,top .08s linear}
.unit-hp{position:absolute;top:-12px;left:-3px;width:52px;height:5px;background:#330000;border-radius:3px;overflow:hidden}
.unit-hp-inner{height:100%;background:#00ffaa;border-radius:3px;transition:width .1s}
.unit-skill-cd{position:absolute;bottom:-14px;left:0;width:100%;height:4px;background:#1a1e35;border-radius:2px;overflow:hidden}
.unit-skill-cd-inner{height:100%;background:#9900ff;border-radius:2px}

/* 스킬 패널 */
.skill-bar{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.skill-btn{background:#0e1020;border:1px solid #252945;border-radius:10px;padding:8px 12px;cursor:pointer;text-align:center;transition:all .2s;min-width:80px;position:relative;overflow:hidden}
.skill-btn:hover{border-color:var(--acc2)}
.skill-btn.ready{border-color:var(--e);box-shadow:0 0 8px rgba(204,0,255,.3)}
.skill-btn .sk-name{font-size:.75rem;font-weight:700;color:#c0c4e0}
.skill-btn .sk-cd{font-size:.7rem;color:#5a5e7a}
.skill-cd-bar{position:absolute;bottom:0;left:0;height:3px;background:var(--e);border-radius:0 0 10px 10px;transition:width .1s}

/* 데미지 팝업 */
.dmg{position:absolute;font-weight:700;font-family:'Black Han Sans',sans-serif;font-size:.95rem;animation:popDmg .7s ease-out forwards;pointer-events:none;z-index:20;text-shadow:1px 1px 3px #000}
@keyframes popDmg{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-40px) scale(1.3);opacity:0}}

/* 스킬 이펙트 */
.skill-fx{position:absolute;border-radius:50%;pointer-events:none;z-index:15;animation:skillFX .4s ease-out forwards}
@keyframes skillFX{0%{transform:scale(.1);opacity:1}100%{transform:scale(3);opacity:0}}

/* 채팅 */
.chat-panel{max-width:1300px;margin:0 16px 16px;background:var(--card);border:1px solid #1a1e35;border-radius:16px;padding:16px}
#chat-log{height:110px;overflow-y:auto;background:#07080f;padding:10px;border-radius:8px;font-size:.85rem;border:1px solid #1a1e35}
.chat-row{margin-bottom:4px}
.chat-input{width:100%;background:#07080f;color:#fff;border:1px solid #1a1e35;padding:10px 14px;border-radius:8px;margin-top:8px;font-size:.9rem;outline:none}
.chat-input:focus{border-color:var(--acc2)}

/* 토스트 */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--acc);padding:12px 24px;border-radius:12px;font-weight:700;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}

/* 스테이지 클리어 오버레이 */
.stage-clear{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Black Han Sans',sans-serif;font-size:2rem;color:var(--r);background:rgba(0,0,0,.6);z-index:50;opacity:0;pointer-events:none;transition:opacity .3s}

/* 스크롤바 */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#0a0c18}
::-webkit-scrollbar-thumb{background:#252945;border-radius:2px}
</style>
</head>
<body>
<canvas id="particle-canvas"></canvas>

<!-- 로그인 -->
<div id="auth-modal">
  <div class="auth-box">
    <h2 style="color:var(--acc);margin-bottom:4px">⚡ 전설의 가챠 디펜스</h2>
    <p style="color:#5a5e7a;font-size:.83rem;margin-bottom:16px">데이터를 저장하려면 로그인하세요</p>
    <input type="email" id="em" class="auth-input" placeholder="이메일">
    <input type="password" id="pw" class="auth-input" placeholder="비밀번호 (6자 이상)">
    <button class="btn" onclick="doAuth('login')" style="margin-top:8px">로그인</button>
    <button class="btn" onclick="doAuth('signup')" style="background:linear-gradient(135deg,#1a1e35,#252945);margin-top:8px">신규 가입</button>
    <p id="auth-err" style="color:var(--red);font-size:.82rem;margin-top:10px;min-height:20px"></p>
    <button onclick="guestPlay()" style="background:none;border:none;color:#3a3e5a;cursor:pointer;font-size:.82rem;margin-top:8px;text-decoration:underline">로그인 없이 플레이 (저장 안됨)</button>
  </div>
</div>

<header>
  <div class="logo">🔮 전설의 가챠 디펜스</div>
  <div class="stat-pill">💰 <span id="gold-hd">0</span></div>
  <div class="stat-pill">⚔️ Stage <span id="stage-hd">1</span></div>
  <div class="stat-pill" title="소환 천장 게이지">
    <span style="font-size:.75rem;color:#5a5e7a">천장 </span>
    <span id="pity-hd" style="color:var(--l)">0</span>/80
    <div class="pity-bar" style="display:inline-block;vertical-align:middle;margin-left:4px"><div class="pity-inner" id="pity-bar-hd" style="width:0%"></div></div>
  </div>
  <div id="user-info" style="font-size:.82rem;color:#5a5e7a">👤 <span id="uname">게스트</span></div>
  <button onclick="doLogout()" style="background:none;border:none;color:#3a3e5a;cursor:pointer;font-size:.82rem">[로그아웃]</button>
</header>

<div class="main">

  <!-- ① 채굴 패널 -->
  <div class="panel">
    <div class="panel-title">⛏️ 에테르 채굴장</div>
    <div style="text-align:center;font-size:.8rem;color:#5a5e7a;margin-bottom:6px">핑크존에서 클릭 → 콤보 보너스!</div>
    <div class="mine-track" id="mine-track">
      <div class="mine-zone" id="mine-zone"></div>
      <div class="mine-ptr" id="mine-ptr"></div>
    </div>
    <div class="combo-display" id="combo-disp">콤보 0</div>
    <div style="text-align:center;font-size:.8rem;color:#5a5e7a;margin-top:4px;margin-bottom:10px">
      기본 <b style="color:#fff" id="base-yield">2</b>G · 크리 <b style="color:var(--gold)" id="crit-yield">12</b>G · 속도 <b style="color:var(--r)" id="mine-spd">2.5</b>
    </div>
    <button class="btn" onclick="doMine()">⛏️ 채굴!</button>

    <div style="margin-top:14px;font-family:'Black Han Sans',sans-serif;font-size:.9rem;color:#8e92a8">📈 영구 업그레이드</div>
    <div class="upgrade-grid" id="upg-grid"></div>
  </div>

  <!-- ② 가챠 패널 -->
  <div class="panel">
    <div class="panel-title">✨ 차원 소환</div>
    <div class="gacha-screen" id="gacha-scr">
      <span id="gacha-msg" style="font-size:1.1rem;font-weight:700;color:#3a3e5a">대기 중...</span>
      <img src="" id="gacha-img" class="gacha-img" alt="소환 결과">
      <div class="grade-badge" id="grade-badge" style="display:none"></div>
    </div>
    <div class="pity-info">천장까지 <b id="pity-left">80</b>회 남음 · 80회 시 전설 확정!</div>
    <div class="multi-wrap">
      <button class="btn" id="g1-btn" onclick="doGacha(1)">🧬 1회 소환<br><small style="font-weight:400;opacity:.7">30G</small></button>
      <button class="btn btn-gold" id="g10-btn" onclick="doGacha(10)">💥 10연 소환<br><small style="font-weight:400;opacity:.7">270G (10% 할인)</small></button>
    </div>

    <!-- 합성/진화 -->
    <div class="synthesis-area">
      <div style="font-size:.85rem;font-weight:700;color:#8e92a8">⚗️ 합성 진화 <small style="font-weight:400;color:#3a3e5a">(같은 영웅 3장 → 등급 상승)</small></div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap">
        <div class="synth-slots" id="synth-slots">
          <div class="synth-slot" id="ss0" onclick="pickSynth(0)">1</div>
          <div class="synth-slot" id="ss1" onclick="pickSynth(1)">2</div>
          <div class="synth-slot" id="ss2" onclick="pickSynth(2)">3</div>
        </div>
        <div class="synth-arrow">→</div>
        <div class="synth-slot" style="border-style:solid;border-color:var(--l);background:rgba(245,168,0,.08)" id="synth-result">?</div>
        <button class="btn btn-gold btn-sm" onclick="doSynth()" style="margin-left:4px">진화!</button>
      </div>
    </div>
  </div>

  <!-- ③ 디펜스 패널 -->
  <div class="panel" style="min-width:300px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="panel-title" style="margin-bottom:0">⚔️ 전장 수호</div>
      <button class="btn btn-red btn-sm" onclick="spawnWave()">👾 웨이브 시작</button>
    </div>
    <div class="def-field" id="def-field">
      <div class="ground-line"></div>
      <div class="stage-clear" id="stage-clear">STAGE CLEAR! 🎉</div>
    </div>
    <!-- 스킬 바 -->
    <div class="skill-bar" id="skill-bar"></div>
    <!-- 배치 벤치 -->
    <div class="bench-row" id="bench-row"></div>
  </div>

</div>

<!-- 채팅 -->
<div class="chat-panel">
  <div style="font-size:.85rem;font-weight:700;color:#5a5e7a;margin-bottom:8px">💬 광장 채팅</div>
  <div id="chat-log"></div>
  <input class="chat-input" id="chat-in" placeholder="메시지 입력 후 Enter" onkeydown="if(event.key==='Enter')sendChat()">
</div>

<div id="toast"></div>

<script>
// ─── Firebase ───
const firebaseConfig={
  apiKey:"AIzaSyCcFkzVkZ2ui3WSIkFbxDa3m5OvebXSfk4",
  authDomain:"chosanghee00001.firebaseapp.com",
  databaseURL:"https://chosanghee00001-default-rtdb.firebaseio.com",
  projectId:"chosanghee00001",
  storageBucket:"chosanghee00001.firebasestorage.app",
  messagingSenderId:"705786109560",
  appId:"1:705786109560:web:01b69c754e13df96e8978d"
};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(),db=firebase.database();

// ─── 상태 ───
let gold=50,stage=1,pity=0;
let myArmy=[]; // {heroIdx, id, count, lv}
let activeUnits=[];
let combo=0,comboTimer=null;
let userId=null,isGuest=false;
let synthPick=[null,null,null];
let waveActive=false;

// 업그레이드 레벨
const upgDef=[
  {name:'채굴 속도',key:'mSpd',base:2.5,inc:.5,cost:40,max:10,unit:''},
  {name:'기본 보상',key:'mBase',base:2,inc:1,cost:50,max:8,unit:'G'},
  {name:'크리 보상',key:'mCrit',base:12,inc:4,cost:60,max:8,unit:'G'},
  {name:'유닛 공격력',key:'uAtk',base:1.0,inc:.15,cost:80,max:10,unit:'x'},
];
let upgLv={mSpd:0,mBase:0,mCrit:0,uAtk:0};
function upgVal(k){const d=upgDef.find(x=>x.key===k);return d.base+d.inc*upgLv[k]}
function upgCost(k){const d=upgDef.find(x=>x.key===k);return d.cost+d.cost*upgLv[k]}

// ─── 영웅 데이터 ───
const HEROES=[
  {name:'메카 발키리',grade:'COMMON',img:'https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=300',pwr:18,hp:130,col:'#8e92a8',
   skill:{name:'실드',desc:'HP 30% 회복',cd:8000,fx:'#00ffaa',run:(u)=>healUnit(u,.3)}},
  {name:'네온 아처',grade:'RARE',img:'https://images.unsplash.com/photo-1578632767115-351597cf2477?w=300',pwr:35,hp:160,col:'#00ccff',
   skill:{name:'연사',desc:'3회 연속 타격',cd:6000,fx:'#00ccff',run:(u)=>multiShot(u,3)}},
  {name:'사이코 위치',grade:'EPIC',img:'https://images.unsplash.com/photo-1534447677768-be436bb09401?w=300',pwr:80,hp:240,col:'#cc00ff',
   skill:{name:'마력 폭발',desc:'범위 2배 데미지',cd:7000,fx:'#cc00ff',run:(u)=>aoeBlast(u,2)}},

function doAuth(t){
  const em=document.getElementById('em').value,pw=document.getElementById('pw').value,err=document.getElementById('auth-err');
  err.textContent='';
  if(!em||!pw){err.textContent='이메일과 비밀번호를 입력하세요';return}

  fn(em,pw).catch(e=>err.textContent=(t==='login'?'로그인':'가입')+' 실패: '+e.message);
}
function guestPlay(){isGuest=true;document.getElementById('auth-modal').style.display='none';initGame()}
function doLogout(){if(isGuest)location.reload();else auth.signOut().then(()=>location.reload())}

function initGame(){updateUI();buildUpgGrid();renderBench();buildSkillBar()}

// ─── UI 업데이트 ───
function updateUI(){
  document.getElementById('gold-hd').textContent=gold;
  document.getElementById('stage-hd').textContent=stage;
  document.getElementById('pity-hd').textContent=pity;
  document.getElementById('pity-bar-hd').style.width=(pity/80*100)+'%';
  document.getElementById('pity-left').textContent=80-pity;
  document.getElementById('base-yield').textContent=upgVal('mBase');

// ─── 채굴 시스템 ───
let ptr=0,ptrDir=1;
setInterval(()=>{
  const spd=upgVal('mSpd');
  ptr+=spd*ptrDir;
  if(ptr>=100||ptr<=0)ptrDir*=-1;
  document.getElementById('mine-ptr').style.left=ptr+'%';
  // 크리존 위치도 살짝 변동
}, 25);

// 크리존: 60~78
function doMine(){
  const inCrit=ptr>=60&&ptr<=78;
  const base=Math.round(upgVal('mBase'));
  const crit=Math.round(upgVal('mCrit'));
  
  if(inCrit){
    combo=Math.min(combo+1,20);
    const mult=1+combo*.15;
    const earned=Math.round(crit*mult);
    gold+=earned;
    toast(`⚡ CRIT! +${earned}G (콤보x${combo})`,'#f5a800');
    spawnParticles(100,document.getElementById('mine-track'),'#f5a800',15);
    document.getElementById('miner-cnt')&&null;
  } else {
    combo=Math.max(0,combo-2);
    gold+=base;
    toast(`+${base}G`,'#8e92a8');
  }
  document.getElementById('combo-disp').textContent=`콤보 ${combo}`;
  const cd=document.getElementById('combo-disp');
  cd.classList.add('hit');setTimeout(()=>cd.classList.remove('hit'),100);
  if(comboTimer)clearTimeout(comboTimer);
  comboTimer=setTimeout(()=>{combo=0;document.getElementById('combo-disp').textContent='콤보 0'},2500);
  saveData();updateUI();
}

// ─── 업그레이드 그리드 ───
function buildUpgGrid(){
  const g=document.getElementById('upg-grid');
  g.innerHTML='';
  upgDef.forEach(d=>{
    const lv=upgLv[d.key];
    const cost=upgCost(d.key);
    const maxed=lv>=d.max;
    const div=document.createElement('div');
    div.className='upg-card';
    div.innerHTML=`<div class="upg-name">${d.name}</div>
      <div class="upg-val">Lv ${lv} → ${upgVal(d.key).toFixed(d.unit==='x'?2:0)}${d.unit}</div>
      <div class="upg-cost">${maxed?'MAX':cost+'G'}</div>`;
    if(!maxed) div.onclick=()=>doUpgrade(d.key);
    if(maxed) div.style.opacity='.5';
    g.appendChild(div);
  });
}
function doUpgrade(k){
  const cost=upgCost(k);
  if(gold<cost){toast('골드 부족!','#ff3355');return}
  gold-=cost;upgLv[k]++;
  toast(`업그레이드! ${upgDef.find(x=>x.key===k).name} Lv${upgLv[k]}`,'#00ccff');
  saveData();updateUI();
}

// ─── 가챠 ───
let gachaRunning=false;
function doGacha(n){
  if(gachaRunning)return;
  const cost=n===1?30:270;
  if(gold<cost){toast('골드 부족! 채굴하세요.','#ff3355');return}
  gold-=cost;gachaRunning=true;
  document.getElementById('g1-btn').disabled=true;
  document.getElementById('g10-btn').disabled=true;
  document.getElementById('gacha-msg').textContent='소환 중...';
  document.getElementById('gacha-img').style.display='none';
  document.getElementById('grade-badge').style.display='none';
  document.getElementById('gacha-scr').className='gacha-scr';

  const results=[];
  for(let i=0;i<n;i++){
    pity++;
    let hero;
    if(pity>=80){hero=HEROES[3];pity=0} // 천장 전설 확정
    else{
      const r=Math.random()*100;
      hero=r<6?HEROES[3]:r<24?HEROES[2]:r<60?HEROES[1]:HEROES[0];
    }
    results.push(hero);
  }
  // 10연이면 마지막에 가장 고등급 보여줌
  const best=results.reduce((a,b)=>gradeRank(b.grade)>gradeRank(a.grade)?b:a,results[0]);

  setTimeout(()=>{
    showGachaResult(best);
    results.forEach(h=>addToArmy(h));
    gachaRunning=false;
    document.getElementById('g1-btn').disabled=false;
    document.getElementById('g10-btn').disabled=false;
    saveData();updateUI();renderBench();buildSkillBar();
  },500);
}
function gradeRank(g){return{COMMON:0,RARE:1,EPIC:2,LEGENDARY:3}[g]}
function showGachaResult(hero){
  const scr=document.getElementById('gacha-scr');
  scr.className='gacha-scr '+hero.grade;
  const img=document.getElementById('gacha-img');
  img.src=hero.img;img.style.display='block';
  document.getElementById('gacha-msg').textContent='';
  const badge=document.getElementById('grade-badge');
  badge.textContent=`[${hero.grade}] ${hero.name}`;
  badge.style.display='block';
  badge.style.background=GRADES[hero.grade].col;
  badge.style.color=hero.grade==='COMMON'?'#fff':'#000';
  if(hero.grade==='LEGENDARY'){
    spawnParticles(300,scr,'#f5a800',30);
    spawnParticles(200,scr,'#ff6600',20);
  } else if(hero.grade==='EPIC'){
    spawnParticles(150,scr,'#cc00ff',20);
  }
}
function addToArmy(hero){
  const hi=HEROES.indexOf(hero);
  const ex=myArmy.find(x=>x.heroIdx===hi);
  if(ex){ex.count=(ex.count||1)+1}
  else{myArmy.push({heroIdx:hi,id:'u_'+Date.now()+'_'+Math.random(),count:1,lv:1})}
}

// ─── 합성 ───
let synthPickFn=null;
function pickSynth(slot){
  // 가진 영웅 선택 모달 대신 간단히 myArmy 순서대로 채우기
  const available=myArmy.filter(x=>(x.count||1)>=1);
  if(!available.length){toast('영웅이 없습니다','#ff3355');return}
  // 현재 slot에 순서대로 배정 (클릭 시마다 다음 영웅)
  const cur=synthPick[slot];
  const idx=cur===null?0:(available.findIndex(x=>x.id===cur)+1)%available.length;
  synthPick[slot]=available[idx].id;
  updateSynthSlots();
}
function updateSynthSlots(){
  for(let i=0;i<3;i++){
    const sl=document.getElementById('ss'+i);
    const uid=synthPick[i];
    if(uid){
      const entry=myArmy.find(x=>x.id===uid);
      if(entry){
        const h=HEROES[entry.heroIdx];
        sl.style.backgroundImage=`url(${h.img})`;
        sl.style.borderColor=h.col;
        sl.classList.add('filled');
        sl.textContent='';
      }
    } else {
      sl.style.backgroundImage='none';sl.style.borderColor='#252945';sl.classList.remove('filled');sl.textContent=i+1;
    }
  }
  // 미리보기
  const res=document.getElementById('synth-result');
  const ids=synthPick.filter(x=>x!==null);
  if(ids.length===3){
    const entries=ids.map(id=>myArmy.find(x=>x.id===id));
    const sameHero=entries.every(e=>e&&e.heroIdx===entries[0].heroIdx);
    if(sameHero){
      const h=HEROES[entries[0].heroIdx];
      const ev=GRADES[h.grade].evo;
      if(ev){
        const nh=HEROES.find(x=>x.grade===ev)||h;
        res.style.backgroundImage=`url(${nh.img})`;
        res.style.borderColor=GRADES[ev].col;
        res.textContent='';
      } else {res.textContent='MAX';res.style.backgroundImage='none'}
    } else {res.textContent='?';res.style.backgroundImage='none'}
  } else {res.textContent='?';res.style.backgroundImage='none'}
}
function doSynth(){
  const ids=synthPick.filter(x=>x!==null);
  if(ids.length<3){toast('슬롯을 모두 채우세요','#ff3355');return}
  const entries=ids.map(id=>myArmy.find(x=>x.id===id));
  if(!entries.every(Boolean)){toast('영웅 정보 오류','#ff3355');return}
  if(!entries.every(e=>e.heroIdx===entries[0].heroIdx)){toast('같은 영웅 3장이 필요합니다!','#ff3355');return}
  const h=HEROES[entries[0].heroIdx];
  const ev=GRADES[h.grade].evo;
  if(!ev){toast('이미 최고 등급입니다!','#f5a800');return}
  // 3장 차감
  entries.forEach(e=>{e.count=(e.count||1)-1});
  myArmy=myArmy.filter(x=>(x.count||1)>0);
  // 진화 영웅 추가
  const evoHero=HEROES.find(x=>x.grade===ev&&x.heroIdx===undefined)||HEROES.find(x=>x.grade===ev);
  if(evoHero) addToArmy(evoHero);
  synthPick=[null,null,null];
  updateSynthSlots();
  toast(`🔥 진화 성공! → [${ev}]`,'#f5a800');
  spawnParticles(200,document.getElementById('gacha-scr'),'#f5a800',25);
  saveData();updateUI();renderBench();buildSkillBar();
}

// ─── 스킬 바 ───
const skillCooldowns={}; // unitId → {lastUsed, cd}
function buildSkillBar(){
  const bar=document.getElementById('skill-bar');
  bar.innerHTML='<div style="font-size:.78rem;color:#3a3e5a;width:100%">배치된 영웅의 스킬이 여기에 표시됩니다</div>';
}
function refreshSkillBar(){
  const bar=document.getElementById('skill-bar');
  bar.innerHTML='';
  const heroes=activeUnits.filter(u=>u.side==='hero');
  if(!heroes.length){bar.innerHTML='<div style="font-size:.78rem;color:#3a3e5a;width:100%">배치된 영웅의 스킬이 여기에 표시됩니다</div>';return}
  heroes.forEach(u=>{
    const h=HEROES[u.heroIdx];
    if(!h||!h.skill)return;
    const now=Date.now();
    const last=skillCooldowns[u.id]||0;
    const elapsed=now-last;
    const cd=h.skill.cd;
    const ready=elapsed>=cd;
    const pct=Math.min(100,elapsed/cd*100);
    const btn=document.createElement('div');
    btn.className='skill-btn'+(ready?' ready':'');
    btn.id='sk_'+u.id;
    btn.innerHTML=`<div class="sk-name">${u.name||h.name}</div>
      <div class="sk-name" style="color:${h.col};font-size:.7rem">${h.skill.name}</div>
      <div class="sk-cd">${ready?'준비 완료!':Math.ceil((cd-elapsed)/1000)+'초'}</div>
      <div class="skill-cd-bar" style="width:${pct}%;background:${h.col}"></div>`;
    if(ready) btn.onclick=()=>useSkill(u);
    bar.appendChild(btn);
  });
}

// ─── 스킬 구현 ───
function useSkill(u){
  const h=HEROES[u.heroIdx];
  if(!h||!h.skill)return;
  const now=Date.now();
  if(now-(skillCooldowns[u.id]||0)<h.skill.cd){toast('쿨다운 중!','#5a5e7a');return}
  skillCooldowns[u.id]=now;
  h.skill.run(u);
  showSkillFX(u.x,u.y,h.skill.fx);
  toast(`💥 ${h.name} - ${h.skill.name}!`,h.col);
}
function showSkillFX(x,y,col){
  const f=document.getElementById('def-field');
  const fx=document.createElement('div');
  fx.className='skill-fx';
  fx.style.cssText=`left:${x}px;top:${y}px;width:40px;height:40px;background:${col};margin-left:-20px;margin-top:-20px`;
  f.appendChild(fx);
  setTimeout(()=>fx.remove(),400);
}
function healUnit(u,pct){u.curHp=Math.min(u.hp,u.curHp+u.hp*pct);showDmg(u.x,u.y,'+'+(Math.round(u.hp*pct))+' HP','#00ffaa')}
function multiShot(u,n){
  const targets=activeUnits.filter(t=>t.side!=='hero');
  if(!targets.length)return;
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      if(!targets.length)return;
      const t=targets[0];
      const dmg=Math.round(u.pwr*1.2*upgVal('uAtk'));
      t.curHp-=dmg;showDmg(t.x,t.y,dmg,'#00ccff');
    },i*150);
  }
}
function aoeBlast(u,mult){
  const targets=activeUnits.filter(t=>t.side!=='hero');
  targets.forEach(t=>{
    const dmg=Math.round(u.pwr*mult*upgVal('uAtk'));
    t.curHp-=dmg;showDmg(t.x,t.y,dmg+'💥','#cc00ff');
  });
}
function dragonBlast(u){
  const targets=activeUnits.filter(t=>t.side!=='hero');
  targets.forEach(t=>{
    const dmg=Math.round(u.pwr*3*upgVal('uAtk'));
    t.curHp-=dmg;showDmg(t.x,t.y,dmg+'🔥','#f5a800');
    spawnParticles(30,document.getElementById('def-field'),'#f5a800',8);
  });
}
function chargeAtk(u){
  const targets=activeUnits.filter(t=>t.side!=='hero');
  if(!targets.length)return;
  const t=targets[0];
  u.x=t.x-40;
  const dmg=Math.round(u.pwr*2.5*upgVal('uAtk'));
  t.curHp-=dmg;showDmg(t.x,t.y,dmg+'⚡','#00ccff');
}
function poisonAtk(u){
  const targets=activeUnits.filter(t=>t.side!=='hero');
  if(!targets.length)return;
  const t=targets[0];
  t.poisoned=true;
  showDmg(t.x,t.y,'☠️ 독!','#44ff00');
}

let waveTimer=null;

// 전투 루프
setInterval(()=>{
  const now=Date.now();
  activeUnits.forEach(u=>{
    const el=document.getElementById(u.id);
    if(!el)return;
    const enemies=activeUnits.filter(t=>t.side!==u.side);
    if(enemies.length){
      let closest=enemies[0],minD=9999;
      enemies.forEach(t=>{const d=Math.hypot(t.x-u.x,t.y-u.y);if(d<minD){minD=d;closest=t}});
      if(minD>38){
        const dx=closest.x-u.x,dy=closest.y-u.y,dist=Math.hypot(dx,dy);
        const spd=u.side==='hero'?2.2:1.6;
        u.x+=dx/dist*spd;u.y+=dy/dist*spd*.5;
        u.x=Math.max(5,Math.min(440,u.x));
        u.y=Math.max(5,Math.min(220,u.y));
      } else if(now-u.lastAtk>900){
        u.lastAtk=now;
        let dmg=u.pwr;
        const atk=upgVal('uAtk');
        if(u.side==='hero') dmg=Math.round(dmg*atk);
        let crit=false;
        if((u.grade==='EPIC'||u.grade==='LEGENDARY')&&Math.random()>.5){dmg=Math.round(dmg*2.2);crit=true}
        closest.curHp-=dmg;
        showDmg(closest.x,closest.y,crit?dmg+' CRIT!':String(dmg),crit?'#f5a800':u.col);
        const hpEl=document.getElementById('hp_'+closest.id);
        if(hpEl) hpEl.style.width=Math.max(0,closest.curHp/closest.hp*100)+'%';
      }
    } else {
      u.x+=(u.side==='hero'?1.5:-1.2);
    }
    // 독 데미지
    if(u.poisoned&&now%1000<100){u.curHp-=5;showDmg(u.x,u.y,'5☠','#44ff00')}
    el.style.left=u.x+'px';el.style.top=u.y+'px';
    // 스킬 쿨다운 바
    if(u.side==='hero'){
      const h=HEROES[u.heroIdx];
      if(h&&h.skill){
        const elapsed=now-(skillCooldowns[u.id]||0);
        const pct=Math.min(100,elapsed/h.skill.cd*100);
        const scd=document.getElementById('scd_'+u.id);
        if(scd) scd.style.width=pct+'%';
      }
    }
  });
  // 사망 처리
  activeUnits=activeUnits.filter(u=>{
    if(u.curHp<=0||u.x<-15||u.x>470){
      if(u.side==='enemy'&&u.curHp<=0){gold+=8;updateUI()}
      document.getElementById(u.id)?.remove();
      if(u.side==='hero') refreshSkillBar();
      return false;
    }
    return true;
  });
  // 웨이브 클리어 체크
  if(waveActive&&activeUnits.length&&!activeUnits.some(u=>u.side==='enemy')){
    waveActive=false;stage++;gold+=50;
    const sc=document.getElementById('stage-clear');
    sc.style.opacity='1';setTimeout(()=>sc.style.opacity='0',2000);
    spawnParticles(250,document.getElementById('def-field'),'#00ccff',20);
    toast(`🎉 Stage ${stage-1} 클리어! +50G`,'#00ccff');
    saveData();updateUI();
  }
  refreshSkillBar();
},100);

function showDmg(x,y,text,col){
  const f=document.getElementById('def-field');
  const d=document.createElement('div');
  d.className='dmg';d.style.cssText=`left:${x}px;top:${y-10}px;color:${col}`;
  d.textContent=text;f.appendChild(d);
  setTimeout(()=>d.remove(),700);
}

// ─── 파티클 ───
const canvas=document.getElementById('particle-canvas');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});
let particles=[];
function spawnParticles(n,el,col,size){
  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height/2;
  for(let i=0;i<n;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=1+Math.random()*4;
    particles.push({x:cx,y:cy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-2,life:1,col,size:2+Math.random()*size});
  }
}
function animParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life-=.025;
    ctx.globalAlpha=p.life;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
    return p.life>0;
  });
  ctx.globalAlpha=1;
  requestAnimationFrame(animParticles);
}
animParticles();

// ─── 토스트 ───
function toast(msg,col='#fff'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.color=col;t.style.borderColor=col;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

// ─── 채팅 ───
function sendChat(){
  const inp=document.getElementById('chat-in');
  if(!inp.value.trim())return;
  const name=document.getElementById('uname').textContent;
  if(!isGuest&&userId){db.ref('world_chat').push({name,msg:inp.value})}
  else{addChatLine(name,inp.value)} // 게스트는 로컬만
  inp.value='';
}
function listenChat(){
  db.ref('world_chat').limitToLast(30).on('child_added',s=>{
    const d=s.val();addChatLine(d.name,d.msg);
  });
}
function addChatLine(name,msg){
  const log=document.getElementById('chat-log');
  const div=document.createElement('div');div.className='chat-row';
  div.innerHTML=`<span style="color:#00ccff;font-weight:700">[${name}]</span> ${msg}`;
  log.appendChild(div);log.scrollTop=log.scrollHeight;
}

// ─── 저장/불러오기 ───
function saveData(){
  if(!userId||isGuest)return;
  db.ref('users2/'+userId).set({gold,stage,pity,myArmy,upgLv});
}
function loadData(){
  db.ref('users2/'+userId).once('value',s=>{
    const d=s.val();
    if(d){
      gold=d.gold||50;stage=d.stage||1;pity=d.pity||0;
      myArmy=d.myArmy||[];upgLv=d.upgLv||{mSpd:0,mBase:0,mCrit:0,uAtk:0};
    }
    initGame();
    listenChat();
  });
}
</script>
