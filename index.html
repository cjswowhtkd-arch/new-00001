<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ 레전드 가챠 디펜스</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060810;--panel:#0b0d1a;--panel2:#0f1220;
  --border:#1c2035;--border2:#252945;
  --acc:#e8005a;--acc2:#7700ee;
  --gold:#f5a800;--gold2:#ff8c00;
  --cyan:#00d4ff;--purple:#cc00ff;
  --green:#00e87a;--red:#ff3355;
  --white:#e8eaf0;--muted:#5a5e7a;--dim:#3a3e5a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;overflow-x:hidden;user-select:none}
h1,h2,.bold{font-family:'Black Han Sans',sans-serif}
canvas#bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.35}
 
/* ── LAYOUT ── */
.app{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:12px}
 
/* ── HEADER ── */
header{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:10px 14px;background:rgba(11,13,26,.95);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;backdrop-filter:blur(8px)}
.logo{font-family:'Black Han Sans',sans-serif;font-size:1.15rem;background:linear-gradient(90deg,var(--acc),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex:1;min-width:120px}
.stat{background:var(--panel2);border:1px solid var(--border);padding:5px 12px;border-radius:20px;font-size:.82rem;font-weight:700;white-space:nowrap}
.stat b{color:var(--gold)}
.stat.stage-s b{color:var(--cyan)}
.pity-wrap{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted)}
.pity-track{width:70px;height:6px;background:var(--panel2);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.pity-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--gold));border-radius:3px;transition:width .3s}
.pity-fill.near{background:linear-gradient(90deg,var(--gold),#fff);animation:glow .6s infinite alternate}
@keyframes glow{from{filter:brightness(1)}to{filter:brightness(1.8)}}
 
/* ── GRID ── */
.grid{display:grid;grid-template-columns:260px 260px 1fr;gap:12px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
 
/* ── PANEL ── */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:14px 14px 0 0}
.panel.mine-panel::before{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.panel.gacha-panel::before{background:linear-gradient(90deg,var(--acc),var(--acc2))}
.panel.def-panel::before{background:linear-gradient(90deg,var(--cyan),var(--purple))}
.ptitle{font-family:'Black Han Sans',sans-serif;font-size:.92rem;color:#8e92b8;margin-bottom:12px;display:flex;align-items:center;gap:6px}
 
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:.9rem;transition:all .15s;width:100%;color:#fff;position:relative;overflow:hidden;font-family:'Noto Sans KR',sans-serif}
.btn::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,.1);opacity:0;transition:opacity .15s}
.btn:hover::before{opacity:1}.btn:active{transform:scale(.96)}
.btn:disabled{background:#16192a!important;color:#3a3e5a;cursor:not-allowed;transform:none!important}
.btn-acc{background:linear-gradient(135deg,var(--acc),var(--acc2))}
.btn-gold{background:linear-gradient(135deg,#c07800,var(--gold))}
.btn-red{background:linear-gradient(135deg,#8a0020,var(--red))}
.btn-cyan{background:linear-gradient(135deg,#006a90,var(--cyan))}
.btn-sm{padding:6px 12px;font-size:.78rem;width:auto}
.btn-xs{padding:4px 8px;font-size:.72rem;width:auto;border-radius:6px}
 
/* ── 채굴 ── */
.mine-track{position:relative;height:36px;background:#060810;border:2px solid var(--border);border-radius:10px;overflow:hidden;margin:10px 0;cursor:pointer}
/* 크리존: 확실히 보임 */
.crit-zone{position:absolute;top:0;height:100%;background:rgba(245,168,0,.22);border-left:3px solid var(--gold);border-right:3px solid var(--gold);transition:left .1s,width .1s;z-index:1;pointer-events:none}
.crit-label{position:absolute;top:50%;transform:translateY(-50%);left:50%;transform:translate(-50%,-50%);font-size:.65rem;font-weight:700;color:var(--gold);font-family:'Black Han Sans',sans-serif;z-index:2;pointer-events:none;white-space:nowrap}
/* 포인터 */
.mine-ptr{position:absolute;top:0;width:5px;height:100%;z-index:3;pointer-events:none;transition:left .022s linear}
.mine-ptr-bar{width:100%;height:100%;background:#fff;border-radius:2px;box-shadow:0 0 8px #fff,0 0 20px rgba(255,255,255,.5)}
/* 클릭 히트 플래시 */
.mine-flash{position:absolute;inset:0;background:var(--gold);opacity:0;z-index:4;border-radius:8px;pointer-events:none;transition:opacity .05s}
 
.combo-big{font-family:'Black Han Sans',sans-serif;font-size:2.4rem;text-align:center;color:var(--gold);line-height:1.1;min-height:44px;transition:transform .08s}
.combo-big.pop{transform:scale(1.4) rotate(-3deg)}
.mine-info{display:flex;justify-content:space-around;font-size:.75rem;color:var(--muted);margin:6px 0 10px}
.mine-info b{color:var(--white);font-size:.85rem}
.upg-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.upg-card{background:#07090f;border:1px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.upg-card:hover:not(.maxed){border-color:var(--gold);background:#0d0f1c}
.upg-card.maxed{opacity:.45;cursor:default}
.upg-name{font-size:.72rem;color:var(--muted)}
.upg-val{font-size:.88rem;font-weight:700;color:var(--gold);margin:2px 0}
.upg-cost{font-size:.7rem;color:var(--dim)}
 
/* ── 가챠 ── */
.gacha-screen{height:200px;background:#000;border-radius:12px;border:2px solid var(--border);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column;margin:8px 0;transition:border-color .3s,box-shadow .3s}
.gacha-screen.L{border-color:var(--gold);box-shadow:0 0 40px rgba(245,168,0,.6),inset 0 0 40px rgba(245,168,0,.15)}
.gacha-screen.E{border-color:var(--purple);box-shadow:0 0 30px rgba(204,0,255,.5)}
.gacha-screen.R{border-color:var(--cyan);box-shadow:0 0 20px rgba(0,212,255,.4)}
.gacha-screen.C{border-color:#5a5e7a}
.gacha-img{width:100%;height:100%;object-fit:cover;display:none}
@keyframes flip{from{transform:perspective(400px) rotateY(90deg) scale(.5);filter:brightness(5)}to{transform:perspective(400px) rotateY(0) scale(1);filter:brightness(1)}}
.gacha-img.shown{display:block;animation:flip .45s cubic-bezier(.175,.885,.32,1.275)}
.grade-badge{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);padding:3px 14px;border-radius:20px;font-size:.78rem;font-weight:700;z-index:5;white-space:nowrap}
.pity-info{font-size:.73rem;color:var(--muted);text-align:center;margin:4px 0 8px}
.pity-info b{color:var(--gold)}
.multi-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.synth-area{background:#07090f;border:1px dashed var(--border2);border-radius:10px;padding:10px;margin-top:10px}
.synth-row{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.synth-slot{width:46px;height:46px;border-radius:8px;border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--dim);background:#07080f;cursor:pointer;transition:all .2s;background-size:cover;background-position:center;flex-shrink:0}
.synth-slot.on{border-style:solid;border-color:var(--acc)}
.arrow{color:var(--dim);font-size:1.4rem}
 
/* ── 디펜스 ── */
.def-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.wave-info{font-size:.8rem;color:var(--muted)}
.wave-info b{color:var(--red)}
.life-bar{display:flex;gap:4px;align-items:center;font-size:.8rem}
.life-heart{color:var(--red);font-size:.9rem}
 
/* 전장 */
.battlefield{height:260px;background:linear-gradient(180deg,#040610 0%,#090c1f 55%,#0b1025 100%);border-radius:12px;position:relative;overflow:hidden;border:1px solid var(--border)}
.bf-ground{position:absolute;bottom:0;width:100%;height:28px;background:linear-gradient(180deg,transparent,rgba(0,212,255,.06));border-top:1px solid rgba(0,212,255,.12)}
.bf-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:40px 40px}
.stage-banner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Black Han Sans',sans-serif;font-size:2rem;background:rgba(0,0,0,.7);z-index:50;opacity:0;pointer-events:none;transition:opacity .4s}
 
/* 유닛 공통 */
.unit{position:absolute;width:44px;height:44px;border-radius:50%;border:2px solid;background-size:cover;background-position:center;transition:left .07s linear,top .07s linear;cursor:default}
.unit-bars{position:absolute;top:-16px;left:-3px;width:50px;display:flex;flex-direction:column;gap:2px}
.unit-bar-track{height:4px;border-radius:2px;overflow:hidden}
.unit-bar-fill{height:100%;border-radius:2px;transition:width .08s}
.hp-track{background:#1a0000}
.hp-fill{background:var(--green)}
.sp-track{background:#1a001a}
.sp-fill{background:var(--purple)}
 
/* 데미지 팝업 */
.dmg-pop{position:absolute;font-family:'Black Han Sans',sans-serif;font-size:.88rem;animation:dmgAnim .75s ease-out forwards;pointer-events:none;z-index:30;text-shadow:1px 1px 4px #000}
@keyframes dmgAnim{0%{transform:translateY(0) scale(1);opacity:1}50%{transform:translateY(-22px) scale(1.2);opacity:1}100%{transform:translateY(-44px) scale(.8);opacity:0}}
 
/* 스킬 이펙트 */
.skill-fx{position:absolute;border-radius:50%;pointer-events:none;z-index:20;animation:sfx .45s ease-out forwards}
@keyframes sfx{0%{transform:scale(.1);opacity:.9}100%{transform:scale(4);opacity:0}}
 
/* 벤치 */
.bench{display:flex;gap:6px;margin-top:8px;overflow-x:auto;padding-bottom:4px;min-height:72px;align-items:center}
.hero-card{position:relative;flex-shrink:0;cursor:pointer;transition:transform .15s}
.hero-card:hover{transform:translateY(-5px)}
.hero-thumb{width:52px;height:52px;border-radius:10px;border:2px solid;background-size:cover;background-position:center;position:relative}
.hero-lv{position:absolute;top:1px;left:1px;background:rgba(0,0,0,.85);font-size:.6rem;font-weight:700;padding:1px 4px;border-radius:4px;color:var(--gold)}
.hero-cnt{position:absolute;top:1px;right:1px;background:var(--acc);border-radius:8px;font-size:.6rem;font-weight:700;padding:1px 4px;color:#fff}
.hero-nm{font-size:.6rem;text-align:center;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52px}
.bench-empty{font-size:.75rem;color:var(--dim);padding:8px 0}
 
/* 스킬 바 */
.skill-bar{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;min-height:38px}
.sk-btn{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;transition:all .18s;min-width:76px;position:relative;overflow:hidden;text-align:center}
.sk-btn.ready{border-color:var(--purple);background:#16003a;box-shadow:0 0 10px rgba(204,0,255,.3)}
.sk-btn .sk-nm{font-size:.7rem;font-weight:700;color:var(--white)}
.sk-btn .sk-cd{font-size:.65rem;color:var(--muted);margin-top:1px}
.sk-cd-bar{position:absolute;bottom:0;left:0;height:3px;border-radius:0 0 8px 8px;transition:width .1s}
 
/* 파티클 캔버스 (전장 위) */
.fx-canvas{position:absolute;inset:0;pointer-events:none;z-index:10}
 
/* 토스트 */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--panel2);border:1px solid;padding:10px 22px;border-radius:12px;font-weight:700;z-index:9000;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;font-size:.88rem}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
 
/* 경고 오버레이 */
.danger-overlay{position:fixed;inset:0;pointer-events:none;z-index:8000;opacity:0;transition:opacity .3s;border:6px solid var(--red);border-radius:0}
.danger-overlay.show{opacity:1;animation:dangerPulse .4s infinite alternate}
@keyframes dangerPulse{from{opacity:.5}to{opacity:1}}
 
/* 체력 바 */
.life-display{display:flex;align-items:center;gap:6px}
.life-track{flex:1;height:8px;background:var(--panel2);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.life-fill{height:100%;border-radius:4px;transition:width .3s;background:var(--green)}
.life-fill.warn{background:var(--gold)}
.life-fill.crit{background:var(--red);animation:hpPulse .4s infinite alternate}
@keyframes hpPulse{from{filter:brightness(1)}to{filter:brightness(1.8)}}
 
/* 스크롤바 */
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
 
/* game over */
#gameover{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#gameover.show{display:flex}
#gameover h2{font-family:'Black Han Sans',sans-serif;font-size:3rem;color:var(--red);text-shadow:0 0 30px var(--red)}
#gameover p{color:var(--muted);font-size:1rem}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="danger-overlay" id="danger-overlay"></div>
<div id="gameover">
  <h2>GAME OVER</h2>
  <p id="go-info">스테이지 1 클리어</p>
  <button class="btn btn-red" style="width:200px" onclick="location.reload()">🔄 다시 시작</button>
</div>
 
<div class="app">
<!-- HEADER -->
<header>
  <div class="logo">🔮 레전드 가챠 디펜스</div>
  <div class="stat">💰 <b id="h-gold">50</b>G</div>
  <div class="stat stage-s">⚔️ Stage <b id="h-stage">1</b></div>
  <div class="stat life-display" style="gap:8px;padding:5px 14px">
    ❤️ <div class="life-track" style="width:80px"><div class="life-fill" id="h-life" style="width:100%"></div></div>
    <b id="h-life-n">20</b>
  </div>
  <div class="pity-wrap">
    천장 <b id="h-pity" style="color:var(--gold)">0</b>/80
    <div class="pity-track"><div class="pity-fill" id="h-pity-bar" style="width:0%"></div></div>
  </div>
</header>
 
<!-- GRID -->
<div class="grid">
 
<!-- ①채굴 -->
<div class="panel mine-panel">
  <div class="ptitle">⛏️ 에테르 채굴장</div>
  <div style="font-size:.72rem;color:var(--muted);text-align:center;margin-bottom:4px">
    황금존(발광 구간)에서 클릭하면 크리티컬!
  </div>
  <div class="mine-track" id="mine-track" onclick="doMine()">
    <div class="crit-zone" id="crit-zone">
      <span class="crit-label">⭐ CRIT ZONE ⭐</span>
    </div>
    <div class="mine-ptr" id="mine-ptr"><div class="mine-ptr-bar"></div></div>
    <div class="mine-flash" id="mine-flash"></div>
  </div>
  <div class="combo-big" id="combo-big">콤보 0</div>
  <div class="mine-info">
    <span>기본 <b id="m-base">2</b>G</span>
    <span>크리 <b id="m-crit">12</b>G</span>
    <span>속도 <b id="m-spd">2.5</b></span>
    <span>콤보 <b id="m-combo">×1.0</b></span>
  </div>
  <button class="btn btn-gold" id="mine-btn" onclick="doMine()">⛏️ 채굴!</button>
  <div style="margin-top:12px;font-size:.8rem;font-family:'Black Han Sans',sans-serif;color:var(--muted)">📈 업그레이드</div>
  <div class="upg-grid" id="upg-grid"></div>
</div>
 
<!-- ②가챠 -->
<div class="panel gacha-panel">
  <div class="ptitle">✨ 차원 소환</div>
  <div class="gacha-screen C" id="gacha-scr">
    <span id="gacha-msg" style="font-size:1rem;color:var(--dim)">소환 대기 중...</span>
    <img src="" id="gacha-img" class="gacha-img" alt="">
    <div class="grade-badge" id="grade-badge" style="display:none"></div>
  </div>
  <div class="pity-info">천장까지 <b id="p-left">80</b>회 · 80회 시 전설 확정!</div>
  <div class="multi-wrap">
    <button class="btn btn-acc" id="g1" onclick="doGacha(1)">🧬 1회<br><small style="opacity:.7;font-weight:400">30G</small></button>
    <button class="btn btn-gold" id="g10" onclick="doGacha(10)">💥 10연<br><small style="opacity:.7;font-weight:400">270G (10%↓)</small></button>
  </div>
  <div class="synth-area">
    <div style="font-size:.78rem;font-weight:700;color:var(--muted)">⚗️ 합성 진화 <span style="font-weight:400;color:var(--dim);font-size:.7rem">(동일 영웅 3장)</span></div>
    <div class="synth-row">
      <div class="synth-slot" id="ss0" onclick="pickSynth(0)">1</div>
      <div class="synth-slot" id="ss1" onclick="pickSynth(1)">2</div>
      <div class="synth-slot" id="ss2" onclick="pickSynth(2)">3</div>
      <div class="arrow">→</div>
      <div class="synth-slot" style="border-style:solid;border-color:var(--gold)" id="synth-res">?</div>
      <button class="btn btn-gold btn-xs" onclick="doSynth()">진화!</button>
    </div>
  </div>
</div>
 
<!-- ③전장 -->
<div class="panel def-panel">
  <div class="def-top">
    <div class="ptitle" style="margin-bottom:0">⚔️ 전장 수호</div>
    <div style="display:flex;gap:6px;align-items:center">
      <div class="wave-info">적: <b id="enemy-cnt">0</b></div>
      <button class="btn btn-red btn-sm" onclick="startWave()" id="wave-btn">👾 웨이브!</button>
    </div>
  </div>
  <div class="battlefield" id="bf">
    <div class="bf-grid"></div>
    <div class="bf-ground"></div>
    <canvas class="fx-canvas" id="fx-canvas"></canvas>
    <div class="stage-banner" id="stage-banner"></div>
  </div>
  <div class="skill-bar" id="skill-bar"><div style="font-size:.72rem;color:var(--dim)">영웅 배치 후 스킬 사용 가능</div></div>
  <div class="bench" id="bench"><div class="bench-empty">소환한 영웅을 클릭해 전장에 배치!</div></div>
</div>
</div><!-- /grid -->
</div><!-- /app -->
 
<div id="toast"></div>
 
<script>
// ══════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════
const HEROES = [
  {id:0,name:'철갑 발키리',grade:'C',img:'https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=300',pwr:14,hp:100,col:'#8e92a8',
   sk:{name:'방어 태세',cd:8000,col:'#8e92a8',run:u=>{u.def=(u.def||0)+8;showDmg(u.x,u.y,'🛡+8',u.col)}}},
  {id:1,name:'네온 아처',grade:'R',img:'https://images.unsplash.com/photo-1578632767115-351597cf2477?w=300',pwr:30,hp:130,col:'#00d4ff',
   sk:{name:'연속 사격',cd:5500,col:'#00d4ff',run:u=>{for(let i=0;i<4;i++)setTimeout(()=>hitEnemy(u,1.0),i*120)}}},
  {id:2,name:'사이버 나이트',grade:'R',img:'https://images.unsplash.com/photo-1611532736597-de2d4265fba3?w=300',pwr:38,hp:180,col:'#00d4ff',
   sk:{name:'돌격 베기',cd:5000,col:'#00d4ff',run:u=>{hitEnemy(u,2.8);spawnFX(u.x,u.y,'#00d4ff')}}},
  {id:3,name:'사이코 위치',grade:'E',img:'https://images.unsplash.com/photo-1534447677768-be436bb09401?w=300',pwr:72,hp:200,col:'#cc00ff',
   sk:{name:'마력 폭발',cd:6500,col:'#cc00ff',run:u=>{aoeHit(u,2.5);spawnFX(u.x,u.y,'#cc00ff')}}},

const bgC=document.getElementById('bg-canvas');

bgC.width=window.innerWidth;bgC.height=window.innerHeight;
const stars=Array.from({length:120},()=>({x:Math.random()*bgC.width,y:Math.random()*bgC.height,r:Math.random()*1.5,s:Math.random()*.3+.1}));
function drawBg(){
  bgX.clearRect(0,0,bgC.width,bgC.height);
  stars.forEach(s=>{
    s.y-=s.s;if(s.y<0)s.y=bgC.height;
    bgX.fillStyle=`rgba(180,190,255,${.3+Math.random()*.3})`;
    bgX.beginPath();bgX.arc(s.x,s.y,s.r,0,Math.PI*2);bgX.fill();

}

const fxC=document.getElementById('fx-canvas');
const fxX=fxC.getContext('2d');
function resizeFX(){fxC.width=fxC.offsetWidth;fxC.height=fxC.offsetHeight}
resizeFX();window.addEventListener('resize',resizeFX);
 
function addParticles(x,y,col,n,sz=4){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,life:1,col,sz:sz*(.5+Math.random())});
  }
}
function tickFX(){
  fxX.clearRect(0,0,fxC.width,fxC.height);
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.life-=.028;
    fxX.globalAlpha=p.life;fxX.fillStyle=p.col;
    fxX.beginPath();fxX.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);fxX.fill();
    return p.life>0;
  });
  fxX.globalAlpha=1;
  requestAnimationFrame(tickFX);
}
tickFX();

let ptr=0,ptrDir=1;
// 크리존 (60~78 → 너비 18%)
let critL=60,critW=18;
 
function moveMine(){
  const spd=uVal('mSpd');
  ptr+=spd*ptrDir;
  if(ptr>=100||ptr<=0){ptrDir*=-1;ptr=Math.max(0,Math.min(100,ptr))}
  document.getElementById('mine-ptr').style.left=ptr+'%';
  // 크리존 천천히 움직임
  critL+=.08*ptrDir;
  if(critL<20)critL=20;if(critL>65)critL=65;
  const cz=document.getElementById('crit-zone');
  cz.style.left=critL+'%';cz.style.width=critW+'%';
}
setInterval(moveMine,22);
 
function doMine(){
  if(gameOver)return;
  const inCrit=ptr>=critL&&ptr<=critL+critW;
  const flash=document.getElementById('mine-flash');
  flash.style.opacity=inCrit?.5:.2;
  flash.style.background=inCrit?'rgba(245,168,0,.4)':'rgba(255,255,255,.15)';
  setTimeout(()=>flash.style.opacity=0,80);
 
  if(inCrit){
    combo=Math.min(combo+1,25);
    const mult=1+combo*.12;
    const earned=Math.round(uVal('mCrit')*mult);
    gold+=earned;
    toast(`⚡ CRIT! +${earned}G  콤보×${combo}!`,'#f5a800');
    const bf=document.getElementById('mine-track');
    addParticlesDom(bf,'#f5a800',20);
  } else {
    combo=Math.max(0,combo-1);
    const earned=Math.round(uVal('mBase'));
    gold+=earned;
    if(combo===0) toast(`+${earned}G`,'#8e92a8');
    else toast(`+${earned}G (콤보 끊김 -1)`,'#5a5e7a');
  }
  const cb=document.getElementById('combo-big');
  cb.textContent='콤보 '+combo;
  cb.classList.add('pop');setTimeout(()=>cb.classList.remove('pop'),100);
  if(comboT)clearTimeout(comboT);
  comboT=setTimeout(()=>{combo=0;document.getElementById('combo-big').textContent='콤보 0'},2800);
  document.getElementById('m-combo').textContent='×'+(1+combo*.12).toFixed(2);
  updateUI();
}
 
function addParticlesDom(el,col,n){
  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height/2;
  // 상대 좌표 → fxC 좌표계 (fxC는 bf 내부 캔버스)
  const fr=fxC.getBoundingClientRect();
  addParticles(cx-fr.left,cy-fr.top,col,n,5);
}

function buildUpgGrid(){
  const g=document.getElementById('upg-grid');g.innerHTML='';
  UPG.forEach(u=>{
    const lv=upgLv[u.k],maxed=lv>=u.max,cost=uCost(u.k);
    const d=document.createElement('div');
    d.className='upg-card'+(maxed?' maxed':'');
    d.innerHTML=`<div class="upg-name">${u.name}</div>
      <div class="upg-val">Lv${lv} → ${uVal(u.k).toFixed(u.k==='uAtk'||u.k==='uHp'?2:1)}</div>
      <div class="upg-cost">${maxed?'MAX':cost+'G'}</div>`;
    if(!maxed)d.onclick=()=>{

    };

let pulling=false;
function doGacha(n){
  if(pulling)return;
  const cost=n===1?30:270;
  if(gold<cost){toast('골드 부족!','#ff3355');return}
  gold-=cost;pulling=true;
  document.getElementById('g1').disabled=true;
  document.getElementById('g10').disabled=true;
  document.getElementById('gacha-msg').textContent='소환 중...';
  document.getElementById('gacha-img').style.display='none';
  document.getElementById('grade-badge').style.display='none';
  document.getElementById('gacha-scr').className='gacha-screen C';
  updateUI();
 
  const results=[];
  for(let i=0;i<n;i++){
    pity++;
    let h;
    if(pity>=80){h=HEROES[5];pity=0}
    else{
      const r=Math.random()*100;
      h=r<6?HEROES[5+Math.floor(Math.random()*2)]:r<24?HEROES[3+Math.floor(Math.random()*2)]:r<60?HEROES[1+Math.floor(Math.random()*2)]:HEROES[0];
    }
    results.push(h);
  }
  const best=results.reduce((a,b)=>GR[b.grade].rank>GR[a.grade].rank?b:a,results[0]);
 
  setTimeout(()=>{
    showResult(best);
    results.forEach(addToArmy);
    pulling=false;
    document.getElementById('g1').disabled=false;
    document.getElementById('g10').disabled=false;
    updateUI();renderBench();buildSkillBar();
  },420);
}
 
function showResult(h){
  const scr=document.getElementById('gacha-scr');
  scr.className='gacha-screen '+h.grade;
  const img=document.getElementById('gacha-img');
  img.src=h.img;img.className='gacha-img shown';
  document.getElementById('gacha-msg').textContent='';
  const b=document.getElementById('grade-badge');
  b.textContent=`[${GR[h.grade].label}] ${h.name}`;
  b.style.display='block';
  b.style.background=h.grade==='C'?'rgba(100,100,130,.8)':'rgba(0,0,0,.7)';
  b.style.color=GR[h.grade].col;
  b.style.border=`1px solid ${GR[h.grade].col}`;
  if(h.grade==='L'){addParticlesDom(scr,'#f5a800',120);setTimeout(()=>addParticlesDom(scr,'#ff6600',80),200)}
  else if(h.grade==='E'){addParticlesDom(scr,'#cc00ff',60)}
  else if(h.grade==='R'){addParticlesDom(scr,'#00d4ff',30)}
}
 
function addToArmy(h){
  const ex=army.find(x=>x.heroId===h.id);
  if(ex){ex.count=(ex.count||1)+1}
  else army.push({heroId:h.id,uid:'u'+Date.now()+Math.random().toString(36).slice(2),count:1,lv:1});
}

function pickSynth(slot){
  const av=army.filter(x=>(x.count||1)>=1);
  if(!av.length){toast('영웅 없음','#ff3355');return}
  const cur=synthPick[slot];
  const ci=cur===null?0:(av.findIndex(x=>x.uid===cur)+1)%av.length;
  synthPick[slot]=av[ci].uid;
  updateSynthUI();
}
function updateSynthUI(){
  for(let i=0;i<3;i++){
    const sl=document.getElementById('ss'+i);
    const uid=synthPick[i];
    if(uid){const e=army.find(x=>x.uid===uid);if(e){const h=HEROES[e.heroId];sl.style.backgroundImage=`url(${h.img})`;sl.style.borderColor=h.col;sl.classList.add('on');sl.textContent='';}
    }else{sl.style.backgroundImage='none';sl.style.borderColor='var(--border2)';sl.classList.remove('on');sl.textContent=i+1}
  }
  const res=document.getElementById('synth-res');
  const ids=synthPick.filter(x=>x!==null);
  if(ids.length===3){
    const es=ids.map(id=>army.find(x=>x.uid===id));
    if(es.every(Boolean)&&es.every(e=>e.heroId===es[0].heroId)){
      const h=HEROES[es[0].heroId];const evo=GR[h.grade].evo;
      if(evo){const nh=HEROES.find(x=>x.grade===evo)||h;res.style.backgroundImage=`url(${nh.img})`;res.style.borderColor=GR[evo].col;res.textContent='';}
      else{res.textContent='MAX';res.style.backgroundImage='none'}
    }else{res.textContent='?';res.style.backgroundImage='none'}
  }else{res.textContent='?';res.style.backgroundImage='none'}
}
function doSynth(){
  const ids=synthPick.filter(x=>x!==null);
  if(ids.length<3){toast('슬롯 3개 모두 채우세요','#ff3355');return}
  const es=ids.map(id=>army.find(x=>x.uid===id));
  if(!es.every(Boolean)||!es.every(e=>e.heroId===es[0].heroId)){toast('같은 영웅 3장 필요','#ff3355');return}
  const h=HEROES[es[0].heroId];const evo=GR[h.grade].evo;
  if(!evo){toast('이미 최고 등급!','#f5a800');return}
  es.forEach(e=>{e.count=(e.count||1)-1});
  army=army.filter(x=>(x.count||1)>0);
  const nh=HEROES.find(x=>x.grade===evo);
  if(nh)addToArmy(nh);
  synthPick=[null,null,null];updateSynthUI();
  toast(`🔥 진화 성공! [${GR[evo].label}] ${nh?nh.name:''}`, GR[evo].col);
  const scr=document.getElementById('gacha-scr');
  addParticlesDom(scr,GR[evo].col,100);
  updateUI();renderBench();buildSkillBar();
}

//  WAVES — 난이도 대폭 상향
// ══════════════════════════════════════════
const ENEMY_IMGS=[
  'https://images.unsplash.com/photo-1552820728-8b83bb6b773f?w=150',
  'https://images.unsplash.com/photo-1518611012118-696072aa579a?w=150',
  'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=150',
];
function startWave(){
  if(waveActive){toast('이미 진행 중!','#5a5e7a');return}
  if(gameOver)return;
  waveActive=true;waveNumber++;
  document.getElementById('wave-btn').disabled=true;
 
  // 웨이브 스케일링: 빠르게 어려워짐
  const count = 3 + Math.floor(stage * 1.8) + Math.floor(waveNumber * .5);
  const baseHp = 60 + stage*60 + waveNumber*20;
  const basePwr = 10 + stage*8 + waveNumber*3;
  const speed = 1.2 + stage*.15 + waveNumber*.05;
  const interval = Math.max(350, 700 - stage*30);
 
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      if(gameOver)return;
      const hp=Math.round(baseHp*(0.85+Math.random()*.3));
      const isBoss=i===count-1&&count>4; // 마지막은 보스
      const m={
        id:'m'+Date.now()+'_'+i,heroId:-1,
        pwr:Math.round(basePwr*(isBoss?2:1)),
        hp:Math.round(hp*(isBoss?3:1)),
        curHp:Math.round(hp*(isBoss?3:1)),
        x:490,y:30+Math.random()*190,
        side:'enemy',lastAtk:0,col:'#ff3355',
        img:ENEMY_IMGS[i%ENEMY_IMGS.length],
        poisoned:false,poisonDmg:0,
        speed:speed*(isBoss?.7:1),
        isBoss,def:0
      };
      activeUnits.push(m);
      const el=document.createElement('div');
      el.className='unit';el.id=m.id;
      el.style.cssText=`left:${m.x}px;top:${m.y}px;border-color:${isBoss?'#f5a800':'#ff3355'};filter:hue-rotate(${isBoss?40:300}deg) brightness(${isBoss?1.6:1.2});background-image:url(${m.img});${isBoss?'width:58px;height:58px':''}`;
      el.innerHTML=`<div class="unit-bars">
        <div class="unit-bar-track hp-track"><div class="unit-bar-fill hp-fill" id="hp_${m.id}" style="width:100%;background:${isBoss?'#f5a800':'#ff3355'}"></div></div>
      </div>`;
      document.getElementById('bf').appendChild(el);
      document.getElementById('enemy-cnt').textContent=activeUnits.filter(u=>u.side==='enemy').length;
    },i*interval);
  }
  toast(`👾 웨이브 ${waveNumber}! 적 ${count}마리 (${isBossStr(count)} )`,'#ff3355');
}
function isBossStr(c){return c>4?'보스 포함':''}
 
// ══════════════════════════════════════════
//  BATTLE LOOP
// ══════════════════════════════════════════
setInterval(()=>{
  if(gameOver)return;
  const now=Date.now();
  const heroes=activeUnits.filter(u=>u.side==='hero');
  const enemies=activeUnits.filter(u=>u.side==='enemy');
  document.getElementById('enemy-cnt').textContent=enemies.length;
 
  activeUnits.forEach(u=>{
    const el=document.getElementById(u.id);if(!el)return;
    const foes=u.side==='hero'?enemies:heroes;
 
    if(foes.length){
      let near=foes[0],minD=9999;
      foes.forEach(t=>{const d=Math.hypot(t.x-u.x,t.y-u.y);if(d<minD){minD=d;near=t}});
      const range=u.side==='hero'?42:38;
      if(minD>range){
        const dx=near.x-u.x,dy=near.y-u.y,dist=Math.hypot(dx,dy);
        const spd=u.side==='hero'?2.4:(u.speed||1.6);
        u.x+=dx/dist*spd;u.y+=dy/dist*spd*.6;
        u.x=Math.max(4,Math.min(490,u.x));
        u.y=Math.max(4,Math.min(228,u.y));
      } else if(now-u.lastAtk>850){
        u.lastAtk=now;
        let dmg=u.pwr;
        if(u.side==='hero')dmg=Math.round(dmg*uVal('uAtk'));
        const crit=(u.grade==='E'||u.grade==='L')&&Math.random()>.55;
        if(crit)dmg=Math.round(dmg*2.3);
        const blocked=Math.min(dmg-1,near.def||0);
        const actual=dmg-blocked;
        near.curHp-=actual;
        showDmg(near.x,near.y,crit?actual+' CRIT!':String(actual),crit?'#f5a800':u.col);
        const hEl=document.getElementById('hp_'+near.id);
        if(hEl)hEl.style.width=Math.max(0,near.curHp/near.hp*100)+'%';
      }
    } else {
      // 적 없으면 이동
      if(u.side==='enemy'){u.x-=(u.speed||1.5);u.y+=Math.sin(Date.now()*.003+u.x*.1)*.3}
    }
 
    // 독 틱
    if(u.poisoned){
      u.poisonTick=(u.poisonTick||0)+1;
      if(u.poisonTick%12===0){
        const pd=u.poisonDmg||6;
        u.curHp-=pd;
        showDmg(u.x,u.y,'☠'+pd,'#44ff88');
        const hEl=document.getElementById('hp_'+u.id);
        if(hEl)hEl.style.width=Math.max(0,u.curHp/u.hp*100)+'%';
      }
    }
 
    el.style.left=u.x+'px';el.style.top=u.y+'px';
 
    // 스킬 쿨 바
    if(u.side==='hero'){
      const h=HEROES[u.heroId];
      if(h&&h.sk){
        const e=now-(skCD[u.id]||0);
        const pct=Math.min(100,e/h.sk.cd*100);
        const sp=document.getElementById('sp_'+u.id);
        if(sp)sp.style.width=pct+'%';
      }
    }
  });
 
  // 사망/통과 처리
  activeUnits=activeUnits.filter(u=>{
    if(u.curHp<=0){
      if(u.side==='enemy'){
        const reward=u.isBoss?30+stage*5:6+stage*2;
        gold+=reward;updateUI();
        addParticles(u.x,u.y,u.isBoss?'#f5a800':'#ff3355',u.isBoss?40:12,u.isBoss?6:3);
      } else {
        addParticles(u.x,u.y,'#00d4ff',15,3);
        buildSkillBar();
      }
      document.getElementById(u.id)?.remove();return false;
    }
    // 적이 기지 통과
    if(u.side==='enemy'&&u.x<-10){
      const dmg=u.isBoss?5:1;
      lives=Math.max(0,lives-dmg);
      updateLifeUI();
      toast(`💥 적 통과! -${dmg} 라이프`,'#ff3355');
      addParticles(10,u.y,'#ff3355',25,5);
      document.getElementById(u.id)?.remove();
      if(lives<=0)triggerGameOver();
      return false;
    }
    return true;
  });
 
  // 웨이브 클리어
  if(waveActive&&activeUnits.every(u=>u.side==='hero')){
    const hasAny=activeUnits.length>0||true; // 영웅 없어도 클리어
    const enemyGone=!activeUnits.some(u=>u.side==='enemy');
    if(enemyGone){
      waveActive=false;
      document.getElementById('wave-btn').disabled=false;
      stage++;
      const bonus=40+stage*15;
      gold+=bonus;updateUI();
      const banner=document.getElementById('stage-banner');
      banner.textContent=`STAGE ${stage-1} CLEAR! +${bonus}G 🎉`;
      banner.style.color='#00d4ff';
      banner.style.opacity='1';
      setTimeout(()=>banner.style.opacity='0',2200);
      addParticles(250,120,'#00d4ff',80,6);
      addParticles(200,100,'#f5a800',50,4);
      toast(`🎉 Stage ${stage-1} 클리어! +${bonus}G`,'#00d4ff');
    }
  }
 
  refreshSkillBar();
},95);
 
// ══════════════════════════════════════════
//  SKILLS
// ══════════════════════════════════════════
function buildSkillBar(){
  const bar=document.getElementById('skill-bar');bar.innerHTML='';
  const hs=activeUnits.filter(u=>u.side==='hero');
  if(!hs.length){bar.innerHTML='<div style="font-size:.72rem;color:var(--dim)">영웅 배치 후 스킬 사용 가능</div>';return}
  hs.forEach(u=>{
    const h=HEROES[u.heroId];if(!h||!h.sk)return;
    const now=Date.now(),elapsed=now-(skCD[u.id]||0);
    const ready=elapsed>=h.sk.cd;
    const pct=Math.min(100,elapsed/h.sk.cd*100);
    const btn=document.createElement('div');
    btn.className='sk-btn'+(ready?' ready':'');btn.id='skb_'+u.id;
    btn.innerHTML=`<div class="sk-nm">${h.name.slice(0,5)}</div>
      <div class="sk-nm" style="color:${h.sk.col};margin-top:1px">${h.sk.name}</div>
      <div class="sk-cd">${ready?'✨ 준비!':Math.ceil((h.sk.cd-elapsed)/1000)+'초'}</div>
      <div class="sk-cd-bar" style="width:${pct}%;background:${h.sk.col}"></div>`;
    if(ready)btn.onclick=()=>useSkill(u);
    bar.appendChild(btn);
  });
}
function refreshSkillBar(){
  const hs=activeUnits.filter(u=>u.side==='hero');
  hs.forEach(u=>{
    const btn=document.getElementById('skb_'+u.id);if(!btn)return;
    const h=HEROES[u.heroId];if(!h||!h.sk)return;
    const now=Date.now(),elapsed=now-(skCD[u.id]||0);
    const ready=elapsed>=h.sk.cd;
    const pct=Math.min(100,elapsed/h.sk.cd*100);
    btn.className='sk-btn'+(ready?' ready':'');
    const cdEl=btn.querySelector('.sk-cd');
    if(cdEl)cdEl.textContent=ready?'✨ 준비!':Math.ceil((h.sk.cd-elapsed)/1000)+'초';
    const barEl=btn.querySelector('.sk-cd-bar');
    if(barEl)barEl.style.width=pct+'%';
    if(ready)btn.onclick=()=>useSkill(u);
    else btn.onclick=null;
  });
}
function useSkill(u){
  const h=HEROES[u.heroId];if(!h||!h.sk)return;
  const now=Date.now();
  if(now-(skCD[u.id]||0)<h.sk.cd){toast('쿨타임 중!','#5a5e7a');return}
  skCD[u.id]=now;
  h.sk.run(u);
  spawnFX(u.x,u.y,h.sk.col);
  toast(`💥 ${h.name} - ${h.sk.name}!`,h.sk.col);
}
 
// 스킬 헬퍼
function hitEnemy(u,mult){
  const es=activeUnits.filter(t=>t.side==='enemy');
  if(!es.length)return;
  const t=es.reduce((a,b)=>b.curHp<a.curHp?b:a,es[0]);
  const dmg=Math.round(u.pwr*mult*uVal('uAtk'));
  t.curHp-=dmg;
  showDmg(t.x,t.y,dmg,'#00d4ff');
  const hp=document.getElementById('hp_'+t.id);
  if(hp)hp.style.width=Math.max(0,t.curHp/t.hp*100)+'%';
  addParticles(t.x+22,t.y+22,u.col,8,3);
}
function aoeHit(u,mult){
  activeUnits.filter(t=>t.side==='enemy').forEach(t=>{
    const dmg=Math.round(u.pwr*mult*uVal('uAtk'));
    t.curHp-=dmg;
    showDmg(t.x,t.y,dmg+'!',u.col);
    const hp=document.getElementById('hp_'+t.id);
    if(hp)hp.style.width=Math.max(0,t.curHp/t.hp*100)+'%';
  });
  addParticles(250,120,u.col,60,6);
}
function poisonAll(u){
  const es=activeUnits.filter(t=>t.side==='enemy');
  es.forEach(t=>{t.poisoned=true;t.poisonDmg=Math.round(u.pwr*.08*uVal('uAtk'))});
  showDmg(u.x,u.y,'☠ 전체 독!','#44ff44');
  addParticles(250,120,'#44ff44',40,5);
}
 
function spawnFX(x,y,col,sz=40){
  const bf=document.getElementById('bf');
  const fx=document.createElement('div');
  fx.className='skill-fx';
  fx.style.cssText=`left:${x+22-sz/2}px;top:${y+22-sz/2}px;width:${sz}px;height:${sz}px;background:${col}`;
  bf.appendChild(fx);setTimeout(()=>fx.remove(),450);
  addParticles(x+22,y+22,col,20,5);
}
function showDmg(x,y,txt,col){
  const bf=document.getElementById('bf');
  const d=document.createElement('div');
  d.className='dmg-pop';
  d.style.cssText=`left:${x+8}px;top:${y}px;color:${col}`;
  d.textContent=txt;bf.appendChild(d);
  setTimeout(()=>d.remove(),750);
}
 
// ══════════════════════════════════════════
//  UI UPDATE
// ══════════════════════════════════════════
function updateUI(){
  document.getElementById('h-gold').textContent=gold;
  document.getElementById('h-stage').textContent=stage;
  document.getElementById('h-pity').textContent=pity;
  const pct=pity/80*100;
  const pb=document.getElementById('h-pity-bar');
  pb.style.width=pct+'%';
  pb.className='pity-fill'+(pity>=60?' near':'');
  document.getElementById('p-left').textContent=80-pity;
  document.getElementById('m-base').textContent=Math.round(uVal('mBase'));
  document.getElementById('m-crit').textContent=Math.round(uVal('mCrit'));
  document.getElementById('m-spd').textContent=uVal('mSpd').toFixed(1);
  buildUpgGrid();
}
function updateLifeUI(){
  const pct=lives/20*100;
  const fill=document.getElementById('h-life');
  fill.style.width=pct+'%';
  fill.className='life-fill'+(lives<=10?' warn':'')+(lives<=5?' crit':'');
  document.getElementById('h-life-n').textContent=lives;
  const danger=document.getElementById('danger-overlay');
  if(lives<=5)danger.classList.add('show');else danger.classList.remove('show');
}
 
// ══════════════════════════════════════════
//  GAME OVER
// ══════════════════════════════════════════
function triggerGameOver(){
  gameOver=true;
  document.getElementById('go-info').textContent=`최고 스테이지: ${stage} | 웨이브: ${waveNumber}`;
  document.getElementById('gameover').classList.add('show');
}
 
// ══════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════
let toastQ=[];let toastBusy=false;
function toast(msg,col='#fff'){
  toastQ.push({msg,col});
  if(!toastBusy)nextToast();
}
function nextToast(){
  if(!toastQ.length){toastBusy=false;return}
  toastBusy=true;
  const {msg,col}=toastQ.shift();
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.color=col;t.style.borderColor=col;
  t.classList.add('show');
  setTimeout(()=>{t.classList.remove('show');setTimeout(nextToast,200)},1500);
}
 
// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
updateUI();renderBench();buildSkillBar();buildUpgGrid();updateLifeUI();
</script>
