<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID CHESS — 차원의 체스판</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06070f;--c1:#0a0c1a;--c2:#0e1122;--c3:#12162c;
  --b1:#1c2244;--b2:#262e58;--b3:#32406e;
  --neon:#00ffe5;--neon2:#7c30ff;--neon3:#ff2d6b;
  --gold:#ffd700;--amb:#ff8c00;
  --g:#00e87a;--r:#ff3355;--t:#c8d0f0;--m:#5a6090;--d:#2a3060;
  --sz:72px; /* hex cell size */
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t)}
body{font-family:'Noto Sans KR',sans-serif;display:flex;flex-direction:column;min-height:0}
.O{font-family:'Orbitron',sans-serif}
.M{font-family:'Share Tech Mono',monospace}

/* scanlines */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,229,.006) 4px)}

/*═══ LOGIN ═══*/
#LS{position:fixed;inset:0;z-index:5000;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 130% 100% at 50% 65%,#07032e 0%,var(--bg) 65%)}
.LW{width:400px;max-width:96vw;position:relative;padding:36px 32px;background:rgba(10,12,26,.8)}
.LW::before{content:'';position:absolute;inset:0;border:1px solid var(--neon2);pointer-events:none;
  box-shadow:0 0 50px rgba(124,48,255,.2),inset 0 0 50px rgba(124,48,255,.03)}
.LW::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--neon),var(--neon2),transparent)}
.lc{position:absolute;width:14px;height:14px;border-color:var(--neon);border-style:solid;pointer-events:none}
.lc.tl{top:-1px;left:-1px;border-width:2px 0 0 2px}
.lc.tr{top:-1px;right:-1px;border-width:2px 2px 0 0}
.lc.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
.lc.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.l-logo{text-align:center;margin-bottom:24px}
.l-logo h1{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:900;letter-spacing:.12em;
  background:linear-gradient(90deg,var(--neon),var(--neon2),var(--neon3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.l-logo p{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--m);letter-spacing:.18em;margin-top:4px}
.l-tabs{display:flex;margin-bottom:20px;border:1px solid var(--b2);overflow:hidden}
.ltab{flex:1;padding:8px;text-align:center;cursor:pointer;font-family:'Orbitron',sans-serif;
  font-size:.65rem;font-weight:700;letter-spacing:.08em;color:var(--m);transition:all .2s;background:none;border:none}
.ltab.on{background:rgba(0,255,229,.1);color:var(--neon);box-shadow:inset 0 -2px 0 var(--neon)}
.l-lbl{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--m);letter-spacing:.1em;margin-bottom:4px;display:block}
.l-inp{width:100%;background:rgba(0,0,0,.5);border:1px solid var(--b2);color:var(--t);
  padding:9px 12px;font-size:.88rem;font-family:'Noto Sans KR',sans-serif;outline:none;margin-bottom:10px;transition:border .2s}
.l-inp:focus{border-color:var(--neon);box-shadow:0 0 8px rgba(0,255,229,.12)}
.l-main{width:100%;padding:11px;margin-top:4px;font-family:'Orbitron',sans-serif;font-size:.75rem;font-weight:700;
  letter-spacing:.1em;cursor:pointer;border:1px solid var(--neon);color:var(--neon);background:transparent;transition:all .18s}
.l-main:hover{background:var(--neon);color:#000}
.l-main:active{transform:scale(.98)}
.l-sep{text-align:center;margin:10px 0;font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--d)}
.l-guest{width:100%;padding:9px;font-family:'Orbitron',sans-serif;font-size:.65rem;font-weight:700;
  letter-spacing:.08em;cursor:pointer;border:1px solid var(--b2);color:var(--m);background:transparent;transition:all .18s}
.l-guest:hover{border-color:var(--m);color:var(--t)}
.l-guest:active{transform:scale(.98)}
.l-err{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--neon3);text-align:center;min-height:16px;margin-top:6px}

/*═══ HEADER ═══*/
header{flex-shrink:0;height:40px;display:flex;align-items:center;gap:8px;padding:0 12px;
  background:rgba(8,10,22,.97);border-bottom:1px solid var(--b1)}
.hlogo{font-family:'Orbitron',sans-serif;font-size:.8rem;font-weight:900;letter-spacing:.14em;
  background:linear-gradient(90deg,var(--neon),var(--neon2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hstat{background:rgba(0,0,0,.4);border:1px solid var(--b1);padding:3px 9px;font-family:'Share Tech Mono',monospace;
  font-size:.68rem;white-space:nowrap;display:flex;align-items:center;gap:3px}
.hstat b{color:var(--neon)}
.hstat.life b{color:var(--neon3)}
.hstat.rnd b{color:var(--gold)}
.phase-lbl{font-family:'Orbitron',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.1em;
  padding:3px 10px;border:1px solid;border-radius:2px}
.phase-lbl.prep{border-color:var(--neon);color:var(--neon);background:rgba(0,255,229,.08)}
.phase-lbl.battle{border-color:var(--neon3);color:var(--neon3);background:rgba(255,45,107,.08);animation:blink .6s infinite alternate}
@keyframes blink{from{opacity:.7}to{opacity:1}}
.hsp{flex:1}
.spd-g{display:flex;gap:2px}
.spd{background:rgba(0,0,0,.4);border:1px solid var(--b1);color:var(--m);padding:3px 9px;
  font-family:'Orbitron',sans-serif;font-size:.6rem;cursor:pointer;transition:all .15s}
.spd.on{border-color:var(--neon);color:var(--neon);background:rgba(0,255,229,.1)}
.uid{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--d);cursor:pointer}
.uid:hover{color:var(--m)}

/*═══ MAIN LAYOUT ═══*/
.wrap{flex:1;display:flex;gap:6px;padding:6px;min-height:0;overflow:hidden}

/*═══ LEFT PANEL ═══*/
.lpanel{width:200px;flex-shrink:0;display:flex;flex-direction:column;gap:5px;overflow-y:auto}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--b2)}
.lcard{background:var(--c1);border:1px solid var(--b1);padding:8px}
.lcard-h{font-family:'Orbitron',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.1em;color:var(--m);
  margin-bottom:6px;display:flex;align-items:center;gap:4px}
.lcard-h::before{content:'';width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0}

/* 시너지 */
.syn-list{display:flex;flex-direction:column;gap:3px}
.syn-row{display:flex;align-items:center;gap:5px;padding:4px 5px;background:var(--c2);border:1px solid var(--b1)}
.syn-icon{font-size:.95rem;flex-shrink:0}
.syn-name{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--m);flex:1}
.syn-cnt{font-family:'Orbitron',sans-serif;font-size:.62rem;color:var(--d)}
.syn-row.active .syn-name{color:var(--t)}
.syn-row.active .syn-cnt{color:var(--gold)}
.syn-row.active{border-color:var(--gold)22;background:rgba(255,215,0,.04)}

/* 체력/라운드 */
.player-hp{margin-bottom:4px}
.hp-track{height:6px;background:var(--b1);overflow:hidden;margin-top:3px}
.hp-fill{height:100%;background:var(--g);transition:width .4s}
.hp-fill.warn{background:var(--gold)}
.hp-fill.crit{background:var(--r);animation:hpblink .35s infinite alternate}
@keyframes hpblink{from{filter:brightness(1)}to{filter:brightness(2)}}

/* 히스토리 */
.history{display:flex;flex-direction:column;gap:2px;max-height:120px;overflow-y:auto}
.hist-row{display:flex;align-items:center;gap:5px;font-family:'Share Tech Mono',monospace;font-size:.58rem;padding:2px 4px}
.hist-row.win{color:var(--g)}
.hist-row.lose{color:var(--neon3)}
.hist-row.draw{color:var(--m)}

/*═══ CENTER — BOARD ═══*/
.center{flex:1;display:flex;flex-direction:column;gap:5px;min-width:0}

/* 보드 영역 */
.board-area{flex:1;position:relative;background:var(--c1);border:1px solid var(--b1);overflow:hidden;min-height:0}
#board-canvas{display:block;width:100%;height:100%}

/* 전투 오버레이 */
.battle-overlay{position:absolute;inset:0;pointer-events:none;z-index:10}

/* 준비 시간 바 */
.prep-bar-wrap{flex-shrink:0;height:22px;background:var(--c1);border:1px solid var(--b1);position:relative;overflow:hidden}
.prep-bar{height:100%;background:linear-gradient(90deg,rgba(0,255,229,.15),rgba(0,255,229,.3));transition:width .1s linear}
.prep-bar-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.1em;color:var(--neon)}

/* 벤치 */
.bench-area{flex-shrink:0;height:82px;background:var(--c1);border:1px solid var(--b1);
  display:flex;align-items:center;padding:4px 8px;gap:5px;position:relative}
.bench-lbl{font-family:'Orbitron',sans-serif;font-size:.56rem;color:var(--d);letter-spacing:.1em;
  writing-mode:vertical-rl;text-orientation:mixed;flex-shrink:0;padding:0 2px}
.bench-slots{display:flex;gap:4px;flex:1;align-items:center;overflow-x:auto}
.bench-slot{width:68px;height:70px;background:var(--c2);border:1px dashed var(--b2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;cursor:pointer;transition:all .15s}
.bench-slot:hover{border-color:var(--b3);background:var(--c3)}
.bench-slot.occupied{border-style:solid;cursor:pointer}
.bench-slot .sl-hint{font-family:'Share Tech Mono',monospace;font-size:.55rem;color:var(--d)}

/*═══ RIGHT PANEL ═══*/
.rpanel{width:200px;flex-shrink:0;display:flex;flex-direction:column;gap:5px;overflow-y:auto}

/* 상점 */
.shop-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.shop-hdr-l{font-family:'Orbitron',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.1em;color:var(--gold)}
.shop-btns{display:flex;gap:3px}
.sbtn{padding:3px 7px;background:transparent;border:1px solid;font-family:'Orbitron',sans-serif;
  font-size:.55rem;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:all .15s}
.sbtn.refresh{border-color:var(--neon);color:var(--neon)}
.sbtn.refresh:hover{background:rgba(0,255,229,.1)}
.sbtn.lock{border-color:var(--m);color:var(--m)}
.sbtn.lock.on{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,.08)}
.shop-items{display:grid;grid-template-columns:1fr 1fr;gap:4px}

/* 영웅 카드 (상점/보드 공통) */
.hero-card{background:var(--c2);border:1px solid;cursor:pointer;position:relative;
  display:flex;flex-direction:column;align-items:center;padding:6px 4px;transition:all .15s;user-select:none}
.hero-card:hover{transform:translateY(-2px);filter:brightness(1.1)}
.hero-card:active{transform:scale(.97)}
.hero-card.cost1{border-color:#aaaaaa}
.hero-card.cost2{border-color:#4fa8ff}
.hero-card.cost3{border-color:#a855f7}
.hero-card.cost4{border-color:#f59e0b}
.hero-card.cost5{border-color:#ef4444;box-shadow:0 0 8px rgba(239,68,68,.3)}
.hero-card.sold{opacity:.35;cursor:default;pointer-events:none}
.hc-em{font-size:1.6rem;line-height:1;margin-bottom:2px}
.hc-nm{font-family:'Orbitron',sans-serif;font-size:.52rem;font-weight:700;letter-spacing:.04em;text-align:center;line-height:1.2}
.hc-cost{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--gold);margin-top:2px}
.hc-traits{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;justify-content:center}
.trait-pip{font-size:.55rem;padding:0 3px;border-radius:2px;font-family:'Share Tech Mono',monospace}
.hc-star{font-size:.7rem;color:var(--gold);letter-spacing:-1px;position:absolute;top:2px;right:3px}
/* 보드 위 유닛 */
.unit-sprite{position:absolute;transform:translate(-50%,-50%);transition:left .18s ease,top .18s ease;z-index:5;cursor:pointer}
.unit-sprite:hover .us-inner{filter:brightness(1.3)}
.us-inner{width:54px;height:54px;border:2px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;background:var(--c2);transition:all .2s;font-size:1.4rem}
.us-star{position:absolute;top:-10px;left:50%;transform:translateX(-50%);
  font-size:.65rem;color:var(--gold);white-space:nowrap;letter-spacing:-1px}
.us-nm{font-family:'Share Tech Mono',monospace;font-size:.46rem;color:var(--m);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52px;text-align:center}
.us-hp{position:absolute;bottom:-8px;left:-2px;width:54px;height:4px;background:rgba(0,0,0,.7);overflow:hidden}
.us-hp-fill{height:100%;background:var(--g);transition:width .1s}
.us-sp{position:absolute;bottom:-14px;left:-2px;width:54px;height:3px;background:rgba(0,0,0,.5);overflow:hidden}
.us-sp-fill{height:100%;background:var(--neon2);transition:width .1s}
.us-dmg{position:absolute;top:-24px;left:50%;transform:translateX(-50%);
  font-family:'Orbitron',sans-serif;font-size:.7rem;font-weight:700;white-space:nowrap;pointer-events:none;
  animation:dmgfloat .7s ease-out forwards}
@keyframes dmgfloat{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-22px) scale(.7)}}

/* 경험치 */
.xp-row{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.xp-track{flex:1;height:5px;background:var(--b1);overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--neon2),var(--neon));transition:width .3s}
.xp-lbl{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--m);white-space:nowrap}
.buy-xp-btn{padding:3px 7px;background:rgba(124,48,255,.12);border:1px solid var(--neon2);color:var(--neon2);
  font-family:'Orbitron',sans-serif;font-size:.55rem;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:all .14s;flex-shrink:0}
.buy-xp-btn:hover{background:rgba(124,48,255,.25)}

/* 토스트 */
#toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%) translateY(6px);
  background:rgba(8,10,22,.96);border:1px solid;padding:7px 16px;font-family:'Share Tech Mono',monospace;
  font-size:.68rem;font-weight:700;z-index:8000;opacity:0;transition:all .2s;pointer-events:none;
  white-space:nowrap;max-width:90vw;text-align:center;letter-spacing:.06em}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* 라운드 결과 모달 */
#result-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:7000;
  align-items:center;justify-content:center}
#result-modal.on{display:flex}
.rm-box{background:var(--c1);border:1px solid;padding:28px 36px;text-align:center;min-width:280px}
.rm-title{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:900;letter-spacing:.15em;margin-bottom:8px}
.rm-sub{font-family:'Share Tech Mono',monospace;font-size:.75rem;color:var(--m);margin-bottom:16px}
.rm-btn{padding:10px 24px;font-family:'Orbitron',sans-serif;font-size:.72rem;font-weight:700;
  letter-spacing:.1em;cursor:pointer;background:transparent;transition:all .18s;border:1px solid;color:inherit}
.rm-btn:hover{opacity:.8}

/* 게임오버 */
#GO{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9000;
  flex-direction:column;align-items:center;justify-content:center;gap:14px}
#GO.on{display:flex}
#GO h2{font-family:'Orbitron',sans-serif;font-size:2.6rem;font-weight:900;color:var(--neon3);letter-spacing:.2em;
  text-shadow:0 0 40px var(--neon3);animation:glitch 2s infinite}
@keyframes glitch{0%,88%,100%{transform:none}90%{transform:translateX(-3px) skewX(-2deg)}93%{transform:translateX(3px) skewX(2deg)}}
#GO .go-s{font-family:'Share Tech Mono',monospace;font-size:.85rem;color:var(--m);text-align:center;line-height:2}
#GO button{padding:10px 26px;background:transparent;border:1px solid var(--neon3);color:var(--neon3);
  font-family:'Orbitron',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.15em;cursor:pointer;transition:all .2s}
#GO button:hover{background:rgba(255,45,107,.18);box-shadow:0 0 16px rgba(255,45,107,.35)}
</style>
</head>
<body>

<!--═══ LOGIN ═══-->
<div id="LS">
  <div class="LW">
    <div class="lc tl"></div><div class="lc tr"></div><div class="lc bl"></div><div class="lc br"></div>
    <div class="l-logo"><h1>VOID CHESS</h1><p>AUTO BATTLE STRATEGY · v1.0</p></div>
    <div class="l-tabs">
      <button class="ltab on" id="lt-li" onclick="lTab('li')">LOGIN</button>
      <button class="ltab" id="lt-su" onclick="lTab('su')">SIGN UP</button>
    </div>
    <label class="l-lbl">EMAIL</label>
    <input type="email" id="li-em" class="l-inp" placeholder="commander@void.io">
    <label class="l-lbl">PASSWORD</label>
    <input type="password" id="li-pw" class="l-inp" placeholder="••••••••">
    <button class="l-main" id="l-main" onclick="lSubmit()"><span id="l-mt">▶ CONNECT</span></button>
    <div class="l-sep">— OR —</div>
    <button class="l-guest" onclick="lGuest()">⚡ GUEST PLAY (저장 없음)</button>
    <div class="l-err" id="l-err"></div>
  </div>
</div>

<!--═══ HEADER ═══-->
<header>
  <div class="hlogo">VOID CHESS</div>
  <div class="hstat rnd">ROUND <b id="h-rnd">0</b></div>
  <div class="hstat life">❤ <b id="h-hp">100</b>/100</div>
  <div class="hstat">💰 <b id="h-gold">0</b>G</div>
  <div class="hstat">⭐ LV <b id="h-lv">1</b></div>
  <div class="hstat">유닛 <b id="h-units">0</b>/<b id="h-cap">1</b></div>
  <div class="phase-lbl prep" id="phase-lbl">PREP</div>
  <div class="hsp"></div>
  <div class="spd-g">
    <button class="spd on" id="sp1" onclick="setSpd(1)">1×</button>
    <button class="spd" id="sp2" onclick="setSpd(2)">2×</button>
    <button class="spd" id="sp3" onclick="setSpd(3)">3×</button>
  </div>
  <div class="uid" id="uid-lbl" onclick="doLogout()">[ GUEST ] ×</div>
</header>

<!--═══ MAIN ═══-->
<div class="wrap">

<!--LEFT-->
<div class="lpanel">
  <!-- 플레이어 상태 -->
  <div class="lcard">
    <div class="lcard-h" style="color:var(--neon3)">MY STATUS</div>
    <div style="font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--m);margin-bottom:4px">HEALTH</div>
    <div class="hp-track"><div class="hp-fill" id="hp-fill" style="width:100%"></div></div>
    <div style="font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--m);margin-top:6px;margin-bottom:3px">XP</div>
    <div class="xp-row">
      <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
      <div class="xp-lbl" id="xp-lbl">0/2</div>
      <button class="buy-xp-btn" onclick="buyXP()">+XP 4G</button>
    </div>
    <div style="font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--d);line-height:1.6;margin-top:4px">
      레벨업 → 최대 유닛 +1<br>라운드 종료 시 자동 XP
    </div>
  </div>
  <!-- 시너지 -->
  <div class="lcard">
    <div class="lcard-h" style="color:var(--gold)">SYNERGY</div>
    <div class="syn-list" id="syn-list"></div>
  </div>
  <!-- 히스토리 -->
  <div class="lcard">
    <div class="lcard-h" style="color:var(--neon2)">BATTLE LOG</div>
    <div class="history" id="history"></div>
  </div>
</div>

<!--CENTER-->
<div class="center">
  <!-- 보드 -->
  <div class="board-area">
    <canvas id="board-canvas"></canvas>
    <!-- 유닛 스프라이트 (HTML 오버레이) -->
    <div id="unit-layer" style="position:absolute;inset:0;pointer-events:none;z-index:5"></div>
    <!-- 전투 이펙트 레이어 -->
    <canvas id="fx-canvas" style="position:absolute;inset:0;pointer-events:none;z-index:8"></canvas>
  </div>

const BC=document.getElementById('board-canvas');

function resizeCvs(){
  const wrap=document.querySelector('.board-area');
  BC.width=FC.width=wrap.offsetWidth;
  BC.height=FC.height=wrap.offsetHeight;
  CW=BC.width;CH=BC.height;
  cellW=Math.floor(CW/COLS);
  cellH=Math.floor(CH/ROWS);
  drawBoard();renderBoardUnits();
}
window.addEventListener('resize',()=>{if(CW>0)resizeCvs()});

function cellXY(col,row){return{x:col*cellW+cellW/2,y:row*cellH+cellH/2}}
function xyCellPx(col,row){return{x:col*cellW,y:row*cellH,w:cellW,h:cellH}}

/*══════════════════════════════════════════
  BOARD DRAW
══════════════════════════════════════════*/
function drawBoard(){
  BCX.clearRect(0,0,CW,CH);
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const {x,y,w,h}=xyCellPx(c,r);
      const isAlly=r>=ROWS-ALLY_ROWS;
      // 배경
      BCX.fillStyle=isAlly?'rgba(0,255,229,.025)':'rgba(255,45,107,.015)';
      BCX.fillRect(x,y,w,h);
      // 테두리
      BCX.strokeStyle=isAlly?'rgba(0,255,229,.18)':'rgba(124,48,255,.15)';
      BCX.lineWidth=.5;BCX.strokeRect(x+.5,y+.5,w-1,h-1);
      // 좌표
      BCX.fillStyle='rgba(42,48,96,.5)';BCX.font='7px Share Tech Mono';
      BCX.textAlign='left';BCX.textBaseline='top';
      BCX.fillText(c+','+r,x+3,y+2);
      // 선택 하이라이트
      if(selectedUID&&isAlly&&!board[r][c]){
        BCX.fillStyle='rgba(0,255,229,.04)';BCX.fillRect(x,y,w,h);
        BCX.strokeStyle='rgba(0,255,229,.4)';BCX.lineWidth=1;BCX.strokeRect(x+1,y+1,w-2,h-2);
      }
    }
  }
  // 아군/적 구분선
  BCX.strokeStyle='rgba(0,255,229,.3)';BCX.lineWidth=1.5;BCX.setLineDash([5,5]);
  BCX.beginPath();BCX.moveTo(0,(ROWS-ALLY_ROWS)*cellH);BCX.lineTo(CW,(ROWS-ALLY_ROWS)*cellH);BCX.stroke();
  BCX.setLineDash([]);
  BCX.fillStyle='rgba(0,255,229,.18)';BCX.font='bold 9px Share Tech Mono';BCX.textAlign='right';BCX.textBaseline='bottom';
  BCX.fillText('ALLY ZONE',(ROWS-ALLY_ROWS)*cellH<10?CW:CW,ROWS*cellH-2);
}

/*══════════════════════════════════════════
  UNIT RENDER (HTML overlay)
══════════════════════════════════════════*/
function renderBoardUnits(){
  const layer=document.getElementById('unit-layer');
  layer.innerHTML='';
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const u=board[r][c];if(!u)continue;
      renderUnit(u,layer,c,r,false);
    }
  }
}
function renderUnit(u,parent,col,row,battle=false){
  const h=HEROES[u.heroId];
  const gr=GR_COST(h.cost);
  const {x,y}=cellXY(col,row);
  const el=document.createElement('div');
  el.className='unit-sprite';el.id='us_'+u.uid;
  el.style.left=x+'px';el.style.top=y+'px';
  const isEnemy=battle&&u.team==='enemy';
  el.innerHTML=`<div class="us-inner" style="border-color:${gr};background:${isEnemy?'rgba(30,5,5,.9)':'rgba(5,5,30,.9)'};box-shadow:0 0 8px ${gr}44">
    <span class="us-star">${'★'.repeat(u.star)}</span>
    ${h.em}
    <div class="us-nm" style="color:${gr}">${h.nm}</div>
    <div class="us-hp"><div class="us-hp-fill" id="uhp_${u.uid}" style="width:100%;background:${isEnemy?'#ff3355':'#00e87a'}"></div></div>
    <div class="us-sp"><div class="us-sp-fill" id="usp_${u.uid}" style="width:0%"></div></div>
  </div>`;
  el.style.pointerEvents=battle?'none':'auto';
  if(!battle){
    el.onclick=()=>selectUnit(u,col,row);
  }
  parent.appendChild(el);
}
function GR_COST(c){return['#aaaaaa','#4fa8ff','#a855f7','#f59e0b','#ef4444'][Math.min(4,c-1)]}

function moveUnitSprite(uid,px,py){

/*══════════════════════════════════════════
  BOARD CLICK — 배치/이동
══════════════════════════════════════════*/
BC.addEventListener('click',e=>{
  if(phase!=='prep')return;
  const rect=BC.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(CW/rect.width);
  const my=(e.clientY-rect.top)*(CH/rect.height);
  const col=Math.floor(mx/cellW);
  const row=Math.floor(my/cellH);
  if(col<0||col>=COLS||row<0||row>=ROWS)return;
  const isAlly=row>=ROWS-ALLY_ROWS;
  const existing=board[row][col];

  if(selectedUID){
    // 선택된 유닛이 있으면 이동/배치
    const src=findUnitPos(selectedUID);
    if(src){
      // 같은 칸 → 선택 해제
      if(src.type==='board'&&src.col===col&&src.row===row){selectedUID=null;drawBoard();renderBoardUnits();renderBench();return}
    }
    if(!isAlly){toast('아군 영역에만 배치할 수 있습니다','#ff2d6b');return}
    // 배치
    placeUnit(selectedUID,col,row);
    selectedUID=null;drawBoard();renderBoardUnits();renderBench();
  } else {
    if(existing){selectUnit(existing,col,row)}
  }
});

function findUnitPos(uid){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c]?.uid===uid)return{type:'board',col:c,row:r};
  const bi=bench.findIndex(b=>b.uid===uid);
  if(bi>=0)return{type:'bench',idx:bi};
  return null;
}
function placeUnit(uid,col,row){
  const src=findUnitPos(uid);if(!src)return;
  const existing=board[row][col];
  let u;
  if(src.type==='board'){u=board[src.row][src.col];board[src.row][src.col]=null}
  else{u=bench[src.idx];bench.splice(src.idx,1)}
  // 같은 영웅이면 합성 체크
  if(existing&&existing.heroId===u.heroId&&existing.star===u.star&&u.star<3){
    mergeUnits(existing,u,col,row);
  } else {
    if(existing){addToBench(existing)}
    board[row][col]=u;
  }
  checkMerge();
  updateHdr();renderBench();
}
function addToBench(u){
  if(bench.length<9)bench.push(u);
  else toast('벤치가 꽉 찼습니다','#ff2d6b');
}
function mergeUnits(a,b,col,row){
  const merged={...a,star:a.star+1,curHp:null,maxHp:null};
  merged.uid=mkUID();
  board[col]=board[col]||[];
  board[row][col]=merged;
  toast(`✨ ${HEROES[a.heroId].nm} ${a.star+1}성 합성!`,'#ffd700');
  spawnPart(cellXY(col,row).x,cellXY(col,row).y,'#ffd700',25,5);
}
function selectUnit(u,col,row){
  if(selectedUID===u.uid){selectedUID=null}
  else{selectedUID=u.uid;showUnitInfo(u)}
  drawBoard();renderBoardUnits();renderBench();
}
function checkMerge(){
  // 자동 3성 합성
  const counts={};
  const positions=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const u=board[r][c];if(!u)continue;
    const key=u.heroId+'_'+u.star;
    if(!counts[key])counts[key]={units:[],star:u.star,heroId:u.heroId};
    counts[key].units.push({r,c});
  }
  bench.forEach((u,i)=>{
    const key=u.heroId+'_'+u.star;
    if(!counts[key])counts[key]={units:[],star:u.star,heroId:u.heroId,benchIdxs:[]};
    if(!counts[key].benchIdxs)counts[key].benchIdxs=[];
    counts[key].benchIdxs.push(i);
  });
  Object.values(counts).forEach(g=>{
    const total=(g.units?.length||0)+(g.benchIdxs?.length||0);
    if(total>=3&&g.star<3){
      // 합성!
      let removed=0;
      const keepPos=g.units?.[0];
      g.units?.forEach((pos,i)=>{if(i>0){board[pos.r][pos.c]=null;removed++}});
      g.benchIdxs?.forEach(bi=>{bench[bi]=null;removed++});
      bench=bench.filter(Boolean);
      if(keepPos&&board[keepPos.r][keepPos.c]){
        const u=board[keepPos.r][keepPos.c];
        u.star=Math.min(3,u.star+1);u.uid=mkUID();
        toast(`🌟 ${HEROES[u.heroId].nm} ${u.star}성!`,'#ffd700');
        spawnPart(cellXY(keepPos.c,keepPos.r).x,cellXY(keepPos.c,keepPos.r).y,'#ffd700',30,5);
      }
    }
  });
}

  SHOP
══════════════════════════════════════════*/
function genShop(){
  if(shopLocked)return;
  const pool=[];
  HEROES.forEach(h=>{
    // 레벨에 따라 비용 높은 카드 등장 확률 조절
    const appear=h.cost<=Math.min(5,lvl+1);
    if(appear&&(cardPool[h.id]||0)>0)pool.push(h.id);
  });
  for(let i=0;i<5;i++){
    if(pool.length===0){shopSlots[i]=null;continue}
    const pick=pool[Math.floor(Math.random()*pool.length)];
    shopSlots[i]={heroId:pick,sold:false};
  }
  renderShop();
}
function renderShop(){
  const el=document.getElementById('shop-items');el.innerHTML='';
  shopSlots.forEach((s,i)=>{
    if(!s){
      const empty=document.createElement('div');
      empty.style.cssText='background:var(--c2);border:1px dashed var(--b1);padding:10px 4px;text-align:center;font-family:Share Tech Mono,monospace;font-size:.55rem;color:var(--d)';
      empty.textContent='EMPTY';el.appendChild(empty);return;
    }
    const h=HEROES[s.heroId];
    const gr=GR_COST(h.cost);
    const card=document.createElement('div');
    card.className='hero-card cost'+h.cost+(s.sold?' sold':'');
    card.innerHTML=`<div class="hc-em">${h.em}</div>
      <div class="hc-nm" style="color:${gr}">${h.nm}</div>
      <div class="hc-cost">${h.cost}G</div>
      <div class="hc-traits">
        <span class="trait-pip" style="background:rgba(0,0,0,.5);color:${gr};border:1px solid ${gr}44">${h.race}</span>
        <span class="trait-pip" style="background:rgba(0,0,0,.5);color:#aaa;border:1px solid #333">${h.cls}</span>
      </div>`;
    if(!s.sold){card.onclick=()=>buyHero(i)}
    el.appendChild(card);
  });
}
function buyHero(idx){
  const s=shopSlots[idx];if(!s||s.sold)return;
  const h=HEROES[s.heroId];
  if(gold<h.cost){toast('[ 골드 부족 ]','#ff2d6b');return}
  gold-=h.cost;s.sold=true;
  const u={uid:mkUID(),heroId:h.id,star:1,skCharge:0,lastSk:0};
  if(canAddUnit()){
    // 빈 자리 찾기
    let placed=false;
    for(let r=ROWS-ALLY_ROWS;r<ROWS&&!placed;r++){
      for(let c=0;c<COLS&&!placed;c++){
        if(!board[r][c]){board[r][c]=u;placed=true}
      }
    }
    if(!placed)addToBench(u);
  } else {
    addToBench(u);
    toast(`${h.nm} 구매 → 벤치 (유닛 수 초과)`,gr);
  }
  checkMerge();
  updateHdr();renderBench();renderBoardUnits();renderShop();updateSynergy();
  toast(`${h.em} ${h.nm} 구매! -${h.cost}G`,GR_COST(h.cost));
}
function canAddUnit(){
  const cap=LEVEL_CAP[Math.min(lvl-1,LEVEL_CAP.length-1)];
  let cnt=0;for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c])cnt++;
  return cnt<cap;
}
function doRefresh(){
  if(gold<2){toast('[ 2G 필요 ]','#ff2d6b');return}
  gold-=2;genShop();updateHdr();toast('상점 갱신','#00ffe5');
}
function toggleLock(){
  shopLocked=!shopLocked;
  document.getElementById('lock-btn').classList.toggle('on',shopLocked);
  toast(shopLocked?'[ 상점 잠금 ]':'[ 잠금 해제 ]',shopLocked?'#ffd700':'#00ffe5');
}

  SYNERGY

function updateSynergy(){
  const counts={};
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const u=board[r][c];if(!u)continue;
    const h=HEROES[u.heroId];
    counts[h.race]=(counts[h.race]||0)+1;

  }
  const el=document.getElementById('syn-list');el.innerHTML='';
  Object.keys(SYNERGIES).forEach(k=>{
    const cnt=counts[k]||0;if(cnt===0)return;
    const sy=SYNERGIES[k];
    const thresh=sy.thresholds.filter(t=>t<=cnt);
    const active=thresh.length>0;
    const row=document.createElement('div');
    row.className='syn-row'+(active?' active':'');
    row.innerHTML=`<span class="syn-icon">${sy.icon}</span>
      <span class="syn-name">${sy.name}</span>
      <span class="syn-cnt">${cnt}/${sy.thresholds[sy.thresholds.length-1]}</span>`;
    if(active)row.title=sy.bonus[thresh.length-1];
    el.appendChild(row);
  });
}

/*══════════════════════════════════════════
  BATTLE PHASE
══════════════════════════════════════════*/
let bUnits=[]; // 전투 복사본 [{...heroData, x,y,team,uid,curHp,maxHp,skCharge,...}]
function startBattle(){
  round++;
  phase='battle';
  document.getElementById('phase-lbl').className='phase-lbl battle';
  document.getElementById('phase-lbl').textContent='BATTLE';
  document.getElementById('prep-bar-txt').textContent='BATTLE IN PROGRESS...';
  document.getElementById('prep-bar').style.width='0%';
  document.getElementById('h-rnd').textContent=round;

  // 아군 복사
  bUnits=[];
  const layer=document.getElementById('unit-layer');layer.innerHTML='';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const u=board[r][c];if(!u)continue;
    const h=HEROES[u.heroId];
    const maxHp=Math.round(h.hp*(1+u.star*.4));
    const pwr=Math.round(h.pwr*(1+u.star*.3));
    const {x,y}=cellXY(c,r);
    const bu={...u,heroId:u.heroId,uid:u.uid,team:'ally',
      x,y,bCol:c,bRow:r,
      curHp:maxHp,maxHp,pwr,spd:h.spd,rng:h.rng,
      atkSpd:h.spd,lastAtk:0,skCharge:0,skMax:h.sk.cd,
      def:0,slow:0,tauntTarget:null};
    bUnits.push(bu);
    renderUnit(bu,layer,c,r,true);
  }

  // 적 생성
  const enemies=genEnemies();
  bUnits.push(...enemies);
  enemies.forEach(e=>renderUnit(e,layer,e.bCol,e.bRow,true));

  // 시너지 버프 적용
  applySynergyBuffs();

  // 전투 루프
  if(battleTick)clearInterval(battleTick);
  battleTick=setInterval(doBattleTick,100/GS);
}

function genEnemies(){
  const enemies=[];
  const isBoss=round%5===0;
  const count=Math.min(COLS,2+Math.floor(round*.6));
  const scale=1+round*.12;
  for(let i=0;i<count;i++){
    const pool=HEROES.filter(h=>h.cost<=Math.min(5,1+Math.floor(round/3)));
    const h=pool[Math.floor(Math.random()*pool.length)];
    const row=Math.floor(Math.random()*ALLY_ROWS); // 적은 상단 3행
    const col=Math.floor(Math.random()*COLS);
    // 겹치면 다른 위치
    const existing=enemies.find(e=>e.bRow===row&&e.bCol===col);
    const finalRow=existing?((row+1)%ALLY_ROWS):row;
    const maxHp=Math.round(h.hp*scale*(isBoss?3:1));
    const pwr=Math.round(h.pwr*scale*(isBoss?2:1));
    const {x,y}=cellXY(existing?((col+1)%COLS):col,finalRow);
    enemies.push({
      uid:mkUID(),heroId:h.id,star:isBoss?3:Math.min(3,1+Math.floor(round/4)),
      team:'enemy',x,y,bCol:existing?((col+1)%COLS):col,bRow:finalRow,
      curHp:maxHp,maxHp,pwr,spd:h.spd,rng:h.rng,
      atkSpd:h.spd,lastAtk:0,skCharge:0,skMax:h.sk.cd,
      def:0,slow:0,tauntTarget:null
    });
  }
  return enemies;
}

function applySynergyBuffs(){
  const counts={};
  bUnits.filter(u=>u.team==='ally').forEach(u=>{
    const h=HEROES[u.heroId];
    counts[h.race]=(counts[h.race]||0)+1;
    counts[h.cls]=(counts[h.cls]||0)+1;
  });
  bUnits.filter(u=>u.team==='ally').forEach(u=>{
    const h=HEROES[u.heroId];
    if((counts['WARRIOR']||0)>=2){u.pwr=Math.round(u.pwr*1.15);u.maxHp+=200;u.curHp+=200}
    if((counts['KNIGHT']||0)>=2){u.def+=15}
    if((counts['MAGE']||0)>=2){u.skMax=Math.max(1,u.skMax-1)}
    if((counts['BEAST']||0)>=2){u.atkSpd*=1.25}
    if((counts['ANGEL']||0)>=2){/* 힐량 증가 — 스킬에서 처리 */}
    if((counts['DEMON']||0)>=2){/* 치명타 처리 */u.demonBonus=true}
  });
}

let battleTime=0;
function doBattleTick(){
  battleTime+=100;
  const now=battleTime;
  const allies=bUnits.filter(u=>u.team==='ally'&&u.curHp>0);
  const enemies=bUnits.filter(u=>u.team==='enemy'&&u.curHp>0);

  if(!allies.length||!enemies.length){
    clearInterval(battleTick);
    const win=enemies.length===0;
    setTimeout(()=>endBattle(win),400/GS);
    return;
  }

  bUnits.forEach(u=>{
    if(u.curHp<=0)return;
    const foes=u.team==='ally'?enemies:allies;
    const frds=u.team==='ally'?allies:enemies;
    if(!foes.length)return;

    // 타깃
    let target=foes[0],minDist=1e9;
    foes.forEach(f=>{
      const d=Math.hypot(f.x-u.x,f.y-u.y);
      if(d<minDist){minDist=d;target=f}
    });

    // 이동
    const cellDist=minDist/Math.max(cellW,cellH);
    if(cellDist>u.rng){
      const dx=target.x-u.x,dy=target.y-u.y,dist=Math.hypot(dx,dy);
      const spd=(u.atkSpd||1)*1.5*(1-(u.slow||0))*GS;
      u.x+=dx/dist*spd;u.y+=dy/dist*spd;
      moveUnitSprite(u.uid,u.x,u.y);
    }

    // 공격
    if(cellDist<=u.rng+.5&&now-u.lastAtk>(1000/(u.atkSpd||1))/GS){
      u.lastAtk=now;
      let dmg=u.pwr;
      const crit=(u.demonBonus&&Math.random()>.7)||Math.random()>.88;
      if(crit)dmg=Math.round(dmg*2);
      const actual=Math.max(1,dmg-(target.def||0));
      target.curHp-=actual;
      showFloatDmg(target.uid,crit?actual+'!!':actual,crit?'#ffd700':u.team==='ally'?'#00d4ff':'#ff2d6b');
      updateUnitBars(target.uid,target.curHp/target.maxHp,u.skCharge/u.skMax);
      spawnBattlePart(target.x,target.y,crit?'#ffd700':u.team==='ally'?'#00d4ff':'#ff3355',crit?10:4);
      // 스킬 충전
      u.skCharge=Math.min(u.skMax,(u.skCharge||0)+1);
      updateUnitBars(u.uid,u.curHp/u.maxHp,u.skCharge/u.skMax);
      if(u.skCharge>=u.skMax){
        u.skCharge=0;
        const h=HEROES[u.heroId];
        h.sk.run(u,bUnits);
        spawnBattlePart(u.x,u.y,h.sk.col,20,5);
        toast(`${h.em} ${h.sk.n}!`,h.sk.col);
      }
    }
    // 독
    if(u.poisoned&&now-u.lastPoison>800/GS){
      u.lastPoison=now;u.curHp-=u.poisonDmg||8;
      updateUnitBars(u.uid,u.curHp/u.maxHp,u.skCharge/u.skMax);
    }
    if((u.slow||0)>0)u.slow=Math.max(0,u.slow-.002*GS);
  });

  // 사망 처리
  bUnits.forEach(u=>{
    if(u.curHp<=0&&u.alive!==false){
      u.alive=false;
      const el=document.getElementById('us_'+u.uid);
      if(el){el.style.opacity='.0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300)}
      spawnBattlePart(u.x,u.y,u.team==='ally'?'#0088ff':'#ff2200',20,4);
    }
  });

  // FX
  drawBattleFX();
}

function endBattle(win){
  phase='prep';
  const allies=bUnits.filter(u=>u.team==='ally');
  const enemies=bUnits.filter(u=>u.team==='enemy');
  let dmg=0;
  if(!win){
    dmg=2+Math.floor(round/3)+enemies.filter(u=>u.curHp>0).length;
    hp=Math.max(0,hp-dmg);
    updateLifeUI();
  }
  const bonus=win?round*2+5:0;
  if(win)gold+=bonus;
  addHistory(win,dmg);
  showResult(win,dmg,bonus);
  if(hp<=0){setTimeout(()=>triggerGO(),1500);return}
  // 다음 라운드 준비
  setTimeout(()=>{startPrep()},win?800:800);
}

function addHistory(win,dmg){
  history.unshift({win,dmg,round});
  if(history.length>10)history.pop();
  const el=document.getElementById('history');el.innerHTML='';
  history.forEach(h=>{
    const row=document.createElement('div');
    row.className='hist-row '+(h.win?'win':'lose');
    row.textContent=(h.win?'▲ WIN ':'▼ LOSE ')+'R'+h.round+(h.win?'':' -'+h.dmg+'HP');
    el.appendChild(row);
  });
}

function showResult(win,dmg,bonus){
  const modal=document.getElementById('result-modal');
  const box=document.getElementById('rm-box');
  const title=document.getElementById('rm-title');
  const sub=document.getElementById('rm-sub');

    box.style.borderColor='var(--neon)';

    box.style.borderColor='var(--neon3)';
    title.style.color='var(--neon3)';
    title.textContent='DEFEAT';
    sub.textContent=`라운드 ${round} 패배. -${dmg} HP (남은 체력: ${hp})`;
    btn.style.borderColor='var(--neon3)';btn.style.color='var(--neon3)';
  }
  setTimeout(closeResult,2500);

function closeResult(){
  document.getElementById('result-modal').classList.remove('on');
}

/*══════════════════════════════════════════
  SKILL HELPERS
══════════════════════════════════════════*/
function atkSingle(u,a,mult,col){
  const foes=a.filter(t=>t.team!==u.team&&t.curHp>0);if(!foes.length)return;
  const t=foes.reduce((a,b)=>b.curHp<a.curHp?b:a,foes[0]);
  const d=Math.round(u.pwr*mult);t.curHp-=d;
  showFloatDmg(t.uid,d+'!',col);updateUnitBars(t.uid,t.curHp/t.maxHp,t.skCharge/t.skMax);
  spawnBattlePart(t.x,t.y,col,15,4);
}
function atkAoe(u,a,mult,col,pen=false){
  const foes=a.filter(t=>t.team!==u.team&&t.curHp>0);
  foes.forEach(t=>{
    const d=Math.round(u.pwr*mult*(pen?1:Math.max(.1,1-(t.def||0)/Math.max(1,u.pwr))));
    t.curHp-=d;showFloatDmg(t.uid,d,col);updateUnitBars(t.uid,t.curHp/t.maxHp,t.skCharge/t.skMax);
  });
  spawnBattlePart(u.x,u.y,col,foes.length*14,6);
}
function slowAll(a,team,amt,col){
  a.filter(t=>t.team===team&&t.curHp>0).forEach(t=>t.slow=Math.max(t.slow||0,amt));
  spawnBattlePart(CW*.5,CH*.5,col,30,4);
}
function healAll(a,team,amt){
  a.filter(t=>t.team===team&&t.curHp>0).forEach(t=>{
    t.curHp=Math.min(t.maxHp,t.curHp+amt);
    showFloatDmg(t.uid,'+'+Math.round(amt),'#00e87a');
    updateUnitBars(t.uid,t.curHp/t.maxHp,t.skCharge/t.skMax);
  });
}
function shieldAll(a,team,amt){a.filter(t=>t.team===team&&t.curHp>0).forEach(t=>t.def=(t.def||0)+amt)}
function markAll(u,a){
  a.filter(t=>t.team!==u.team&&t.curHp>0).forEach(t=>{t.poisoned=true;t.poisonDmg=Math.round(t.maxHp*.04+5)});
}
function taunt(u,a){u.def=(u.def||0)+30}

/*══════════════════════════════════════════
  PARTICLES (FX Canvas)
══════════════════════════════════════════*/
let fxParts=[];
function spawnBattlePart(x,y,col,n,sz=3){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=.5+Math.random()*3;
    fxParts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,l:1,col,sz:sz*(Math.random()*.5+.5)});
  }
}
function spawnPart(x,y,col,n,sz){spawnBattlePart(x,y,col,n,sz)}
function drawBattleFX(){
  FCX.clearRect(0,0,FC.width,FC.height);
  fxParts=fxParts.filter(p=>{
    p.x+=p.vx*GS;p.y+=p.vy*GS;p.vy+=.12*GS;p.l-=.03*GS;
    if(p.l<=0)return false;
    FCX.save();FCX.globalAlpha=p.l;FCX.fillStyle=p.col;
    FCX.beginPath();FCX.arc(p.x,p.y,p.sz*p.l,0,Math.PI*2);FCX.fill();FCX.restore();
    return true;
  });
}

function updateLifeUI(){
  document.getElementById('h-hp').textContent=hp;
  const pct=hp/100*100;
  const fill=document.getElementById('hp-fill');
  fill.style.width=pct+'%';
  fill.className='hp-fill'+(hp<=40?' warn':'')+(hp<=20?' crit':'');
  const danger=document.getElementById('danger')||null;
  if(hp<=20)document.body.style.boxShadow='inset 0 0 40px rgba(255,45,107,.2)';
  else document.body.style.boxShadow='';
}
function showUnitInfo(u){
  const h=HEROES[u.heroId];const gr=GR_COST(h.cost);
  const el=document.getElementById('unit-info-body');
  el.innerHTML=`<div style="font-size:1.4rem;text-align:center">${h.em}</div>
    <div style="font-family:'Orbitron',sans-serif;font-size:.62rem;color:${gr};text-align:center;margin:3px 0">${h.nm} ${'★'.repeat(u.star)}</div>
    <div style="line-height:1.8;margin-top:4px">
      HP: ${Math.round(h.hp*(1+u.star*.4))}<br>
      ATK: ${Math.round(h.pwr*(1+u.star*.3))}<br>
      SPD: ${h.spd}<br>
      RNG: ${h.rng}<br>
      종족: <span style="color:${gr}">${h.race}</span><br>
      직업: ${h.cls}<br>
      스킬: <span style="color:${h.sk.col}">${h.sk.n}</span><br>
      <span style="color:var(--d)">${h.sk.d}</span>
    </div>
    <button style="width:100%;margin-top:6px;padding:5px;background:rgba(255,45,107,.1);border:1px solid var(--neon3);color:var(--neon3);font-family:'Orbitron',sans-serif;font-size:.58rem;cursor:pointer;letter-spacing:.06em" onclick="sellUnit('${u.uid}')">SELL ${Math.ceil(h.cost/2)}G</button>`;
}
function sellUnit(uid){
  const src=findUnitPos(uid);if(!src)return;
  let h;
  if(src.type==='board'){h=HEROES[board[src.row][src.col].heroId];board[src.row][src.col]=null}
  else{h=HEROES[bench[src.idx].heroId];bench.splice(src.idx,1)}
  gold+=Math.ceil(h.cost/2);
  selectedUID=null;
  updateHdr();renderBoardUnits();renderBench();drawBoard();updateSynergy();
  toast(`${h.nm} 판매 +${Math.ceil(h.cost/2)}G`,'#ffd700');
  document.getElementById('unit-info-body').textContent='유닛을 선택하세요';
}

function triggerGO(){
  document.getElementById('go-s').innerHTML=`최고 라운드: ${round}<br>골드: ${gold}G<br>레벨: ${lvl}`;
  document.getElementById('GO').classList.add('on');
}

/*══════════════════════════════════════════
  SPEED
══════════════════════════════════════════*/
function setSpd(n){
  GS=n;
  ['sp1','sp2','sp3'].forEach((id,i)=>document.getElementById(id).classList.toggle('on',i+1===n));
  if(prepInterval){clearInterval(prepInterval);prepInterval=setInterval(()=>{
    prepTimer-=1*GS;
    const pct=Math.max(0,prepTimer/30*100);
    document.getElementById('prep-bar').style.width=pct+'%';
    document.getElementById('prep-bar-txt').textContent=`PREP PHASE — ${Math.max(0,Math.ceil(prepTimer))}s`;
    if(prepTimer<=0){clearInterval(prepInterval);startBattle()}
  },1000/GS)}
  if(battleTick){clearInterval(battleTick);battleTick=setInterval(doBattleTick,100/GS)}
}

/*══════════════════════════════════════════
  TOAST
══════════════════════════════════════════*/
let TQ=[],TB=false;
function toast(m,c='#00ffe5'){TQ.push({m,c});if(!TB)nxtT()}
function nxtT(){if(!TQ.length){TB=false;return}TB=true;const{m,c}=TQ.shift();const t=document.getElementById('toast');t.textContent=m;t.style.color=c;t.style.borderColor=c;t.classList.add('on');setTimeout(()=>{t.classList.remove('on');setTimeout(nxtT,160)},1300)}

/*══════════════════════════════════════════
  INIT
══════════════════════════════════════════*/
function initGame(){
  setTimeout(()=>{
    resizeCvs();
    drawBoard();renderBench();updateHdr();updateLifeUI();updateSynergy();
    genShop();updateRoundInfo();
    requestAnimationFrame(function loop(){drawBattleFX();requestAnimationFrame(loop)});
    startPrep();
    toast('[ VOID CHESS ] 영웅을 구매하고 보드에 배치하세요','#00ffe5');
    setTimeout(()=>toast('같은 영웅 3장 = 2성 합성 자동!','#ffd700'),2000);
  },80);
}
</script>
