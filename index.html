<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조상희 숫자게임랭킹전</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .main-wrapper {
            display: flex;
            gap: 20px;
            max-width: 900px;
            width: 100%;
            flex-wrap: wrap;
        }
        .game-container, .ranking-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            flex: 1;
            min-width: 320px;
            text-align: center;
        }
        .ranking-container {
            max-height: 80vh;
            overflow-y: auto; /* 20위까지 스크롤바 제공 */
        }
        h1, h2 { color: #333; margin-bottom: 10px; }
        .description { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
        
        /* 로그인/계정 입력 영역 스타일 */
        .auth-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .stats span { color: #007bff; }
        .message { font-size: 1.2rem; font-weight: bold; margin: 20px 0; min-height: 30px; color: #28a745; }
        
        input[type="number"], input[type="text"], input[type="password"] {
            padding: 10px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 5px;
            text-align: center;
            box-sizing: border-box;
        }
        input[type="number"] { width: 90px; margin-right: 10px; }
        .auth-area input { width: 220px; }
        
        button {
            padding: 10px 20px;
            font-size: 1.1rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
        .restart-btn { background-color: #6c757d; margin-top: 15px; display: none; }
        
        /* 랭킹 스타일 */
        .ranking-list { text-align: left; margin-top: 20px; padding-left: 0; list-style: none; }
        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 1rem;
        }
        .ranking-item:nth-child(1) { font-weight: bold; color: #ffd700; } /* 1등 금색 */
        .ranking-item:nth-child(2) { font-weight: bold; color: #c0c0c0; } /* 2등 은색 */
        .ranking-item:nth-child(3) { font-weight: bold; color: #cd7f32; } /* 3등 동색 */
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- 왼쪽: 게임 화면 -->
    <div class="game-container">
        <h1>🔢 조상희숫자 랭킹전</h1>
        <p class="description">서버에 실시간으로 기록되는 백엔드 연동 게임!</p>
        
        <!-- 아이디(닉네임 겸용)와 비밀번호만 입력 받음 -->
        <div class="auth-area">
            <input type="text" id="user-id-input" placeholder="닉네임(아이디) 입력" maxlength="12">
            <input type="password" id="user-pw-input" placeholder="비밀번호 4자리 숫자" maxlength="4">
        </div>

        <div class="stats">
            <div>남은 기회: <span id="chances">5</span>회</div>
            <div>현재 연승: <span id="current-streak">0</span>승</div>
        </div>

        <div class="message" id="message">닉네임과 비밀번호를 입력하고 숫자를 맞춰!</div>

        <div id="input-area">
            <input type="number" id="guess-input" min="1" max="100" placeholder="1-100">
            <button id="guess-btn">확인</button>
        </div>

        <button class="restart-btn" id="restart-btn">다시 시작하기</button>
    </div>

    <!-- 오른쪽: 실시간 백엔드 랭킹 보드 -->
    <div class="ranking-container">
        <h2>🏆 실시간 랭킹 명예의 전당</h2>
        <p class="description">전체 플레이어의 최고 연승 기록 (TOP 20)</p>
        <ul class="ranking-list" id="ranking-list">
            <li class="ranking-item">불러오는 중...</li>
        </ul>
    </div>
</div>

<!-- Firebase 라이브러리 로드 -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Firebase 설정
    const firebaseConfig = {
        apiKey: "AIzaSyCcFkzVkZ2ui3WSIkFbxDa3m5OvebXSfk4",
        authDomain: "chosanghee00001.firebaseapp.com",
        projectId: "chosanghee00001",
        storageBucket: "chosanghee00001.firebasestorage.app",
        messagingSenderId: "705786109560",
        appId: "1:705786109560:web:01b69c754e13df96e8978d",
        measurementId: "G-E566V33J74"
    };

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 게임 변수
    let targetNumber;
    let remainingChances;
    let currentStreak = 0;

    const messageEl = document.getElementById('message');
    const chancesEl = document.getElementById('chances');
    const currentStreakEl = document.getElementById('current-streak');
    const guessInput = document.getElementById('guess-input');
    const userIdInput = document.getElementById('user-id-input');
    const userPwInput = document.getElementById('user-pw-input');
    const guessBtn = document.getElementById('guess-btn');
    const restartBtn = document.getElementById('restart-btn');

    // 게임 초기화 함수
    function initGame() {
        targetNumber = Math.floor(Math.random() * 100) + 1;
        remainingChances = 5; 
        chancesEl.textContent = remainingChances;
        currentStreakEl.textContent = currentStreak;
        messageEl.textContent = "숫자를 입력하고 확인을 눌러주세요.";
        messageEl.style.color = "#28a745";
        guessInput.value = "";
        guessInput.disabled = false;
        guessBtn.disabled = false;
        restartBtn.style.display = "none";
        loadRanking(); 
    }

    // 백엔드로 점수 전송 (아이디=닉네임 기준으로 검증)
    async function saveScoreToBackend(userId, userPw, score) {
        if (!userId || !userPw) return;
        
        try {
            // 1. 해당 닉네임(아이디)으로 등록된 기존 기록이 있는지 확인
            const q = query(collection(db, "rankings"), where("userId", "==", userId));
            const querySnapshot = await getDocs(q);
            
            if (!querySnapshot.empty) {
                let existingDoc = querySnapshot.docs[0];
                let existingData = existingDoc.data();
                
                // 비밀번호가 틀리면 튕겨내기
                if (existingData.userPw !== userPw) {
                    alert("⚠️ 기존에 등록된 닉네임이지만 비밀번호가 일치하지 않아 기록이 갱신되지 않았습니다!");
                    return;
                }
                
                // 최고 점수보다 낮거나 같으면 저장 안 함
                if (parseInt(score) <= existingData.score) {
                    console.log("기존 최고 기록이 더 높거나 같아서 유지합니다.");
                    return;
                }
            }

            // 2. 새 점수 기록 추가
            await addDoc(collection(db, "rankings"), {
                userId: userId, // 닉네임이자 아이디 역할
                userPw: userPw, 
                score: parseInt(score),
                timestamp: new Date()
            });
            
            console.log("백엔드 서버에 점수 저장 완료!");
            alert(`🎉 축하합니다! '${userId}'님의 기록이 ${score}연승으로 새롭게 등록되었습니다.`);
            loadRanking(); 
        } catch (e) {
            console.error("점수 저장 실패: ", e);
        }
    }

    // 백엔드에서 랭킹 데이터 불러오기 (TOP 20)
    async function loadRanking() {
        const rankingListEl = document.getElementById('ranking-list');
        rankingListEl.innerHTML = "";

        try {
            const q = query(collection(db, "rankings"), orderBy("score", "desc"), limit(20));
            const querySnapshot = await getDocs(q);
            
            if(querySnapshot.empty) {
                rankingListEl.innerHTML = "<li class='ranking-item'>아직 등록된 랭킹이 없습니다. 첫 주인공이 되어보세요!</li>";
                return;
            }

            let rank = 1;
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const li = document.createElement('li');
                li.className = 'ranking-item';
                // 아이디(닉네임) 하나만 깔끔하게 출력
                li.innerHTML = `<span>${rank}위. ${data.userId}</span> <span>${data.score}연승</span>`;
                rankingListEl.appendChild(li);
                rank++;
            });
        } catch (e) {
            console.error("랭킹 로드 실패: ", e);
            rankingListEl.innerHTML = "<li class='ranking-item'>랭킹 로드 실패 (Firestore 규칙 설정을 확인하세요)</li>";
        }
    }

    // 정답 체크 함수
    function checkGuess() {
        const userId = userIdInput.value.trim();
        const userPw = userPwInput.value.trim();
        const userGuess = parseInt(guessInput.value);

        if (!userId || !userPw) {
            alert("게임을 시작하기 전에 닉네임과 비밀번호를 모두 입력해 주세요!");
            if(!userId) userIdInput.focus();
            else userPwInput.focus();
            return;
        }

        if (isNaN(userGuess) || userGuess < 1 || userGuess > 100) {
            messageEl.textContent = "1부터 100 사이의 숫자를 입력해주세요!";
            messageEl.style.color = "#dc3545";
            return;
        }

        // 게임 진행 중에는 입력창 수정 불가하게 잠금
        userIdInput.disabled = true;
        userPwInput.disabled = true;
        
        remainingChances--;
        chancesEl.textContent = remainingChances;

        if (userGuess === targetNumber) {
            currentStreak++;
            messageEl.textContent = `🎉 정답입니다! (${targetNumber})`;
            messageEl.style.color = "#28a745";
            endGame(true);
        } else if (remainingChances === 0) {
            messageEl.textContent = `💥 실패! 정답은 [ ${targetNumber} ] 이었습니다.`;
            messageEl.style.color = "#dc3545";
            endGame(false);
        } else {
            if (userGuess < targetNumber) {
                messageEl.textContent = "🔼 UP! 더 큰 숫자입니다.";
                messageEl.style.color = "#007bff";
            } else {
                messageEl.textContent = "🔽 DOWN! 더 작은 숫자입니다.";
                messageEl.style.color = "#fd7e14";
            }
        }
        guessInput.value = "";
        guessInput.focus();
    }

    // 게임 종료 처리
    function endGame(isWin) {
        guessInput.disabled = true;
        guessBtn.disabled = true;
        restartBtn.style.display = "inline-block";
        currentStreakEl.textContent = currentStreak;

        if (!isWin) {
            if (currentStreak > 0) {
                saveScoreToBackend(
                    userIdInput.value.trim(), 
                    userPwInput.value.trim(), 
                    currentStreak
                );
            }
            currentStreak = 0; 
            // 게임오버 시 다시 입력할 수 있도록 입력창 잠금 해제
            userIdInput.disabled = false;
            userPwInput.disabled = false;
        } else {
            setTimeout(() => {
                alert(`연승 행진 중! 이어서 ${currentStreak + 1}번째 판을 시작합니다.`);
                initGame();
            }, 1000);
        }
    }

    // 이벤트 리스너 등록
    guessBtn.addEventListener("click", checkGuess);
    restartBtn.addEventListener("click", initGame);
    guessInput.addEventListener("keyup", function(event) {
        if (event.key === "Enter") checkGuess();
    });

    // 최초 게임 실행
    initGame();
</script>

</body>
</html>
