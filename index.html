<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조상희 멀티게임 랭킹전</title>
    <style>
        /* 글로벌 사이버 펑크 / 아케이드 테마 스타일 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* 게임 전환 탭 영역 */
        .game-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 1050px;
            justify-content: center;
        }
        .tab-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            background: rgba(20, 26, 46, 0.8);
            color: #8fa0dd;
            border: 2px solid rgba(0, 242, 254, 0.3);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .tab-btn.active {
            color: #00f2fe;
            background: rgba(0, 242, 254, 0.15);
            border-color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.6);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        /* 메인 프레임: 네온 그라데이션 테두리 효과 */
        .main-wrapper {
            display: flex;
            gap: 30px;
            max-width: 1050px;
            width: 100%;
            flex-wrap: wrap;
            background: rgba(10, 15, 30, 0.85);
            padding: 30px;
            border-radius: 20px;
            border: 3px solid transparent;
            background-image: linear-gradient(rgba(10, 15, 30, 0.9), rgba(10, 15, 30, 0.9)), 
                              linear-gradient(135deg, #00f2fe 0%, #4facfe 40%, #ff0844 70%, #ffb199 100%);
            background-origin: border-box;
            background-clip: content-box, border-box;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.25), inset 0 0 20px rgba(255, 8, 68, 0.15);
        }

        /* 컨테이너 공통 */
        .game-container, .ranking-container {
            background: rgba(20, 26, 46, 0.7);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(0, 242, 254, 0.3);
            flex: 1.2;
            min-width: 340px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
        }

        .ranking-container {
            flex: 0.8;
            max-height: 640px;
            overflow-y: auto;
        }

        /* 스크롤바 커스텀 */
        .ranking-container::-webkit-scrollbar { width: 6px; }
        .ranking-container::-webkit-scrollbar-thumb { background: #00f2fe; border-radius: 10px; }

        h1 { font-size: 1.9rem; color: #00f2fe; text-shadow: 0 0 10px rgba(0, 242, 254, 0.6); margin: 0 0 5px 0; }
        h2 { font-size: 1.5rem; color: #ff0844; text-shadow: 0 0 10px rgba(255, 8, 68, 0.6); margin: 0 0 5px 0; }
        .description { color: #8fa0dd; font-size: 0.9rem; margin-bottom: 20px; }
        
        .auth-area { display: flex; flex-direction: column; gap: 10px; align-items: center; margin-bottom: 20px; }
        
        /* 스탯 보드 */
        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            border-left: 4px solid #00f2fe;
        }
        .stats span { color: #00f2fe; font-weight: bold; text-shadow: 0 0 5px rgba(0, 242, 254, 0.4); }
        .red-text { color: #ff0844 !important; text-shadow: 0 0 5px rgba(255, 8, 68, 0.4) !important; }

        .message { font-size: 1.1rem; font-weight: bold; margin: 15px 0; min-height: 35px; color: #00f2fe; }
        
        input[type="number"], input[type="text"], input[type="password"] {
            padding: 12px; font-size: 1.1rem; background: rgba(10, 14, 28, 0.9);
            border: 2px solid rgba(0, 242, 254, 0.4); border-radius: 6px; color: #fff;
            text-align: center; box-sizing: border-box; transition: all 0.3s ease;
        }
        input:focus { outline: none; border-color: #ff0844; box-shadow: 0 0 10px rgba(255, 8, 68, 0.5); }
        input::placeholder { color: #53658a; }
        
        input[type="number"] { width: 100px; }
        .auth-area input { width: 80%; max-width: 260px; }
        
        button {
            padding: 12px 24px; font-size: 1.1rem; font-weight: bold;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: #090a0f;
            border: none; border-radius: 6px; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
            transition: all 0.2s ease;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 242, 254, 0.6); }
        .restart-btn { 
            background: linear-gradient(135deg, #f5515f 0%, #9f031b 100%); color: white;
            margin-top: 15px; display: none; box-shadow: 0 4px 15px rgba(245, 81, 95, 0.4);
        }
        
        /* 랭킹 스타일 */
        .ranking-list { text-align: left; margin-top: 10px; padding-left: 0; list-style: none; }
        .ranking-item { display: flex; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); font-size: 1.05rem; }
        .ranking-item:nth-child(1) { font-weight: bold; color: #ffd700; } 
        .ranking-item:nth-child(2) { font-weight: bold; color: #e0e0e0; } 
        .ranking-item:nth-child(3) { font-weight: bold; color: #cd7f32; } 

        /* 📈 주식 게임 전용 UI */
        .stock-screen { display: none; }
        .stock-market-board {
            background: rgba(10, 14, 28, 0.8);
            border: 1px solid rgba(255, 8, 68, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }
        .stock-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .stock-item:last-child { border-bottom: none; }
        .stock-info .name { font-weight: bold; color: #fff; font-size: 1.05rem; }
        .stock-info .cap { font-size: 0.8rem; color: #8fa0dd; margin-top: 2px; }
        .stock-price { font-weight: bold; text-align: right; min-width: 110px; color: #ffb199; transition: color 0.2s ease; }
        
        .price-up { color: #ff0844 !important; text-shadow: 0 0 5px rgba(255,8,68,0.4); }
        .price-down { color: #00f2fe !important; text-shadow: 0 0 5px rgba(0,242,254,0.4); }

        /* 수량 입력 및 거래 버튼 레이아웃 */
        .stock-trade-zone {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stock-trade-zone input[type="number"] {
            width: 70px;
            padding: 6px;
            font-size: 0.95rem;
            border-color: rgba(255, 255, 255, 0.2);
        }
        .stock-trade-zone button { padding: 8px 14px; font-size: 0.9rem; }
        .btn-buy { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); color: white; box-shadow: 0 2px 8px rgba(255,8,68,0.3); }
        .btn-sell { background: linear-gradient(135deg, #30cfd0 0%, #330867 100%); color: white; box-shadow: 0 2px 8px rgba(48,207,208,0.3); }
    </style>
</head>
<body>

<!-- 게임 선택 버튼 -->
<div class="game-selector">
    <button class="tab-btn active" id="tab-number" onclick="switchGame('number')">🔢 숫자맞추기</button>
    <button class="tab-btn" id="tab-stock" onclick="switchGame('stock')">📈 주식투자게임</button>
</div>

<div class="main-wrapper">
    
    <!-- 공통 계정 설정 영역 -->
    <div style="width:100%; display:flex; justify-content:center; margin-bottom:10px;">
        <div class="auth-area" style="margin-bottom: 0; flex-direction: row; gap: 15px;">
            <input type="text" id="user-id-input" placeholder="닉네임(아이디)" maxlength="12">
            <input type="password" id="user-pw-input" placeholder="비밀번호 4자리" maxlength="4">
        </div>
    </div>

    <!-- ================= 1. 숫자 게임 화면 ================= -->
    <div class="game-container id-game-content" id="number-game-screen">
        <h1>🔢 조상희숫자 랭킹전</h1>
        <p class="description">조상희의 아케이드 에디션 : 백엔드 실시간 연동</p>
        
        <div class="stats">
            <div>남은 기회: <span id="chances">5</span>회</div>
            <div>현재 연승: <span id="current-streak" class="red-text">0</span>승</div>
        </div>
        <div class="message" id="number-message">조상희가 숨긴 1~100 사이의 숫자를 맞춰보세요.</div>
        <div id="input-area">
            <input type="number" id="guess-input" min="1" max="100" placeholder="1-100" style="margin-right:8px;">
            <button id="guess-btn">확인</button>
        </div>
        <button class="restart-btn" id="restart-btn">다시 시작하기</button>
    </div>

    <!-- ================= 2. 주식 게임 화면 ================= -->
    <div class="game-container id-game-content stock-screen" id="stock-game-screen">
        <h1>📈 조상희 가치주 레이스 (REALTIME)</h1>
        <p class="description">1.5초마다 변하는 실시간 시세! 최적의 타이밍에 매매하라!</p>
        
        <div class="stats">
            <div>남은 시간: <span id="stock-timer" class="red-text">90</span> 초</div>
            <div>보유 자산: <span id="stock-asset" class="red-text">2,000,000</span> 원</div>
            <div>보유 주식: <span id="stock-owned">0</span> 주</div>
        </div>

        <div class="stock-market-board" id="market-board">
            <!-- 5개 종목 동적 렌더링 영역 -->
        </div>

        <div class="message" id="stock-message">상단 계정 정보를 입력하고 시작 버튼을 누르세요! 제한시간은 90초입니다.</div>
        <button id="start-stock-btn" style="width: 100%; margin-bottom: 10px; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color:#000;">🕹️ 실시간 게임 시작하기</button>
        <button class="restart-btn" id="stock-restart-btn" style="width: 100%;">자산 초기화하고 재도전</button>
    </div>

    <!-- ================= 우측: 실시간 통합 명예의 전당 ================= -->
    <div class="ranking-container">
        <h2 id="ranking-title">🏆 조상희 명예의 전당 (TOP 20)</h2>
        <p class="description" id="ranking-desc">실시간 조상희 게임 마스터 랭킹 리스트</p>
        <ul class="ranking-list" id="ranking-list">
            <li class="ranking-item">데이터 로딩 중...</li>
        </ul>
    </div>
</div>

<!-- Firebase 라이브러리 모드 -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCcFkzVkZ2ui3WSIkFbxDa3m5OvebXSfk4",
        authDomain: "chosanghee00001.firebaseapp.com",
        projectId: "chosanghee00001",
        storageBucket: "chosanghee00001.firebasestorage.app",
        messagingSenderId: "705786109560",
        appId: "1:705786109560:web:01b69c754e13df96e8978d",
        measurementId: "G-E566V33J74"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let activeTab = 'number'; 
    const userIdInput = document.getElementById('user-id-input');
    const userPwInput = document.getElementById('user-pw-input');

    /* ----------------------------------------------------
       [공통] 탭 전환 시스템
    ---------------------------------------------------- */
    window.switchGame = function(gameType) {
        activeTab = gameType;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.id-game-content').forEach(content => content.style.display = 'none');
        
        if(gameType === 'number') {
            document.getElementById('tab-number').classList.add('active');
            document.getElementById('number-game-screen').style.display = 'block';
            loadRanking('rankings', '연승');
        } else {
            document.getElementById('tab-stock').classList.add('active');
            document.getElementById('stock-game-screen').style.display = 'block';
            loadRanking('stock_rankings', '원');
        }
    }

    /* ----------------------------------------------------
       [게임 1] 숫자 맞추기 내부 로직
    ---------------------------------------------------- */
    let targetNumber, remainingChances, currentStreak = 0;
    const numMsg = document.getElementById('number-message');
    const chancesEl = document.getElementById('chances');
    const streakEl = document.getElementById('current-streak');
    const guessInput = document.getElementById('guess-input');
    const guessBtn = document.getElementById('guess-btn');
    const restartBtn = document.getElementById('restart-btn');

    function initNumberGame() {
        targetNumber = Math.floor(Math.random() * 100) + 1;
        remainingChances = 6; 
        chancesEl.textContent = remainingChances;
        streakEl.textContent = currentStreak;
        numMsg.textContent = "조상희가 숨긴 1~100 사이의 숫자를 맞춰보세요.";
        numMsg.style.color = "#00f2fe";
        guessInput.value = "";
        guessInput.disabled = false;
        guessBtn.disabled = false;
        restartBtn.style.display = "none";
        loadRanking('rankings', '연승'); 
    }

    function checkGuess() {
        const userId = userIdInput.value.trim();
        const userPw = userPwInput.value.trim();
        const userGuess = parseInt(guessInput.value);

        if (!userId || !userPw) { alert("닉네임과 비밀번호를 모두 채워야 합니다."); return; }
        if (isNaN(userGuess) || userGuess < 1 || userGuess > 100) { numMsg.textContent = "범위 초과! (1~100 사이)"; return; }

        userIdInput.disabled = true; userPwInput.disabled = true;
        remainingChances--; chancesEl.textContent = remainingChances;

        if (userGuess === targetNumber) {
            currentStreak++;
            numMsg.textContent = `🎉 CORRECT! 조상희의 정답은 [ ${targetNumber} ]`;
            endGame(true);
        } else if (remainingChances === 0) {
            numMsg.textContent = `💥 GAME OVER! 정답은 [ ${targetNumber} ] 이었습니다.`;
            endGame(false);
        } else {
            numMsg.textContent = userGuess < targetNumber ? "🔼 UP! 더 높은 수입니다." : "🔽 DOWN! 더 낮은 수입니다.";
        }
        guessInput.value = ""; guessInput.focus();
    }

    function endGame(isWin) {
        guessInput.disabled = true; guessBtn.disabled = true;
        restartBtn.style.display = "inline-block";
        streakEl.textContent = currentStreak;
        if (!isWin) {
            if (currentStreak > 0) saveScore('rankings', userIdInput.value.trim(), userPwInput.value.trim(), currentStreak);
            currentStreak = 0; userIdInput.disabled = false; userPwInput.disabled = false;
        } else {
            setTimeout(() => { alert(`연승 성공! 이어서 ${currentStreak + 1}번째 판을 시작합니다.`); initNumberGame(); }, 1000);
        }
    }

    /* ----------------------------------------------------
       [게임 2] 실시간 주식 투자 게임 로직
    ---------------------------------------------------- */
    let stockTimeLeft = 90, stockAsset = 2000000, stockGameActive = false; // 대폭 하향: 2,000,000원(200만 원)으로 설정
    let priceInterval, clockInterval;
    
    // 자산 하향에 맞추어 적절하게 시작 주가 밸런싱 수정
    let stocks = [
        { name: "리가켐바이오 테마", price: 65000, oldPrice: 65000, cap: "시총 4,200억", owned: 0 },
        { name: "한스바이오메드 테마", price: 14000, oldPrice: 14000, cap: "시총 1,500억", owned: 0 },
        { name: "휴젤 헬스케어테마", price: 195000, oldPrice: 195000, cap: "시총 8,900억", owned: 0 },
        { name: "KOSDAQ 150 바이오 ETF", price: 22000, oldPrice: 22000, cap: "지수 연동형 테마", owned: 0 },
        { name: "상희 디바이스 가치주", price: 45000, oldPrice: 45000, cap: "시총 3,100억", owned: 0 }
    ];

    const timerEl = document.getElementById('stock-timer');
    const assetEl = document.getElementById('stock-asset');
    const ownedEl = document.getElementById('stock-owned');
    const marketBoard = document.getElementById('market-board');
    const stockMsg = document.getElementById('stock-message');
    const startStockBtn = document.getElementById('start-stock-btn');
    const stockRestartBtn = document.getElementById('stock-restart-btn');

    function initStockGame() {
        clearInterval(priceInterval);
        clearInterval(clockInterval);
        stockTimeLeft = 90; stockAsset = 2000000; stockGameActive = false;
        stocks.forEach(s => { s.owned = 0; s.price = s.oldPrice; });
        startStockBtn.disabled = false;
        startStockBtn.style.display = "inline-block";
        stockRestartBtn.style.display = "none";
        userIdInput.disabled = false; userPwInput.disabled = false;
        
        // 초기 렌더링 시에는 비어있는 상태이거나 기본 UI 그리기
        renderStockMarket(true); 
        timerEl.textContent = stockTimeLeft;
        assetEl.textContent = stockAsset.toLocaleString();
        ownedEl.textContent = 0;
        stockMsg.textContent = "상단 계정 정보를 입력하고 시작 버튼을 누르세요! 초기자산은 200만 원, 제한시간은 90초입니다.";
    }

    function startRealtimeStockGame() {
        const userId = userIdInput.value.trim();
        const userPw = userPwInput.value.trim();
        if (!userId || !userPw) { alert("계정 정보(닉네임/비번)를 상단에 먼저 입력해야 게임 시작이 가능합니다."); return; }

        userIdInput.disabled = true; userPwInput.disabled = true;
        stockGameActive = true;
        startStockBtn.style.display = "none";
        stockMsg.textContent = "🚀 실시간 주식 레이스가 시작되었습니다! 단타 타이밍을 잡으세요!";

        // 1.5초마다 무작위 주가 폭등락 변동 루프
        priceInterval = setInterval(() => {
            stocks.forEach(stock => {
                stock.oldPrice = stock.price;
                let changePercent = (Math.random() * 34 - 16) / 100; 
                stock.price = Math.max(1000, Math.floor(stock.price * (1 + changePercent)));
            });
            renderStockMarket(false); // 수량창 값을 유지하기 위해 false 전달
        }, 1500);

        // 1초마다 타이머 구동
        clockInterval = setInterval(() => {
            stockTimeLeft--;
            timerEl.textContent = stockTimeLeft;
            
            if(stockTimeLeft <= 0) {
                endStockGame();
            }
        }, 1000);

        renderStockMarket(true); // 처음 시작할 때 한 번 인풋 생성
    }

    // [핵심 버그 수정]: isInit 변수를 도입하여, 실시간 주가 리프레시 시 HTML을 통째로 갈아끼우지 않고 가격과 텍스트만 콕 집어서 업데이트합니다.
    function renderStockMarket(isInit = false) {
        if (isInit || marketBoard.children.length === 0) {
            marketBoard.innerHTML = "";
            stocks.forEach((stock, index) => {
                const item = document.createElement('div');
                item.className = 'stock-item';
                item.id = `stock-row-${index}`;
                item.innerHTML = `
                    <div class="stock-info">
                        <div class="name">${stock.name}</div>
                        <div class="cap" id="stock-cap-${index}">${stock.cap} | 보유: ${stock.owned}주</div>
                    </div>
                    <div class="stock-price" id="stock-price-${index}">${stock.price.toLocaleString()} 원</div>
                    <div class="stock-trade-zone">
                        <input type="number" id="quantity-${index}" min="1" value="1" placeholder="수량">
                        <button class="btn-buy" onclick="tradeStock(${index}, 'buy')">매수</button>
                        <button class="btn-sell" onclick="tradeStock(${index}, 'sell')">매도</button>
                    </div>
                `;
                marketBoard.appendChild(item);
            });
        } else {
            // 게임 진행 중 실시간 루프가 돌 때는 입력창 요소를 건드리지 않고 '가격'과 '보유 수량 텍스트'만 바꿈으로써 수량 초기화 버그 전면 해결!
            stocks.forEach((stock, index) => {
                const priceEl = document.getElementById(`stock-price-${index}`);
                const capEl = document.getElementById(`stock-cap-${index}`);
                
                if (priceEl && capEl) {
                    priceEl.textContent = `${stock.price.toLocaleString()} 원`;
                    capEl.textContent = `${stock.cap} | 보유: ${stock.owned}주`;

                    // 등락 색상 클래스 제어
                    priceEl.className = "stock-price";
                    if (stock.price > stock.oldPrice) priceEl.classList.add("price-up");
                    else if (stock.price < stock.oldPrice) priceEl.classList.add("price-down");
                }
            });
        }

        // 보유 자산 및 총 지표 새로고침
        assetEl.textContent = stockAsset.toLocaleString();
        let totalOwned = stocks.reduce((acc, cur) => acc + cur.owned, 0);
        ownedEl.textContent = totalOwned;
    }

    window.tradeStock = function(index, type) {
        if(!stockGameActive) { alert("먼저 '실시간 게임 시작하기' 버튼을 눌러주세요!"); return; }
        
        let stock = stocks[index];
        const qtyInput = document.getElementById(`quantity-${index}`);
        let qty = parseInt(qtyInput.value);

        if (isNaN(qty) || qty <= 0) { alert("거래할 정확한 수량을 지정해 주세요."); return; }
        let totalCost = stock.price * qty;

        if (type === 'buy') {
            if (stockAsset >= totalCost) {
                stockAsset -= totalCost;
                stock.owned += qty;
                stockMsg.textContent = `🎯 [${stock.name}] ${qty}주 실시간 매수 체결 완료.`;
            } else { alert("예수금이 부족합니다! 자산 규모에 맞게 수량을 조절하세요."); }
        } else {
            if (stock.owned >= qty) {
                stockAsset += totalCost;
                stock.owned -= qty;
                stockMsg.textContent = `💰 [${stock.name}] ${qty}주 실시간 매도(익절/손절) 완료.`;
            } else { alert("방출 가능한 보유 주식 수량이 부족합니다."); }
        }
        renderStockMarket(false); // 인풋박스를 유지하며 데이터 동기화
    }

    function endStockGame() {
        stockGameActive = false;
        clearInterval(priceInterval);
        clearInterval(clockInterval);

        // 장마감 후 보유 종목 전량 자동 전적 매도 청산
        stocks.forEach(stock => {
            stockAsset += stock.owned * stock.price;
            stock.owned = 0;
        });

        stockRestartBtn.style.display = "inline-block";
        stockMsg.textContent = `🏁 장마감! 최종 평가금액: ${stockAsset.toLocaleString()} 원`;
        renderStockMarket(true); // 종료 시에는 전체 리셋 구조로 한 번 리렌더링
        
        // 최종 스코어 백엔드 업로드
        saveScore('stock_rankings', userIdInput.value.trim(), userPwInput.value.trim(), stockAsset);
    }

    /* ----------------------------------------------------
       [공통 백엔드 데이터 연동] Firebase 저장/조회
    ---------------------------------------------------- */
    async function saveScore(colName, userId, userPw, score) {
        try {
            const q = query(collection(db, colName), where("userId", "==", userId));
            const querySnapshot = await getDocs(q);
            
            if (!querySnapshot.empty) {
                let existingData = querySnapshot.docs[0].data();
                if (existingData.userPw !== userPw) {
                    alert("⚠️ 보안 인증 에러: 기존 등록 패스워드 불일치로 기록 등재가 무산되었습니다.");
                    return;
                }
                if (parseInt(score) <= existingData.score) {
                    console.log("기존 랭킹 기록이 더 높아 스킵.");
                    return;
                }
            }

            await addDoc(collection(db, colName), {
                userId: userId, userPw: userPw, score: parseInt(score), timestamp: new Date()
            });
            
            let unit = colName === 'rankings' ? '연승' : '원 자산';
            alert(`🎉 명예의 전당 경신: '${userId}'님의 기록이 실시간 데이터베이스에 업로드되었습니다.`);
            loadRanking(colName, colName === 'rankings' ? '연승' : '원'); 
        } catch (e) {
            console.error("점수 저장 실패: ", e);
        }
    }

    async function loadRanking(colName, unit) {
        const titleEl = document.getElementById('ranking-title');
        const descEl = document.getElementById('ranking-desc');
        const rankingListEl = document.getElementById('ranking-list');
        rankingListEl.innerHTML = "";

        if(colName === 'rankings') {
            titleEl.textContent = "🏆 조상희 숫자 명예의 전당 (TOP 20)";
            descEl.textContent = "가장 높은 연속 정답 기록 리스트";
        } else {
            titleEl.textContent = "🏆 조상희 실시간 주식 명예의 전당 (TOP 20)";
            descEl.textContent = "90초 스캘핑 레이스 최고 자산가 리스트";
        }

        try {
            const q = query(collection(db, colName), orderBy("score", "desc"), limit(20));
            const querySnapshot = await getDocs(q);
            
            if(querySnapshot.empty) {
                rankingListEl.innerHTML = "<li class='ranking-item'>아직 랭커가 없습니다. 첫 챔피언에 등극해 보십시오!</li>";
                return;
            }

            let rank = 1;
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const li = document.createElement('li');
                li.className = 'ranking-item';
                li.innerHTML = `<span>${rank}위. ${data.userId}</span> <span>${data.score.toLocaleString()} ${unit}</span>`;
                rankingListEl.appendChild(li);
                rank++;
            });
        } catch (e) {
            console.error("랭킹 로드 실패: ", e);
            rankingListEl.innerHTML = "<li class='ranking-item'>서버 연결 실패 (보안 세팅을 확인하세요)</li>";
        }
    }

    // 초기 이벤트 핸들러 바인딩
    guessBtn.addEventListener("click", checkGuess);
    restartBtn.addEventListener("click", initNumberGame);
    startStockBtn.addEventListener("click", startRealtimeStockGame);
    stockRestartBtn.addEventListener("click", initStockGame);
    guessInput.addEventListener("keyup", (e) => { if (e.key === "Enter") checkGuess(); });

    // 첫 세팅 로드
    initNumberGame();
    initStockGame();
</script>
